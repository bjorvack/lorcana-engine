pre-commit:
  parallel: true
  commands:
    rustfmt:
      run: cargo fmt --all -- --check
      files: "*.rs"
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
      files: "*.rs"
    tests:
      run: cargo test --all-targets --all-features
      files: "*.rs"

pre-push:
  parallel: true
  commands:
    rustfmt:
      run: cargo fmt --all -- --check
      files: "*.rs"
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
      files: "*.rs"
    tests:
      run: cargo test --all-targets --all-features
      files: "*.rs"