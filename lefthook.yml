pre-commit:
  parallel: true
  commands:
    rustfmt:
      run: cargo fmt --all -- --check
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
    tests:
      run: cargo test --all-targets --all-features

pre-push:
  parallel: true
  commands:
    rustfmt:
      run: cargo fmt --all -- --check
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
    tests:
      run: cargo test --all-targets --all-features