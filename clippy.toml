# Clippy configuration file
# See https://github.com/rust-lang/rust-clippy/blob/master/clippy_lints/src/lib.rs
# for available lints and their documentation

# Cognitive complexity threshold
cognitive-complexity-threshold = 30

# Type complexity threshold
type-complexity-threshold = 250

# Suppress lints in specific files or paths
# allow-expect-in-tests = true

# Allow multiple crate versions (common in dependency ecosystem)
allowed-duplicate-crates = ["getrandom", "hashbrown", "r-efi", "wit-bindgen"]