name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Generate card set files
        run: python3 cards/scripts/combine_sets.py
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-targets --all-features

  wasm:
    name: wasm · clippy · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Generate card set files
        run: python3 cards/scripts/combine_sets.py
      - name: Clippy (wasm target)
        run: cargo clippy -p lorcana-wasm --target wasm32-unknown-unknown --all-features -- -D warnings
      - name: Unit tests (host)
        run: cargo test -p lorcana-wasm
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build wasm package
        run: bash scripts/build-wasm.sh

  web:
    name: web · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - uses: actions/setup-node@v5
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Generate card set files
        run: python3 cards/scripts/combine_sets.py
      - name: Build wasm package
        run: bash scripts/build-wasm.sh
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Type-check
        working-directory: web
        run: npm run check
      - name: Test
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npx vite build

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate card set files
        run: python3 cards/scripts/combine_sets.py
      - name: Generate coverage (lcov + summary)
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
          {
            echo '### Test coverage'
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v6
        with:
          name: lcov
          path: lcov.info
