# Cards for Lorcana set cp, in the engine's own TOML format.
# Generated by cards/scripts/from_lorcast.py from a Lorcast research
# dump (the external dataset itself is not committed). Structured
# fields + supported keywords only; text-based abilities are authored
# by hand via the effect DSL.

[[card]]
name = "A Whole New World"
type = "Song"
cost = 5
# text:
#   (A character with cost 5 or more can {E} to sing this song for free.)
#   Each player discards their hand and draws 7 cards.

[[card]]
name = "Baymax - Armored Companion"
type = "Character"
cost = 5
inkwell = true
strength = 2
willpower = 6
lore = 2
classifications = ["Storyborn", "Hero", "Robot"]
# text:
#   THE TREATMENT IS WORKING When you play this character and whenever he quests, you may remove up to 2 damage from another chosen character of yours. Gain 1 lore for each 1 damage removed this way.

[[card]]
name = "Cinderella - Stouthearted"
type = "Character"
cost = 7
inkwell = true
strength = 5
willpower = 5
lore = 3
classifications = ["Floodborn", "Hero", "Princess", "Knight"]
keywords = ["Resist 2", "Shift 5"]
# text:
#   Shift 5 (You may pay 5 {I} to play this on top of one of your characters named Cinderella.)
#   Resist +2 (Damage dealt to this character is reduced by 2.)
#   THE SINGING SWORD Whenever you play a song, this character may challenge ready characters this turn.

[[card]]
name = "Dragon Fire"
type = "Action"
cost = 5
# text:
#   Banish chosen character.

[[card.abilities]]
on = "play"
do = { banish = "chosen character" }

