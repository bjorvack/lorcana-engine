"address":[],"length":0,"stats":{"Line":480}},{"line":313,"address":[],"length":0,"stats":{"Line":49230}},{"line":314,"address":[],"length":0,"stats":{"Line":49230}},{"line":315,"address":[],"length":0,"stats":{"Line":57474}},{"line":316,"address":[],"length":0,"stats":{"Line":49122}},{"line":317,"address":[],"length":0,"stats":{"Line":41004}},{"line":318,"address":[],"length":0,"stats":{"Line":32904}},{"line":319,"address":[],"length":0,"stats":{"Line":24768}},{"line":320,"address":[],"length":0,"stats":{"Line":16416}},{"line":321,"address":[],"length":0,"stats":{"Line":0}}],"covered":110,"coverable":118},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","cards","mod.rs"],"content":"//! Card definitions, registry, and loading\n\npub mod ability;\npub mod card_kind;\npub mod definition;\npub mod dsl;\npub mod keyword;\npub mod loader;\npub mod registry;\n\n// Re-export for convenience\npub use ability::{\n    AbilityCost, ActivatedAbility, GameRuleStatic, StaticAbility, StaticTarget, TriggeredAbility,\n};\npub use card_kind::CardKind;\npub use definition::CardDefinition;\npub use dsl::TomlAbility;\npub use keyword::{Keyword, ShiftAbility, ShiftCost, ShiftKind};\npub use loader::{LoadError, TomlCard, load_toml, load_toml_from};\npub use registry::CardRegistry;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","cards","registry.rs"],"content":"//! Card registry: lookup of card definitions by id.\n\nuse super::definition::CardDefinition;\nuse crate::domain::types::ids::CardDefId;\nuse std::collections::BTreeMap;\n\n/// A lookup from [`CardDefId`] to its [`CardDefinition`].\n///\n/// This is reference data, kept separate from `GameState` (which holds only the\n/// mutable, reproducible game state). A `BTreeMap` keeps iteration order\n/// deterministic.\n#[derive(Debug, Clone, Default, PartialEq, Eq)]\npub struct CardRegistry {\n    definitions: BTreeMap\u003cCardDefId, CardDefinition\u003e,\n}\n\nimpl CardRegistry {\n    /// Create an empty registry.\n    #[must_use]\n    pub const fn new() -\u003e Self {\n        Self {\n            definitions: BTreeMap::new(),\n        }\n    }\n\n    /// Insert (or replace) a definition.\n    pub fn insert(\u0026mut self, definition: CardDefinition) {\n        let _ = self.definitions.insert(definition.id(), definition);\n    }\n\n    /// Look up a definition by id.\n    #[must_use]\n    pub fn get(\u0026self, id: CardDefId) -\u003e Option\u003c\u0026CardDefinition\u003e {\n        self.definitions.get(\u0026id)\n    }\n\n    /// Iterate all `(id, definition)` pairs (ascending id).\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = (CardDefId, \u0026CardDefinition)\u003e {\n        self.definitions.iter().map(|(id, def)| (*id, def))\n    }\n\n    /// The id of a card whose full name (or one of its names) matches `name` —\n    /// the lowest such id, since printings share a name (§2.1.1.3). Used to\n    /// resolve a plain-text deck list (which carries names, not printings).\n    #[must_use]\n    pub fn find_by_name(\u0026self, name: \u0026str) -\u003e Option\u003cCardDefId\u003e {\n        self.definitions\n            .iter()\n            .find(|(_, def)| def.has_name(name))\n            .map(|(id, _)| *id)\n    }\n}\n\nimpl FromIterator\u003cCardDefinition\u003e for CardRegistry {\n    fn from_iter\u003cI: IntoIterator\u003cItem = CardDefinition\u003e\u003e(iter: I) -\u003e Self {\n        let mut registry = Self::new();\n        for definition in iter {\n            registry.insert(definition);\n        }\n        registry\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":702}},{"line":22,"address":[],"length":0,"stats":{"Line":702}},{"line":27,"address":[],"length":0,"stats":{"Line":49332}},{"line":28,"address":[],"length":0,"stats":{"Line":197328}},{"line":33,"address":[],"length":0,"stats":{"Line":1168770}},{"line":34,"address":[],"length":0,"stats":{"Line":3506310}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":4110}},{"line":47,"address":[],"length":0,"stats":{"Line":4110}},{"line":49,"address":[],"length":0,"stats":{"Line":12508260}},{"line":50,"address":[],"length":0,"stats":{"Line":4110}},{"line":55,"address":[],"length":0,"stats":{"Line":51}},{"line":56,"address":[],"length":0,"stats":{"Line":102}},{"line":57,"address":[],"length":0,"stats":{"Line":3019}},{"line":58,"address":[],"length":0,"stats":{"Line":2968}},{"line":60,"address":[],"length":0,"stats":{"Line":51}}],"covered":15,"coverable":17},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","deck.rs"],"content":"//! Decks: a list of `(card, count)` plus construction/validation against the\n//! deck-building rules (§2.1.1) and the community plain-text share format.\n//!\n//! A deck stores only **card ids + counts**; all card data (name, ink, copy\n//! limit) is fetched from the [`CardRegistry`]. The plain-text format carries\n//! `count` + full **name** (no printing), so importing resolves each name to some\n//! printing and exporting groups printings back by name.\n\nuse crate::domain::cards::CardRegistry;\nuse crate::domain::types::card::InkType;\nuse crate::domain::types::ids::CardDefId;\nuse serde::{Deserialize, Serialize};\nuse std::collections::BTreeMap;\nuse std::fmt::Write as _;\n\n/// One deck entry: a card and how many copies.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct DeckCard {\n    /// The card (a specific printing).\n    pub card: CardDefId,\n    /// How many copies.\n    pub count: u32,\n}\n\n/// A deck: a name and its cards (ids + counts only).\n#[derive(Debug, Clone, Default, PartialEq, Eq, Serialize, Deserialize)]\npub struct Deck {\n    /// The deck's display name.\n    #[serde(default)]\n    pub name: String,\n    /// The cards and their counts.\n    #[serde(default)]\n    pub cards: Vec\u003cDeckCard\u003e,\n}\n\n/// A deck-building rule violation (§2.1.1).\n#[derive(Debug, Clone, PartialEq, Eq, thiserror::Error)]\npub enum DeckError {\n    /// Fewer than 60 cards (§2.1.1.1).\n    #[error(\"deck has {total} cards; at least 60 are required\")]\n    TooFewCards {\n        /// The deck's total card count.\n        total: u32,\n    },\n    /// More than two ink types (§2.1.1.2).\n    #[error(\"deck uses {count} ink types; at most 2 are allowed\")]\n    TooManyInks {\n        /// How many distinct ink types the deck uses.\n        count: usize,\n    },\n    /// More than the allowed copies of one full name (§2.1.1.3).\n    #[error(\"{name:?}: {count} copies exceed the limit of {max}\")]\n    TooManyCopies {\n        /// The full name.\n        name: String,\n        /// How many copies the deck has.\n        count: u32,\n        /// The allowed maximum (default 4, or the card's override).\n        max: u32,\n    },\n    /// A deck entry references a card not in the registry.\n    #[error(\"unknown card id {0:?}\")]\n    UnknownCard(CardDefId),\n    /// A plain-text line named a card not in the registry.\n    #[error(\"unknown card name {0:?}\")]\n    UnknownCardName(String),\n    /// A plain-text line couldn't be parsed as `\u003ccount\u003e \u003cname\u003e`.\n    #[error(\"malformed deck line {0:?}\")]\n    BadLine(String),\n}\n\nimpl Deck {\n    /// Total number of cards.\n    #[must_use]\n    pub fn total(\u0026self) -\u003e u32 {\n        self.cards.iter().map(|c| c.count).sum()\n    }\n\n    /// Add `count` copies of `card` (merging with any existing entry).\n    pub fn add(\u0026mut self, card: CardDefId, count: u32) {\n        if let Some(entry) = self.cards.iter_mut().find(|c| c.card == card) {\n            entry.count += count;\n        } else {\n            self.cards.push(DeckCard { card, count });\n        }\n    }\n\n    /// Expand to the flat list of card ids (each repeated `count` times), e.g. to\n    /// seed a game via `GameState::new`.\n    #[must_use]\n    pub fn expand(\u0026self) -\u003e Vec\u003cCardDefId\u003e {\n        let mut out = Vec::with_capacity(self.total() as usize);\n        for entry in \u0026self.cards {\n            for _ in 0..entry.count {\n                out.push(entry.card);\n            }\n        }\n        out\n    }\n\n    /// Check the deck against the deck-building rules, returning **all** violations.\n    ///\n    /// # Errors\n    /// Returns every [`DeckError`] found (empty `Ok` if the deck is legal).\n    pub fn validate(\u0026self, registry: \u0026CardRegistry) -\u003e Result\u003c(), Vec\u003cDeckError\u003e\u003e {\n        let mut errors = Vec::new();\n\n        // §2.1.1.1 — at least 60 cards.\n        let total = self.total();\n        if total \u003c 60 {\n            errors.push(DeckError::TooFewCards { total });\n        }\n\n        // Resolve definitions; collect ink identity and per-full-name counts.\n        let mut inks: Vec\u003cInkType\u003e = Vec::new();\n        let mut by_name: BTreeMap\u003cString, (u32, u32)\u003e = BTreeMap::new(); // name -\u003e (count, max)\n        for entry in \u0026self.cards {\n            let Some(def) = registry.get(entry.card) else {\n                errors.push(DeckError::UnknownCard(entry.card));\n                continue;\n            };\n            for ink in def.ink_types() {\n                if !inks.contains(ink) {\n                    inks.push(*ink);\n                }\n            }\n            let name = def.names().first().cloned().unwrap_or_default();\n            let slot = by_name\n                .entry(name)\n                .or_insert_with(|| (0, def.max_deck_copies()));\n            slot.0 += entry.count;\n            slot.1 = slot.1.max(def.max_deck_copies());\n        }\n\n        // §2.1.1.2 — at most two ink types (a dual-ink card commits both colours).\n        if inks.len() \u003e 2 {\n            errors.push(DeckError::TooManyInks { count: inks.len() });\n        }\n\n        // §2.1.1.3 — copies of one full name (printings share the budget).\n        for (name, (count, max)) in by_name {\n            if count \u003e max {\n                errors.push(DeckError::TooManyCopies { name, count, max });\n            }\n        }\n\n        if errors.is_empty() {\n            Ok(())\n        } else {\n            Err(errors)\n        }\n    }\n\n    /// Render the deck in the community plain-text format (`\u003ccount\u003e \u003cfull name\u003e`\n    /// per line), grouping printings by name (sorted). The printing is lost.\n    #[must_use]\n    pub fn to_text(\u0026self, registry: \u0026CardRegistry) -\u003e String {\n        let mut by_name: BTreeMap\u003cString, u32\u003e = BTreeMap::new();\n        for entry in \u0026self.cards {\n            let name = registry\n                .get(entry.card)\n                .and_then(|d| d.names().first().cloned())\n                .unwrap_or_else(|| format!(\"#{:?}\", entry.card));\n            *by_name.entry(name).or_default() += entry.count;\n        }\n        let mut out = String::new();\n        for (name, count) in by_name {\n            let _ = writeln!(out, \"{count} {name}\");\n        }\n        out\n    }\n\n    /// Parse the community plain-text format (`\u003ccount\u003e \u003cfull name\u003e` per line;\n    /// blank lines and `#` comments ignored), resolving each name to a printing.\n    ///\n    /// # Errors\n    /// Returns [`DeckError::BadLine`] / [`DeckError::UnknownCardName`] on the first\n    /// unparseable or unresolvable line.\n    pub fn from_text(text: \u0026str, registry: \u0026CardRegistry) -\u003e Result\u003cSelf, DeckError\u003e {\n        let mut deck = Self::default();\n        for raw in text.lines() {\n            let line = raw.trim();\n            if line.is_empty() || line.starts_with('#') {\n                continue;\n            }\n            let (count_str, name) = line\n                .split_once(char::is_whitespace)\n                .ok_or_else(|| DeckError::BadLine(line.to_string()))?;\n            let count: u32 = count_str\n                .trim_end_matches('x')\n                .parse()\n                .map_err(|_| DeckError::BadLine(line.to_string()))?;\n            let name = name.trim();\n            let card = registry\n                .find_by_name(name)\n                .ok_or_else(|| DeckError::UnknownCardName(name.to_string()))?;\n            deck.add(card, count);\n        }\n        Ok(deck)\n    }\n}\n","traces":[{"line":75,"address":[],"length":0,"stats":{"Line":489}},{"line":76,"address":[],"length":0,"stats":{"Line":1467}},{"line":80,"address":[],"length":0,"stats":{"Line":2391}},{"line":81,"address":[],"length":0,"stats":{"Line":69576}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":7173}},{"line":91,"address":[],"length":0,"stats":{"Line":195}},{"line":92,"address":[],"length":0,"stats":{"Line":585}},{"line":93,"address":[],"length":0,"stats":{"Line":5766}},{"line":94,"address":[],"length":0,"stats":{"Line":17100}},{"line":95,"address":[],"length":0,"stats":{"Line":23058}},{"line":98,"address":[],"length":0,"stats":{"Line":195}},{"line":105,"address":[],"length":0,"stats":{"Line":282}},{"line":106,"address":[],"length":0,"stats":{"Line":564}},{"line":109,"address":[],"length":0,"stats":{"Line":846}},{"line":110,"address":[],"length":0,"stats":{"Line":300}},{"line":111,"address":[],"length":0,"stats":{"Line":36}},{"line":115,"address":[],"length":0,"stats":{"Line":846}},{"line":116,"address":[],"length":0,"stats":{"Line":846}},{"line":117,"address":[],"length":0,"stats":{"Line":7881}},{"line":118,"address":[],"length":0,"stats":{"Line":22797}},{"line":119,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[],"length":0,"stats":{"Line":22917}},{"line":123,"address":[],"length":0,"stats":{"Line":15984}},{" s hand (\"for each card in your hand\").\n    CardsInHand,\n    /// The number of damage counters on the effect's source (\"for each 1 damage on\n    /// her\").\n    DamageOnSource,\n}\n\nimpl Amount {\n    /// A constant amount (the common case).\n    #[must_use]\n    pub const fn fixed(n: i32) -\u003e Self {\n        Self::Fixed(n)\n    }\n}\n\n/// Count-based conditions for effect gating (\"if you have more than 3 cards in\n/// your hand\", \"if you have more lore than each opponent\", etc.).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum CountCondition {\n    /// Controller has at least N cards in hand (\"if you have 3 or more cards\").\n    HandSizeAtLeast(u32),\n    /// Controller has more than N cards in hand (\"if you have more than 3 cards\").\n    HandSizeMoreThan(u32),\n    /// Controller has at least N lore (\"if you have 3 or more lore\").\n    LoreAtLeast(u32),\n    /// Controller has more than N lore (\"if you have more than 3 lore\").\n    LoreMoreThan(u32),\n    /// Controller has more lore than opponent (\"if you have more lore than each opponent\").\n    LoreMoreThanOpponent,\n}\n\n/// What a [`Effect::Move`] selects to move.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum MoveSource {\n    /// A target card (self / chosen / all-matching). Used for bounce, into-inkwell,\n    /// and return-to-deck.\n    Card(Target),\n    /// The top `count` cards of each player in `who`'s deck (milling / digging).\n    DeckTop {\n        /// Whose deck.\n        who: PlayerScope,\n        /// How many off the top.\n        count: Amount,\n    },\n}\n\n/// Where a [`Effect::Move`] sends cards.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Destination {\n    /// The owner's hand (\"return to hand\" / bounce).\n    Hand,\n    /// The owner's inkwell, facedown and exerted.\n    Inkwell,\n    /// The owner's discard (e.g. milling the top of a deck).\n    Discard,\n    /// The owner's deck, at the given position.\n    Deck(DeckPosition),\n}\n\n/// Which players an effect applies to.\n///\n/// The `Chosen*` variants require the controller to pick a player — a real\n/// decision with 2+ candidates (3–4 player games); they auto-resolve when there's\n/// only one candidate (e.g. a \"chosen opponent\" in a 2-player game). `Player` is\n/// the resolved single target.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum PlayerScope {\n    /// The controller only (\"you\").\n    You,\n    /// Each opponent of the controller.\n    EachOpponent,\n    /// Every player (controller and opponents).\n    EachPlayer,\n    /// One opponent the controller chooses (\"chosen opponent\").\n    ChosenOpponent,\n    /// Any one player the controller chooses, including themselves (\"chosen player\").\n    ChosenPlayer,\n    /// A specific, already-resolved player (the outcome of a `Chosen*` choice).\n    Player(PlayerId),\n}\n\n/// How the discarded cards are selected (§8.4).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize, Default)]\npub enum DiscardBy {\n    /// The discarding player chooses which of their own cards (hand unseen by the\n    /// chooser, \"chooses and discards\").\n    #[default]\n    Owner,\n    /// Cards are chosen uniformly at random (\"discards a card at random\").\n    Random,\n}\n\n/// How many cards a discard effect removes from a hand (§8.4).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum DiscardAmount {\n    /// Exactly N cards (the player chooses which, unless the hand is smaller).\n    Count(u32),\n    /// The player's whole hand (\"discard your hand\").\n    WholeHand,\n}\n\n/// When a delayed (floating) triggered ability fires (§7.4.7).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum DelayedWhen {\n    /// At the end of the current turn (\"at the end of this turn, …\").\n    EndOfTurn,\n}\n\n/// Where a card returned to a deck goes (§8.2).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum DeckPosition {\n    /// On top of the owner's deck.\n    Top,\n    /// On the bottom of the owner's deck.\n    Bottom,\n    /// Shuffled into the owner's deck.\n    Shuffle,\n}\n\n/// A built-in effect an ability or action can produce.\n///\n/// The structured effect / target / condition DSL (Slice 8): untargeted effects\n/// (draw, lore), and `Target`-based effects (`SelfCard` / `ChosenCharacter` /\n/// `AllCharacters` / `UpToCharacters` / `ChosenItem` / `ChosenLocation`, filtered\n/// by side / classification / name / cost / `{S}` / damaged / exerted) resolved\n/// via the `ChooseTarget` / `ChooseUpToN` pending decisions, \"[A] then [B]\"\n/// sequencing, and a board-condition guard (`IfControl`).\n///\n/// TODO(remaining — Slice 8b+): replacement effects (§7.7, e.g. \"takes no damage\n/// from the challenge\"), conditional-on-the-chosen-target (\"if a Villain is\n/// chosen, … instead\"), player targets, and effect-granted keywords. An\n/// `Effect::Custom(name)` escape hatch (compiled-in handler) remains the plan for\n/// the rare card the DSL can't express.\n// Not `Copy`: targeted variants carry a `Target`, which can hold a\n// `CharacterFilter` with classification strings.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum Effect {\n    /// Each player in `who` draws `amount` cards (\"draw 2 cards\" = `You`; \"each\n    /// player draws 3\"; \"chosen player draws 5\").\n    Draw {\n        /// Which players draw.\n        who: PlayerScope,\n        /// How many each draws.\n        amount: Amount,\n    },\n    /// Each player in `who` changes their lore by `amount` (positive = gain,\n    /// negative = lose, clamped at 0). \"Gain 2 lore\" = `You` +2; \"each opponent\n    /// loses 1 lore\" = `EachOpponent` -1; \"chosen opponent loses 1\" = `ChosenOpponent`.\n    Lore {\n        /// Which players' lore changes.\n        who: PlayerScope,\n        /// The signed lore change applied to each.\n        amount: Amount,\n    },\n    /// Move card(s) from one zone to another (§7, §8): the single zone-move\n    /// primitive. Covers \"return to hand\" (bounce), \"into your inkwell\", \"return\n    /// to deck\", and milling — `what` selects the cards, `to` is the destination.\n    Move {\n        /// Which cards move (a target card, or the top of a player's deck).\n        what: MoveSource,\n        /// Where they go.\n        to: Destination,\n    },\n    /// Give the target character `amount` Strength `{S}` until end of turn (e.g.\n    /// Support adds the source's current `{S}`; \"gets +N {S} this turn\").\n    GiveStrengthThisTurn {\n        /// Who is buffed/debuffed.\n        target: Target,\n        /// The signed `{S}` change.\n        amount: Amount,\n    },\n    /// Deal `amount` damage to the target character (§4.3.6.16, §9). Lethal damage\n    /// banishes it at the next game-state check.\n    DealDamage {\n        /// Who takes the damage.\n        target: Target,\n        /// How much damage (evaluated and clamped at 0).\n        amount: Amount,\n    },\n    /// Remove up to `amount` damage from the target character (§9.4; \"remove up to\n    /// N damage from chosen character\").\n    RemoveDamage {\n        /// Whose damage is removed.\n        target: Target,\n        /// How much damage to remove (evaluated and clamped at 0).\n        amount: Amount,\n    },\n    /// Move up to `amount` damage counters from `from` to `to` (§9.3; \"move up to\n    /// 2 damage from chosen character to this character\"). One side is usually\n    /// `SelfCard`; the other (chosen) side is resolved via targeting. The amount\n    /// moved is capped by the damage actually on `from`.\n    MoveDamage {\n        /// The character losing damage.\n        from: Target,\n        /// The character receiving it.\n        to: Target,\n        /// The maximum to move (\"up to N\").\n        amount: Amount,\n    },\n    /// Banish the target directly (not via damage) — \"banish chosen character\".\n    Banish(Target),\n    /// Exert the target (\"exert chosen opposing character\").\n    Exert(Target),\n    /// Ready the target (\"ready this character\" / \"ready chosen character\").\n    Ready(Target),\n    /// Freeze the target: it can't ready at the start of its next turn (the flag\n    /// is consumed at that ready step). Does **not** exert — compose with\n    /// [`Effect::Exert`] for \"exert chosen character; it can't ready…\".\n    Freeze(Target),\n    /// Grant the target a **triggered ability** until end of turn (\"gains\n    /// 'Whenever this character challenges, …' this turn\", §7.6). The granted\n    /// ability fires from the target alongside its printed triggers.\n    GrantAbilityThisTurn {\n        /// Who gains the ability.\n        target: Target,\n        /// When the granted ability fires.\n        condition: TriggerCondition,\n        /// What it does.\n        effect: Box\u003cSelf\u003e,\n        /// Whether the granted trigger is a \"you may\" (optional).\n        optional: bool,\n    },\n    /// Grant the target a continuous [`Property`] (keyword / restriction /\n    /// permission) until end of turn — \"gains Evasive\", \"can't quest\", \"can\n    /// challenge ready characters this turn\" (§10, §1.2.2).\n    GrantThisTurn {\n        /// Who is affected.\n        target: Target,\n        /// The granted property.\n        property: Property,\n    },\n    /// Grant a property (keyword / restriction / permission) to the target\n    /// **permanently** — it lasts while the target is in play (\"gains Evasive\",\n    /// §7.6). Contrast [`Effect::GrantThisTurn`] (until end of turn).\n    Grant {\n        /// Who is affected.\n        target: Target,\n        /// The granted property.\n        property: Property,\n    },\n    /// Grant a property to the target until its controller's **next ready step**\n    /// — the timing for \"can't ready / can't quest at the start of their next\n    /// turn\" effects (like freeze's `CantReady`, surviving the granter leaving).\n    GrantNextTurn {\n        /// Who is affected.\n        target: Target,\n        /// The granted property.\n        property: Property,\n    },\n    /// Grant the target an **activated** ability until end of turn (\"gains '{E} —\n    /// Draw a card' this turn\", §7.5). Usable like a printed activated ability.\n    GrantActivatedThisTurn {\n        /// Who gains the ability.\n        target: Target,\n        /// Ink cost to activate.\n        ink: u32,\n        /// Whether activating exerts the card.\n        exert_self: bool,\n        /// What the activated ability does.\n        effect: Box\u003cSelf\u003e,\n    },\n    /// Choose `target`, then apply `then` to it if it matches `filter`, else\n    /// `otherwise` (\"Chosen character gets +2 {S}; if a Villain character is\n    /// chosen, they get +3 instead\"). `then`/`otherwise` apply to the **chosen\n    /// target** (their own inner target is ignored).\n    IfTargetMatches {\n        /// Who is chosen.\n        target: Target,\n        /// The condition tested against the chosen target.\n        filter: CharacterFilter,\n        /// Applied to the target when it matches.\n        then: Box\u003cSelf\u003e,\n        /// Applied to the target when it doesn't.\n        otherwise: Box\u003cSelf\u003e,\n    },\n    /// Players in `who` discard cards from their hand (\"choose and discard 2\n    /// cards\"; \"each opponent chooses and discards a card\"; \"discard your hand\").\n    /// Each discarding player chooses which of their own cards (§8.4).\n    Discard {\n        /// Which players discard.\n        who: PlayerScope,\n        /// How many each discards.\n        amount: DiscardAmount,\n        /// How the discarded cards are selected — the player's own choice\n        /// (default) or at random (hand unseen, §8.4).\n        by: DiscardBy,\n    },\n    /// The named players reveal their hand (an information event — hand contents\n    /// are already known to the engine, §8.x; Dolores Madrigal / Copper / Nothing\n    /// to Hide).\n    RevealHand {\n        /// Whose hand is revealed.\n        whose: PlayerScope,\n    },\n    /// A chosen opponent reveals their hand and the **controller** picks a card\n    /// matching `filter` for them to discard (\"chosen opponent reveals their hand\n    /// and discards an action card of your choice\", Lenny / Timon / Goldie, §8.4).\n    /// Hand contents are already known to the engine, so the reveal is implicit.\n    OpponentDiscardsChosen {\n        /// Whose hand (the revealing opponent), usually `ChosenOpponent`.\n        whose: PlayerScope,\n        /// Which of their hand cards the controller may pick to discard.\n        filter: CharacterFilter,\n    },\n    /// The controller plays a card matching `filter` from their hand **for free**\n    /// (no ink), choosing which eligible card (§6). Wrap in [`Effect::May`] for\n    /// \"you may play …\".\n    PlayFreeFromHand {\n        /// Which hand cards are eligible.\n        filter: CharacterFilter,\n    },\n    /// Look at the top `count` cards of `whose` deck; the controller may take up to\n    /// `take_count` matching `filter` into their hand; the rest go to `rest` (§8.2).\n    /// \"Look at the top 4 cards … put a character into your hand, rest on the\n    /// bottom\"; `whose` is usually `You` but can be a chosen player's deck.\n    /// `take_count` defaults to 1 for backward compatibility.\n    LookAtTopAndTake {\n        /// Whose deck is looked at (resolved to a single deck owner).\n        whose: PlayerScope,\n        /// How many cards to look at.\n        count: u32,\n        /// How many matching cards the controller may take (defaults to 1).\n        take_count: u32,\n        /// Which of the looked-at cards the controller may take into hand.\n        filter: CharacterFilter,\n        /// Where the cards that aren't taken go (in the looked-at player's deck).\n        /// If `rest_per_card` is Some, this field is ignored.\n        rest: DeckPosition,\n        /// Whether the controller may reorder the looked-at cards before taking.\n        reorder: bool,\n        /// Optional per-card destinations (for split top/bottom effects like\n        /// Dr. Facilier). If Some, specifies the destination for each looked-at card\n        /// in order; cards taken to hand are not included. If None, `rest` is used\n        /// for all non-taken cards.\n        rest_per_card: Option\u003cVec\u003cDeckPosition\u003e\u003e,\n    },\n    /// Search `whose` deck for up to `take_count` cards matching `filter`, take them\n    /// into hand, then shuffle the deck. Unlike look-at-top, this searches the entire\n    /// deck (§8.2).\n    SearchDeckAndTake {\n        /// Whose deck to search (resolved to a single deck owner).\n        whose: PlayerScope,\n        /// How many matching cards the controller may take.\n        take_count: u32,\n        /// Which cards in the deck are eligible to be taken.\n        filter: CharacterFilter,\n    },\n    /// \"Name a card, then reveal the top card of your deck\": the controller names\n    /// a card; if the revealed top card has that name it goes to `match_to` and the\n    /// controller gains `lore_on_match`, otherwise it goes to `otherwise_to` (§8.2;\n    /// Merlin / Bruno / The Sorcerer's Hat).\n    NameThenReveal {\n        /// Lore gained when the revealed card matches the named card.\n        lore_on_match: Amount,\n        /// Where the revealed card goes on a match (hand / inkwell / …).\n        match_to: Destination,\n        /// Where it goes otherwise (usually the bottom of the deck).\n        otherwise_to: Destination,\n    },\n    /// \"Name a card, then return all character cards with that name from your\n    /// discard to your hand\" (§8.2; Blast from Your Past).\n    NameThenRecur,\n    /// Resolve a sequence of effects in order (\"draw a card **and** gain 1 lore\";\n    /// \"[A], then [B]\", §7.1.2). A later effect resumes after an earlier one's\n    /// choice is answered.\n    All(Vec\u003cSelf\u003e),\n    /// Optionally resolve `inner` (\"you may …\"): the controller is asked yes/no,\n    /// and `inner` resolves only on yes (§7.1.3). Composes optionality onto any\n    /// effect, so individual effects don't carry an `optional` flag.\n    May(Box\u003cSelf\u003e),\n    /// Schedule a one-shot **delayed** effect to resolve later (§7.4.7), e.g.\n    /// \"at the end of this turn, banish this character\".\n    ScheduleDelayed {\n        /// When the delayed effect fires.\n        when: DelayedWhen,\n        /// The effect resolved at that time.\n        effect: Box\u003cSelf\u003e,\n    },\n    /// Resolve `then` only if the controller has at least one in-play character\n    /// matching `filter` (\"if you have a character named X in play, …\", §7.1).\n    IfControl {\n        /// The board condition: the controller must have matching characters.\n        filter: CharacterFilter,\n        /// How many matching characters are required (\"if you have N or more …\").\n        /// `1` is plain \"if you have a …\".\n        at_least: u32,\n        /// The effect to resolve when the condition holds.\n        then: Box\u003cSelf\u003e,\n    },\n    /// Resolve `then` only if a count-based condition holds (hand size, lore,\n    /// comparisons, etc.).\n    IfCount {\n        /// The count condition to check.\n        condition: CountCondition,\n        /// The effect to resolve when the condition holds.\n        then: Box\u003cSelf\u003e,\n    },\n    /// \"Choose one: [A] • [B] • [C]\" — the controller picks one of the offered\n    /// effects to resolve (Anna / Baloo / Baymax's Healthcare Chip, §7.1.9).\n    ChooseOne {\n        /// The offered effects (2–4 options in practice; 2 is most common).\n        options: Vec\u003cSelf\u003e,\n        /// Whether the choice is optional (\"you may choose one\" vs mandatory).\n        optional: bool,\n    },\n}\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":5480}},{"line":39,"address":[],"length":0,"stats":{"Line":5480}}],"covered":2,"coverable":2},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","effects","mod.rs"],"content":"//! Effect system for card abilities and game actions\n\npub mod effect;\npub mod target;\npub mod trigger;\n\n// Re-export for convenience\npub use effect::{\n    Amount, CountCondition, DeckPosition, DelayedWhen, Destination, DiscardAmount, DiscardBy,\n    Effect, MoveSource, PlayerScope,\n};\npub use target::{CharacterFilter, Comparison, NumericFilter, Target, TargetSide};\npub use trigger::{CardCategory, TriggerCondition};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","effects","target.rs"],"content":"//! Targets that an effect applies to (§7.1).\n\nuse super::trigger::CardCategory;\nuse crate::domain::types::card::Classification;\nuse crate::domain::types::ids::CardId;\nuse serde::{Deserialize, Serialize};\n\n/// Which side a character may be on, relative to the effect's controller.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum TargetSide {\n    /// Any character (yours or an opponent's).\n    Any,\n    /// One of your characters.\n    Yours,\n    /// An opposing character.\n    Opposing,\n}\n\n/// How a numeric characteristic is compared against a threshold (§7.1).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Comparison {\n    /// \"N or less\".\n    AtMost,\n    /// \"N or more\".\n    AtLeast,\n    /// Exactly N.\n    Exactly,\n}\n\n/// A `comparison` against a numeric `value` (e.g. cost 2 or less).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct NumericFilter {\n    /// The comparison.\n    pub comparison: Comparison,\n    /// The threshold.\n    pub value: u32,\n}\n\nimpl NumericFilter {\n    /// \"value or less\".\n    #[must_use]\n    pub const fn at_most(value: u32) -\u003e Self {\n        Self {\n            comparison: Comparison::AtMost,\n            value,\n        }\n    }\n    /// \"value or more\".\n    #[must_use]\n    pub const fn at_least(value: u32) -\u003e Self {\n        Self {\n            comparison: Comparison::AtLeast,\n            value,\n        }\n    }\n    /// Whether `actual` satisfies this comparison.\n    #[must_use]\n    pub const fn matches(self, actual: u32) -\u003e bool {\n        match self.comparison {\n            Comparison::AtMost =\u003e actual \u003c= self.value,\n            Comparison::AtLeast =\u003e actual \u003e= self.value,\n            Comparison::Exactly =\u003e actual == self.value,\n        }\n    }\n}\n\n/// Which characters an effect may apply to / choose from (§7.1, §6.2.6).\n///\n/// A small **boolean algebra** of predicates: leaf predicates (side,\n/// classification, name, cost, current `{S}`/`{W}`/`{L}`, damaged/exerted, the\n/// source card, a\n/// specific card) combined with `And` / `Or` / `Not`. This composes — \"another\n/// Villain you have in play with cost 3 or less\" is just\n/// `And([Side(Yours), Classification(Villain), Cost(≤3), Not(IsSource)])` — and\n/// the same exclusion predicates express \"another …\" and \"not the already-chosen\n/// card\" uniformly. Cost is the printed cost; strength is the current `{S}`.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum CharacterFilter {\n    /// Matches any character.\n    Any,\n    /// On the given side relative to the effect's controller.\n    Side(TargetSide),\n    /// Has the given classification.\n    Classification(Classification),\n    /// Is of the given card category (character / action / song / item /\n    /// location). Lets one filter vocabulary cover hand/deck cards too (§6).\n    Category(CardCategory),\n    /// Counts as the given name (\"named X\").\n    Named(String),\n    /// Printed ink cost satisfies the numeric filter.\n    Cost(NumericFilter),\n    /// Current `{S}` satisfies the numeric filter.\n    Strength(NumericFilter),\n    /// Current `{W}` (willpower) satisfies the numeric filter.\n    Willpower(NumericFilter),\n    /// Current `{L}` (lore) satisfies the numeric filter.\n    Lore(NumericFilter),\n    /// Damaged (`true`) or undamaged (`false`).\n    Damaged(bool),\n    /// Exerted (`true`) or ready (`false`).\n    Exerted(bool),\n    /// The effect's source card itself.\n    IsSource,\n    /// A specific card (e.g. an already-chosen target).\n    IsCard(CardId),\n    /// All sub-filters match (empty ⇒ matches anything).\n    And(Vec\u003cSelf\u003e),\n    /// At least one sub-filter matches (empty ⇒ matches nothing).\n    Or(Vec\u003cSelf\u003e),\n    /// The sub-filter does not match.\n    Not(Box\u003cSelf\u003e),\n}\n\nimpl CharacterFilter {\n    /// A filter matching any character on `side`.\n    #[must_use]\n    pub const fn any(side: TargetSide) -\u003e Self {\n        Self::Side(side)\n    }\n\n    /// Combine with another predicate via AND (flattening nested `And`s).\n    #[must_use]\n    pub fn and(self, other: Self) -\u003e Self {\n        match self {\n            Self::And(mut fs) =\u003e {\n                fs.push(other);\n                Self::And(fs)\n            }\n            first =\u003e Self::And(vec![first, other]),\n        }\n    }\n\n    /// Negate a filter (`Not`), boxing for you.\n    #[must_use]\n    pub fn negate(inner: Self) -\u003e Self {\n        Self::Not(Box::new(inner))\n    }\n}\n\n/// What an effect applies to.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum Target {\n    /// The effect's source card itself (\"this card/character\").\n    SelfCard,\n    /// A specific, already-resolved card — the outcome of resolving a chosen\n    /// target (e.g. the first pick of a two-target move-damage). Not authored on\n    /// cards directly.\n    Card(CardId),\n    /// A single character the controller chooses at resolution (§7.1). \"Another\n    /// chosen …\" is expressed by the `filter` (`Not(IsSource)`).\n    ChosenCharacter {\n        /// Which characters are eligible to be chosen.\n        filter: CharacterFilter,\n    },\n    /// **Every** character matching the filter, with no choice (\"your Pirate\n    /// characters\", \"all opposing characters\"). \"Your *other* …\" is expressed by\n    /// the `filter` (`Not(IsSource)`).\n    AllCharacters {\n        /// Which characters are affected.\n        filter: CharacterFilter,\n    },\n    /// **Up to `max`** distinct chosen characters matching the filter (§7.1.8);\n    /// the effect applies to each. 0 is a legal choice (\"Up to 2 chosen\n    /// characters get -1 {S}\").\n    UpToCharacters {\n        /// Which characters are eligible.\n        filter: CharacterFilter,\n        /// The maximum number that may be chosen.\n        max: u32,\n    },\n    /// A single in-play **permanent** (character / item / location) the controller\n    /// chooses, described by the filter algebra — e.g. \"chosen item\" is\n    /// `Category(Item)`, \"chosen opposing location\" is\n    /// `And([Side(Opposing), Category(Location)])` (§6.4, §6.5).\n    ChosenPermanent {\n        /// Which permanents are eligible to be chosen.\n        filter: CharacterFilter,\n    },\n}\n","traces":[{"line":42,"address":[],"length":0,"stats":{"Line":16}},{"line":50,"address":[],"length":0,"stats":{"Line":8}},{"line":58,"address":[],"length":0,"stats":{"Line":66}},{"line":59,"address":[],"length":0,"stats":{"Line":66}},{"line":60,"address":[],"length":0,"stats":{"Line":51}},{"line":61,"address":[],"length":0,"stats":{"Line":15}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":6474}},{"line":118,"address":[],"length":0,"stats":{"Line":6474}},{"line":123,"address":[],"length":0,"stats":{"Line":2728}},{"line":124,"address":[],"length":0,"stats":{"Line":2728}},{"line":125,"address":[],"length":0,"stats":{"Line":565}},{"line":126,"address":[],"length":0,"stats":{"Line":1695}},{"line":127,"address":[],"length":0,"stats":{"Line":565}},{"line":129,"address":[],"length":0,"stats":{"Line":6489}},{"line":135,"address":[],"length":0,"stats":{"Line":1136}},{"line":136,"address":[],"length":0,"stats":{"Line":1136}}],"covered":16,"coverable":17},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","effects","trigger.rs"],"content":"//! Trigger conditions for triggered abilities (§7.4).\n\nuse crate::domain::types::card::Classification;\nuse serde::{Deserialize, Serialize};\n\n/// A category of card a \"whenever you play a …\" trigger watches for (§7.4).\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum CardCategory {\n    /// A character, optionally filtered by a classification (\"a Floodborn\n    /// character\"); `None` matches any character.\n    Character(Option\u003cClassification\u003e),\n    /// An action.\n    Action,\n    /// A song (an action with the Song classification).\n    Song,\n    /// An item.\n    Item,\n    /// A location.\n    Location,\n}\n\n/// The condition that makes a triggered ability fire (§7.4.2).\n///\n/// Kept deliberately small: only the conditions Slice 4 actually wires up are\n/// modeled. New variants are added as later slices need them — see the TODO\n/// below for the full space found by surveying the card pool (2,314 cards with\n/// text). When adding a variant, also add: (a) detection in the engine (match it\n/// against the relevant `GameEvent`), and (b) a scenario test.\n///\n/// TODO(trigger taxonomy — add variants as needed, grounded in the card survey):\n/// The rollout (which slice each kind lands in, plus the cross-scope\n/// event→trigger matcher) is tracked in `docs/planning/IMPLEMENTATION_PLAN.md`\n/// under \"Trigger taxonomy rollout\" (after Slice 4).\n/// Most conditions also carry a *scope* filter naming which card the trigger\n/// watches: `This` | `YoursOther` | `Yours` | `Any` | `Opposing` (and locations'\n/// \"while here\"). Approximate frequencies in parentheses.\n///   - Play / enters-play of another card by type/classification (~90):\n///     \"Whenever you play a song / action / character / Floodborn / [class]…\".\n///     (Self ETB and self-quest are the two implemented below.)\n///   - Banish (~85): \"When this character is banished\", \"…is banished in a\n///     challenge\", \"…is challenged and banished\", \"whenever one of your\n///     characters is banished\", \"whenever this character banishes another\n///     character in a challenge\".\n///   - Challenge (~50): \"whenever this character challenges\", \"…is challenged\".\n///   - Turn boundaries: \"at the start of your turn\" (41), \"at the end of your\n///     turn\" (32).\n///   - Damage (~16): \"whenever this character is dealt damage\", \"whenever an\n///     opposing character is damaged\", \"whenever you remove damage…\".\n///   - Sing a song (6): \"whenever this character sings a song\".\n///   - Card put under a character (Boost, ~10); card put into the inkwell;\n///     \"whenever you ready this character\"; move to a location / \"quests while\n///     here\" (location); draw; leaves play.\n///\n/// These pair with the effect DSL (see `effects::effect`) and the bag.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum TriggerCondition {\n    /// \"When you play this character/item/location\" — fires on the source card\n    /// entering play (the dominant trigger, ~480 cards).\n    WhenYouPlayThis,\n    /// \"When you play this character/item/location via Shift\" — fires only if\n    /// the card was played using its Shift ability (~23 cards).\n    WhenYouPlayThisWithShift,\n    /// \"Whenever this character quests\" (~200 cards).\n    WhenThisQuests,\n    /// \"Whenever you play a [category]\" — fires on another card the controller\n    /// plays that matches the category (~90 cards).\n    WhenYouPlay(CardCategory),\n    /// \"Whenever this character challenges another character\" — fires for the\n    /// challenger when it is declared (§4.3.6).\n    WhenThisChallenges,\n    /// \"Whenever this character is challenged\" — fires for the challenged\n    /// character (§4.3.6).\n    WhenChallenged,\n    /// \"Whenever this character banishes another character in a challenge\"\n    /// (§4.3.6.16) — fires for the challenger when its challenge target is\n    /// banished.\n    WhenBanishesInChallenge,\n    /// \"When this character/location is banished\" — fires for a card as it leaves\n    /// play to the discard (§1.9.1.1, §9.4).\n    WhenBanished,\n    /// \"When this character is banished **in a challenge**\" — the banished-side\n    /// counterpart of `WhenBanishesInChallenge` (Marshmallow, `HeiHei`).\n    WhenBanishedInChallenge,\n    /// \"Whenever a card is put under this character\" — fires when a card is placed\n    /// under this one (e.g. via Boost, §10.4).\n    WhenCardPutUnder,\n    /// \"At the start of your turn\" — fires for the active player's cards and\n    /// resolves in the Set step (§4.2.2.3).\n    AtStartOfTurn,\n    /// \"At the end of your turn\" — fires for the active player's cards and\n    /// resolves in the End of Turn phase (§4.4.1).\n    AtEndOfTurn,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","engine","input.rs"],"content":"//! Player inputs and the reasons an input may be rejected.\n\nuse crate::domain::game::TriggerId;\nuse crate::domain::types::ids::{CardId, PlayerId};\nuse serde::{Deserialize, Serialize};\nuse thiserror::Error;\n\n/// An input submitted to the engine. Inputs (plus the seed) are the complete,\n/// replayable record of a game; the engine emits events in response.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum Input {\n    /// Alter-hand decision: put these hand cards on the bottom of the deck, then\n    /// draw back up to a full hand and reshuffle (§3.1.6).\n    Mulligan {\n        /// The player making the decision (must be the one currently awaited).\n        player: PlayerId,\n        /// The cards to put on the bottom of the deck (may be empty).\n        put_back: Vec\u003cCardId\u003e,\n    },\n    /// Put a card from the active player's hand into their inkwell (§4.3.3).\n    PutCardInInkwell {\n        /// The hand card to ink.\n        card: CardId,\n    },\n    /// Play a card from the active player's hand (§4.3.4). Normally pays the ink\n    /// cost; if `shift_onto` is `Some`, plays via **Shift** onto that in-play\n    /// character instead, paying the shift cost (§10.10).\n    PlayCard {\n        /// The hand card to play.\n        card: CardId,\n        /// If set, the in-play character to Shift onto.\n        shift_onto: Option\u003cCardId\u003e,\n    },\n    /// Send one of the active player's characters on a quest (§4.3.5).\n    Quest {\n        /// The character to quest with.\n        character: CardId,\n    },\n    /// Use a character's Boost ability: pay its ink cost to put the top deck card\n    /// facedown under it (§10.4), once per turn.\n    Boost {\n        /// The character to boost.\n        card: CardId,\n    },\n    /// Move one of the active player's characters to one of their locations,\n    /// paying the location's move cost (§4.3.7).\n    MoveCharacter {\n        /// The character to move.\n        character: CardId,\n        /// The destination location.\n        location: CardId,\n    },\n    /// Sing a song (§6.3.3): play it for free by exerting one or more of the\n    /// active player's dry, ready characters whose (Singer-adjusted) cost meets\n    /// the song's cost (or, for several singers, its Sing Together value, §10.12).\n    Sing {\n        /// The song card in hand to sing.\n        song: CardId,\n        /// The character(s) exerted to sing it.\n        singers: Vec\u003cCardId\u003e,\n    },\n    /// Challenge an exerted opposing character with one of the active player's\n    /// characters (§4.3.6).\n    Challenge {\n        /// The active player's challenging character.\n        challenger: CardId,\n        /// The opposing character being challenged.\n        target: CardId,\n    },\n    /// Use an activated ability of one of the active player's in-play cards\n    /// (§7.5). `ability` indexes the source's activated abilities.\n    UseAbility {\n        /// The in-play card whose ability is being used.\n        card: CardId,\n        /// The index of the activated ability on that card.\n        ability: usize,\n    },\n    /// End the active player's turn (§4.4).\n    EndTurn,\n    /// Answer the engine's currently pending decision (bag resolution, §8.7).\n    Decide(Decision),\n}\n\n/// A player's answer to a [`PendingDecision`](crate::domain::game::PendingDecision).\n// Not `Copy`: `ChooseTargets` carries a `Vec`.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum Decision {\n    /// For `OrderTriggers`: the next of your bag triggers to resolve (§8.7.4).\n    ResolveNext(TriggerId),\n    /// For `MayResolve`: whether to apply an optional (\"you may\") trigger.\n    May(bool),\n    /// For `EnterPlayExerted`: whether a Bodyguard enters play exerted (§10.3.2).\n    EnterExerted(bool),\n    /// For `ChooseTarget`: the target card chosen for the resolving effect (§7.1).\n    ChooseTarget(CardId),\n    /// For `ChooseUpToN`: the 0..N distinct targets chosen (§7.1.8).\n    ChooseTargets(Vec\u003cCardId\u003e),\n    /// For `ChooseCardsToDiscard`: the exact cards from hand to discard (§8.4).\n    DiscardCards(Vec\u003cCardId\u003e),\n    /// For `ChoosePlayFree`: the eligible hand card chosen to play for free (§6).\n    PlayFreeChoice(CardId),\n    /// For `ChooseFromRevealed`: the looked-at card taken into hand, or `None` to\n    /// take nothing (§8.2).\n    TakeRevealed(Option\u003cCardId\u003e),\n    /// For `ChoosePlayer`: the player chosen for a `Chosen*`-scoped effect.\n    ChoosePlayer(PlayerId),\n    /// For `NameCard`: the card name the player names (§8.2).\n    NameCard(String),\n    /// For `ChooseOne`: the index of the chosen effect option (§7.1.9).\n    ChooseOption(u32),\n}\n\n/// Why an [`Input`] was rejected. When an input is rejected the game state is\n/// left unchanged.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Error)]\npub enum Rejected {\n    /// `start` was called on a game that is not in the `NotStarted` state.\n    #[error(\"the game has already been started\")]\n    AlreadyStarted,\n    /// A mulligan was submitted while the game is not awaiting one.\n    #[error(\"the game is not awaiting a mulligan\")]\n    NotAwaitingMulligan,\n    /// A mulligan was submitted by the wrong player.\n    #[error(\"it is not that player's turn to mulligan\")]\n    WrongMulliganPlayer,\n    /// A mulligan put-back card is not in the player's hand.\n    #[error(\"mulligan put-back card {0:?} is not in the player's hand\")]\n    MulliganCardNotInHand(CardId),\n    /// A turn action was submitted while the game is not in progress.\n    #[error(\"the game is not in progress\")]\n    NotPlaying,\n    /// A turn action was submitted outside the Main phase.\n    #[error(\"that action can only be taken during the Main phase\")]\n    NotMainPhase,\n    /// The named card is not in the active player's hand.\n    #[error(\"card {0:?} is not in the active player's hand\")]\n    CardNotInHand(CardId),\n    /// The named card has no known definition in the registry.\n    #[error(\"card {0:?} has no definition in the registry\")]\n    UnknownCard(CardId),\n    /// The named card does not have the inkwell symbol (§4.3.3.1).\n    #[error(\"card {0:?} cannot be put into the inkwell\")]\n    NoInkwellSymbol(CardId),\n    /// The once-per-turn inkwell action has already been used (§4.3.3).\n    #[error(\"a card has already been put into the inkwell this turn\")]\n    AlreadyInkedThisTurn,\n    /// There is not enough ready ink to pay the card's cost (§4.3.4.6).\n    #[error(\"not enough ready ink to play card {0:?}\")]\n    InsufficientInk(CardId),\n    /// This card type cannot be played yet (only characters are supported so\n    /// far; items, locations, and actions arrive in later slices).\n    #[error(\"card {0:?} is of a type that cannot be played yet\")]\n    CardTypeNotPlayableYet(CardId),\n    /// The named character is not in the active player's play area.\n    #[error(\"character {0:?} is not in play\")]\n    CharacterNotInPlay(CardId),\n    /// The named card in play is not a character and so cannot quest (§6.1.3).\n    #[error(\"card {0:?} is not a character\")]\n    NotACharacter(CardId),\n    /// The character is still drying and cannot quest this turn (§4.3.5.5).\n    #[error(\"character {0:?} is still drying and cannot quest\")]\n    CharacterStillDrying(CardId),\n    /// The character is exerted and so cannot be declared as questing or\n    /// challenging (§4.3.5, §4.3.6.6).\n    #[error(\"character {0:?} is exerted\")]\n    CharacterExerted(CardId),\n    /// The challenge target is not an opposing card in play.\n    #[error(\"challenge target {0:?} is not an opposing card in play\")]\n    TargetNotInPlay(CardId),\n    /// The challenge target is not a character.\n    #[error(\"challenge target {0:?} is not a character\")]\n    TargetNotACharacter(CardId),\n    /// The challenge target is ready; only exerted characters can be challenged\n    /// (§4.3.6.7).\n    #[error(\"challenge target {0:?} is not exerted\")]\n    TargetNotExerted(CardId),\n    /// The target has Evasive and the challenger is neither Evasive nor Alert\n    /// (§10.6, §10.2).\n    #[error(\"challenge target {0:?} is Evasive and can't be challenged by this character\")]\n    TargetEvasive(CardId),\n    /// The defender has a challengeable Bodyguard, so the challenger must choose\n    /// a Bodyguard (§10.3.3).\n    #[error(\"must challenge a Bodyguard instead of {0:?}\")]\n    MustChallengeBodyguard(CardId),\n    /// A turn action was submitted while the engine is awaiting a decision; the\n    /// pending decision must be answered first (§8.7).\n    #[error(\"the engine is awaiting a decision; answer it before acting\")]\n    AwaitingDecision,\n    /// A `Decide` input was submitted when no decision is pending.\n    #[error(\"there is no pending decision to answer\")]\n    NoPendingDecision,\n    /// The `Decide` answer doesn't match the pending decision.\n    #[error(\"that answer does not match the pending decision\")]\n    InvalidDecision,\n    /// The card has no activated ability at the given index.\n    #[error(\"card {0:?} has no activated ability at the given index\")]\n    NoSuchAbility(CardId),\n    /// The card has no Shift ability, so it can't be played via Shift (§10.10).\n    #[error(\"card {0:?} has no Shift ability\")]\n    CannotShift(CardId),\n    /// The card has no Boost ability (§10.4).\n    #[error(\"card {0:?} has no Boost ability\")]\n    CannotBoost(CardId),\n    /// The character already used Boost this turn (§10.4.1).\n    #[error(\"card {0:?} has already boosted this turn\")]\n    AlreadyBoosted(CardId),\n    /// The deck is empty, so there is no card to put under via Boost (§10.4.1).\n    #[error(\"the deck is empty\")]\n    DeckEmpty,\n    /// The move destination isn't one of the active player's locations (§4.3.7.1).\n    #[error(\"{0:?} is not your location\")]\n    NotALocation(CardId),\n    /// The card being sung is not a song (§6.3.3.2).\n    #[error(\"card {0:?} is not a song\")]\n    NotASong(CardId),\n    /// A chosen singer isn't an eligible character (not your dry, ready character)\n    /// (§6.3.3.3).\n    #[error(\"{0:?} can't sing right now\")]\n    InvalidSinger(CardId),\n    /// The singers don't meet the song's cost / Sing Together requirement\n    /// (§6.3.3.3, §10.12).\n    #[error(\"the chosen singers can't pay for song {0:?}\")]\n    CannotSing(CardId),\n    /// The Shift target isn't a valid character to shift onto (wrong owner,\n    /// name, or classification) (§10.10).\n    #[error(\"{0:?} is not a valid Shift target\")]\n    InvalidShiftTarget(CardId),\n    /// A prevention stops this character from questing — Reckless (§10.7.2) or an\n    /// effect (§1.2.2).\n    #[error(\"character {0:?} can't quest\")]\n    CharacterCannotQuest(CardId),\n    /// A prevention stops this character from challenging (§1.2.2).\n    #[error(\"character {0:?} can't challenge\")]\n    CharacterCannotChallenge(CardId),\n    /// The challenge target can't be challenged (§1.2.2).\n    #[error(\"challenge target {0:?} can't be challenged\")]\n    TargetCannotBeChallenged(CardId),\n    /// The turn can't end while Reckless character {0:?} can still challenge\n    /// (§10.7.3).\n    #[error(\"Reckless character {0:?} must challenge before the turn can end\")]\n    RecklessMustChallenge(CardId),\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","engine","mod.rs"],"content":"//! The engine: setup and the input-driven reducer.\n\npub mod input;\npub mod reducer;\n\n// Re-export for convenience\npub use input::{Decision, Input, Rejected};\npub use reducer::{apply, start};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","engine","reducer.rs"],"content":"//! The reducer: `start` sets a game up, `apply` advances it by one input.\n\nuse super::input::{Decision, Input, Rejected};\nuse crate::domain::cards::{\n    CardDefinition, CardKind, CardRegistry, GameRuleStatic, Keyword, ShiftAbility, ShiftCost,\n    ShiftKind, StaticAbility, StaticTarget,\n};\nuse crate::domain::effects::{\n    Amount, CardCategory, CharacterFilter, CountCondition, DeckPosition, DelayedWhen, Destination,\n    DiscardAmount, DiscardBy, Effect, MoveSource, PlayerScope, Target, TargetSide,\n    TriggerCondition,\n};\nuse crate::domain::game::{\n    CardInstance, CharacterStats, ChoiceRef, ChoiceThen, Conditions, DelayedTrigger, GameEvent,\n    GameState, GameStatus, GrantedActivated, GrantedTrigger, LocationStats, ModifierDuration,\n    ModifierTarget, PendingDecision, Permission, PlayerState, Property, PropertyModifier,\n    Restriction, RuleModifier, Stat, StatModifier, TriggerId,\n};\nuse crate::domain::rules::game_state_check;\nuse crate::domain::types::card::Classification;\nuse crate::domain::types::ids::{CardDefId, CardId, PlayerId};\nuse crate::domain::types::turn::{Phase, Step};\n\n/// The opening hand size (§3.1.5).\nconst OPENING_HAND_SIZE: usize = 7;\n\n/// Start a not-yet-started game: pick the starting player from the seeded RNG,\n/// deal opening hands, and enter the mulligan phase (§3.1).\n///\n/// # Errors\n///\n/// Returns [`Rejected::AlreadyStarted`] if the game is not in the `NotStarted`\n/// state.\n///\n/// # Panics\n///\n/// Panics if the game has more than `u8::MAX` players.\npub fn start(state: \u0026mut GameState) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    if !matches!(state.status(), GameStatus::NotStarted) {\n        return Err(Rejected::AlreadyStarted);\n    }\n\n    let player_count = state.player_count();\n    let starting_seat = state.rng_mut().below(player_count);\n    let starting = seat(starting_seat);\n    state.set_active_player(starting);\n\n    for index in 0..player_count {\n        let player = seat(index);\n        for _ in 0..OPENING_HAND_SIZE {\n            deal_one(state, player);\n        }\n    }\n\n    state.set_status(GameStatus::AwaitingMulligan(starting));\n    Ok(vec![GameEvent::HandsDealt])\n}\n\n/// Apply a single input, returning the events it produced. On `Err` the state is\n/// left unchanged.\n///\n/// # Errors\n///\n/// Returns a [`Rejected`] describing why the input was illegal.\n///\n/// # Panics\n///\n/// Panics if the game has more than `u8::MAX` players.\npub fn apply(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    input: Input,\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    // A pending decision must be answered before any other input (§8.7).\n    if let Input::Decide(decision) = input {\n        return apply_decision(state, registry, decision);\n    }\n    if state.is_awaiting_decision() {\n        return Err(Rejected::AwaitingDecision);\n    }\n\n    match input {\n        Input::Mulligan { player, put_back } =\u003e apply_mulligan(state, registry, player, \u0026put_back),\n        Input::PutCardInInkwell { card } =\u003e apply_put_in_inkwell(state, registry, card),\n        Input::PlayCard { card, shift_onto } =\u003e apply_play_card(state, registry, card, shift_onto),\n        Input::Quest { character } =\u003e apply_quest(state, registry, character),\n        Input::Boost { card } =\u003e apply_boost(state, registry, card),\n        Input::MoveCharacter {\n            character,\n            location,\n        } =\u003e apply_move(state, character, location),\n        Input::Sing { song, singers } =\u003e apply_sing(state, registry, song, \u0026singers),\n        Input::Challenge { challenger, target } =\u003e {\n            apply_challenge(state, registry, challenger, target)\n        }\n        Input::UseAbility { card, ability } =\u003e apply_use_ability(state, registry, card, ability),\n        Input::EndTurn =\u003e apply_end_turn(state, registry),\n        Input::Decide(_) =\u003e unreachable!(\"handled above\"),\n    }\n}\n\nfn apply_mulligan(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    player: PlayerId,\n    put_back: \u0026[CardId],\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    // --- validate (no mutation yet) ---\n    let GameStatus::AwaitingMulligan(expected) = *state.status() else {\n        return Err(Rejected::NotAwaitingMulligan);\n    };\n    if player != expected {\n        return Err(Rejected::WrongMulliganPlayer);\n    }\n    let hand = state.player(player).expect(\"awaited player exists\").hand();\n    for \u0026card in put_back {\n        if !hand.contains(card) {\n            return Err(Rejected::MulliganCardNotInHand(card));\n        }\n    }\n\n    // --- mutate ---\n    let returned = u32::try_from(put_back.len()).expect(\"hand fits in u32\");\n    {\n        let p = state.player_mut(player).expect(\"awaited player exists\");\n        for \u0026card in put_back {\n            if let Some(instance) = p.hand_mut().take(card) {\n                p.deck_mut().insert_bottom(instance);\n            }\n        }\n        while p.hand().len() \u003c OPENING_HAND_SIZE {\n            let Some(instance) = p.deck_mut().pop_top() else {\n                break;\n            };\n            p.hand_mut().push(instance);\n        }\n    }\n    if returned \u003e= 1 {\n        state.shuffle_deck(player);\n    }\n\n    let mut events = vec![GameEvent::MulliganResolved { player, returned }];\n    events.extend(advance_after_mulligan(state, registry, player));\n    Ok(events)\n}\n\n/// Move mulligan to the next player in turn order, or start the first turn.\nfn advance_after_mulligan(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    just_resolved: PlayerId,\n) -\u003e Vec\u003cGameEvent\u003e {\n    let player_count = state.player_count();\n    let starting = usize::from(state.active_player().index());\n    let offset = (usize::from(just_resolved.index()) + player_count - starting) % player_count;\n\n    if offset + 1 \u003e= player_count {\n        state.set_status(GameStatus::Playing);\n        begin_turn(state, registry, true)\n    } else {\n        let next = (starting + offset + 1) % player_count;\n        state.set_status(GameStatus::AwaitingMulligan(seat(next)));\n        Vec::new()\n    }\n}\n\nfn apply_put_in_inkwell(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    card: CardId,\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    // --- validate (no mutation yet) ---\n    if !matches!(state.status(), GameStatus::Playing) {\n        return Err(Rejected::NotPlaying);\n    }\n    if state.phase() != Phase::Main {\n        return Err(Rejected::NotMainPhase);\n    }\n    let active = state.active_player();\n    let definition_id = hand_card_definition(state, active, card)?;\n    let definition = registry\n        .get(definition_id)\n        .ok_or(Rejected::UnknownCard(card))?;\n    if !definition.has_inkwell_symbol() {\n        return Err(Rejected::NoInkwellSymbol(card));\n    }\n    if state.inked_this_turn() {\n        return Err(Rejected::AlreadyInkedThisTurn);\n    }\n\n    // --- mutate ---\n    {\n        let p = state.player_mut(active).expect(\"active player exists\");\n        let mut instance = p.hand_mut().take(card).expect(\"validated present\");\n        *instance.conditions_mut() = Conditions::in_inkwell();\n        p.inkwell_mut().push(instance);\n    }\n    state.set_inked_this_turn(true);\n\n    let mut events = vec![GameEvent::CardPutInInkwell {\n        player: active,\n        card,\n    }];\n    events.extend(game_state_check(state));\n    Ok(events)\n}\n\n/// Play a character from hand, either normally (paying ink) or via **Shift**\n/// (`shift_onto = Some(target)`), which is an alternate cost that puts the card\n/// on top of a valid in-play character, forming a stack (§10.10).\nfn apply_play_card(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    card: CardId,\n    shift_onto: Option\u003cCardId\u003e,\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    // --- validate (no mutation yet) ---\n    if !matches!(state.status(), GameStatus::Playing) {\n        return Err(Rejected::NotPlaying);\n    }\n    if state.phase() != Phase::Main {\n        return Err(Rejected::NotMainPhase);\n    }\n    let active = state.active_player();\n    let definition_id = hand_card_definition(state, active, card)?;\n    let definition = registry\n        .get(definition_id)\n        .ok_or(Rejected::UnknownCard(card))?;\n    // Actions resolve their effect and go to discard (never in play, §6.3).\n    if matches!(definition.kind(), CardKind::Action) {\n        if shift_onto.is_some() {\n            return Err(Rejected::CannotShift(card)); // actions can't Shift\n        }\n        let ink_cost = definition.cost();\n        let effects = definition.action_effects().to_vec();\n        if state\n            .player(active)\n            .expect(\"active player exists\")\n            .ready_ink()\n            \u003c ink_cost\n        {\n            return Err(Rejected::InsufficientInk(card));\n        }\n        state\n            .player_mut(active)\n            .expect(\"active player exists\")\n            .exert_ink(ink_cost);\n        return Ok(resolve_action_play(\n            state,\n            registry,\n            active,\n            card,\n            definition_id,\n            effects,\n        ));\n    }\n    let statics = definition.static_abilities().to_vec();\n    let rule_statics = definition.rule_statics().to_vec();\n\n    // --- pay the cost and place the card (a permanent: character or location) ---\n    place_permanent(state, registry, active, card, shift_onto, definition)?;\n    // Static abilities apply as the card enters play (§7.6.2).\n    apply_enter_statics(state, active, card, \u0026statics);\n    apply_enter_rule_statics(state, active, card, \u0026rule_statics);\n\n    let mut events = vec![GameEvent::CardPlayed {\n        player: active,\n        card,\n    }];\n    events.extend(game_state_check(state));\n    if state.is_finished() {\n        return Ok(events);\n    }\n    // Bodyguard may enter play exerted (§10.3.2): ask the controller before its\n    // enters-play triggers resolve. The choice is answered with `Decide`, which\n    // then runs the enters-play triggers (`enqueue_enter_play_triggers`).\n    if character_has_keyword(state, registry, card, \u0026Keyword::Bodyguard) {\n        state.set_pending(PendingDecision::EnterPlayExerted {\n            player: active,\n            card,\n        });\n        return Ok(events);\n    }\n    enqueue_enter_play_triggers(\n        state,\n        registry,\n        active,\n        card,\n        definition_id,\n        shift_onto.is_some(),\n    );\n    events.extend(resolve_bag(state, registry));\n    Ok(events)\n}\n\n/// Enqueue a just-entered card's \"when you play this\" and the cross-scope\n/// \"whenever you play a [category]\" triggers (§4.3.4.8). Shift *is* playing the\n/// card (§10.10.1), so these fire whether or not Shift was used.\n///\n/// TODO(shift-conditional triggers — Slice 8): 23 cards gate a play trigger on\n/// \"if you used Shift to play them\" (Mulan, Pegasus, Mickey, Basil; watchers\n/// Bucky, Honey Lemon, Chem Purse). Thread a was-shifted play-context flag so\n/// conditional effects (Slice 8 DSL) can gate on it. See \"Slice 6c\"/\"Slice 8\" in\n/// `docs/planning/IMPLEMENTATION_PLAN.md`.\nfn enqueue_enter_play_triggers(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    controller: PlayerId,\n    card: CardId,\n    definition_id: CardDefId,\n    was_shifted: bool,\n) {\n    enqueue_self_triggers(\n        state,\n        registry,\n        controller,\n        card,\n        \u0026TriggerCondition::WhenYouPlayThis,\n    );\n    if was_shifted {\n        enqueue_self_triggers(\n            state,\n            registry,\n            controller,\n            card,\n            \u0026TriggerCondition::WhenYouPlayThisWithShift,\n        );\n    }\n    enqueue_play_a_card_triggers(state, registry, controller, card, definition_id);\n}\n\n/// Place a permanent (character or location) into play, paying its cost. Routes\n/// to the right placement by card kind; items are not playable yet, and actions\n/// are handled before this is called.\nfn place_permanent(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    active: PlayerId,\n    card: CardId,\n    shift_onto: Option\u003cCardId\u003e,\n    definition: \u0026CardDefinition,\n) -\u003e Result\u003c(), Rejected\u003e {\n    let ink_cost = definition.cost();\n    match definition.kind() {\n        CardKind::Character {\n            strength,\n            willpower,\n            lore,\n        } =\u003e {\n            let character_stats = CharacterStats::new(strength, willpower, lore);\n            let classifications = definition.classifications().to_vec();\n            let names = definition.names().to_vec();\n            if let Some(target) = shift_onto {\n                let ability = definition\n                    .shift()\n                    .cloned()\n                    .ok_or(Rejected::CannotShift(card))?;\n                let shift_names = definition.names().to_vec();\n                place_via_shift(\n                    state,\n                    registry,\n                    active,\n                    card,\n                    target,\n                    \u0026ability,\n                    \u0026shift_names,\n                    ink_cost,\n                    character_stats,\n                    classifications,\n                )\n            } else {\n                place_normally(\n                    state,\n                    active,\n                    card,\n                    ink_cost,\n                    character_stats,\n                    classifications,\n                    names,\n                )\n            }\n        }\n        CardKind::Location {\n            move_cost,\n            willpower,\n            lore,\n        } =\u003e {\n            if shift_onto.is_some() {\n                return Err(Rejected::CannotShift(card)); // locations can't Shift\n            }\n            place_location(\n                state,\n                active,\n                card,\n                ink_cost,\n                LocationStats::new(willpower, lore, move_cost),\n            )\n        }\n        CardKind::Item =\u003e place_item(state, active, card, ink_cost),\n        CardKind::Action =\u003e unreachable!(\"actions are handled before placement\"),\n    }\n}\n\n/// Pay an item's ink cost and put it into play (§6.4): faceup and in play, with no\n/// strength/willpower/drying. Its abilities can be used the turn it's played\n/// (§6.4.3) — `apply_use_ability` works on any in-play card.\nfn place_item(\n    state: \u0026mut GameState,\n    active: PlayerId,\n    card: CardId,\n    ink_cost: u32,\n) -\u003e Result\u003c(), Rejected\u003e {\n    if state\n        .player(active)\n        .expect(\"active player exists\")\n        .ready_ink()\n        \u003c ink_cost\n    {\n        return Err(Rejected::InsufficientInk(card));\n    }\n    let p = state.player_mut(active).expect(\"active player exists\");\n    p.exert_ink(ink_cost);\n    let mut instance = p.hand_mut().take(card).expect(\"validated present\");\n    *instance.conditions_mut() = Conditions::faceup_idle();\n    p.play_mut().push(instance);\n    Ok(())\n}\n\n/// Pay a character's ink cost and put it into play drying (the normal play path).\nfn place_normally(\n    state: \u0026mut GameState,\n    active: PlayerId,\n    card: CardId,\n    ink_cost: u32,\n    character_stats: CharacterStats,\n    classifications: Vec\u003cClassification\u003e,\n    names: Vec\u003cString\u003e,\n) -\u003e Result\u003c(), Rejected\u003e {\n    if state\n        .player(active)\n        .expect(\"active player exists\")\n        .ready_ink()\n        \u003c ink_cost\n    {\n        return Err(Rejected::InsufficientInk(card));\n    }\n    let p = state.player_mut(active).expect(\"active player exists\");\n    p.exert_ink(ink_cost);\n    let mut instance = p.hand_mut().take(card).expect(\"validated present\");\n    *instance.conditions_mut() = Conditions::entering_play();\n    instance.set_stats(Some(character_stats));\n    instance.set_classifications(classifications);\n    instance.set_printed_cost(ink_cost);\n    instance.set_names(names);\n    p.play_mut().push(instance);\n    Ok(())\n}\n\n/// Pay a location's ink cost and put it into play (§6.5): faceup, undamaged, in\n/// play — locations have no ready/exerted/drying state (§5.1.13.3).\nfn place_location(\n    state: \u0026mut GameState,\n    active: PlayerId,\n    card: CardId,\n    ink_cost: u32,\n    location: LocationStats,\n) -\u003e Result\u003c(), Rejected\u003e {\n    if state\n        .player(active)\n        .expect(\"active player exists\")\n        .ready_ink()\n        \u003c ink_cost\n    {\n        return Err(Rejected::InsufficientInk(card));\n    }\n    let p = state.player_mut(active).expect(\"active player exists\");\n    p.exert_ink(ink_cost);\n    let mut instance = p.hand_mut().take(card).expect(\"validated present\");\n    *instance.conditions_mut() = Conditions::faceup_idle();\n    instance.set_location_stats(Some(location));\n    p.play_mut().push(instance);\n    Ok(())\n}\n\n/// Play `card` via Shift (§10.10): validate the target/cost, then put the card on\n/// top of `target`, inheriting its exerted/dry/drying state (§10.10.3–5) and\n/// damage (§10.10.7) and forming a stack.\n#[allow(clippy::too_many_arguments)]\nfn place_via_shift(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    active: PlayerId,\n    card: CardId,\n    target: CardId,\n    ability: \u0026ShiftAbility,\n    shift_names: \u0026[String],\n    printed_cost: u32,\n    character_stats: CharacterStats,\n    classifications: Vec\u003cClassification\u003e,\n) -\u003e Result\u003c(), Rejected\u003e {\n    let target_instance =\n        find_in_play(state, active, target).map_err(|_| Rejected::InvalidShiftTarget(target))?;\n    if !target_instance.is_character() {\n        return Err(Rejected::InvalidShiftTarget(target));\n    }\n    let onto_ok = match \u0026ability.kind {\n        ShiftKind::Any =\u003e true,\n        ShiftKind::SameName =\u003e registry\n            .get(target_instance.definition())\n            .is_some_and(|td| td.names().iter().any(|n| shift_names.contains(n))),\n        ShiftKind::Classification(class) =\u003e registry\n            .get(target_instance.definition())\n            .is_some_and(|td| td.has_classification(class)),\n    };\n    if !onto_ok {\n        return Err(Rejected::InvalidShiftTarget(target));\n    }\n    let ShiftCost::Ink(ink) = ability.cost;\n    if state\n        .player(active)\n        .expect(\"active player exists\")\n        .ready_ink()\n        \u003c ink\n    {\n        return Err(Rejected::InsufficientInk(card));\n    }\n    let inherited = Conditions {\n        ready: target_instance.conditions().ready,\n        damage: target_instance.conditions().damage,\n        drying: target_instance.conditions().drying,\n        facedown: false,\n    };\n    {\n        let p = state.player_mut(active).expect(\"active player exists\");\n        p.exert_ink(ink);\n        let underlying = p.play_mut().take(target).expect(\"validated present\");\n        let mut top = p.hand_mut().take(card).expect(\"validated present\");\n        *top.conditions_mut() = inherited;\n        top.set_stats(Some(character_stats));\n        top.set_classifications(classifications);\n        top.set_printed_cost(printed_cost);\n        top.set_names(shift_names.to_vec());\n        top.stack_onto(underlying);\n        p.play_mut().push(top);\n    }\n    // The underlying character is now under the top and left play, so its\n    // continuous modifiers end (§7.6.4).\n    // TODO(§10.10.6 — Slice 8): the shifted character should *keep* effects that\n    // applied to the underlying character when it entered; `Card`-scoped modifiers\n    // don't transfer to the new top yet.\n    state.remove_modifiers_from_source(target);\n    Ok(())\n}\n\n/// Move one of the active player's characters to one of their locations (§4.3.7):\n/// pay the location's move cost (read from the location's denormalized stats),\n/// then record the character as being there.\nfn apply_move(\n    state: \u0026mut GameState,\n    character: CardId,\n    location: CardId,\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    if !matches!(state.status(), GameStatus::Playing) {\n        return Err(Rejected::NotPlaying);\n    }\n    if state.phase() != Phase::Main {\n        return Err(Rejected::NotMainPhase);\n    }\n    let active = state.active_player();\n    let mover = find_in_play(state, active, character)?;\n    if !mover.is_character() {\n        return Err(Rejected::NotACharacter(character));\n    }\n    // Only your characters may move, and only to your locations (§4.3.7.1).\n    let destination =\n        find_in_play(state, active, location).map_err(|_| Rejected::NotALocation(location))?;\n    let move_cost = destination\n        .location_stats()\n        .ok_or(Rejected::NotALocation(location))?\n        .move_cost;\n    if state\n        .player(active)\n        .expect(\"active player exists\")\n        .ready_ink()\n        \u003c move_cost\n    {\n        return Err(Rejected::InsufficientInk(character));\n    }\n    let p = state.player_mut(active).expect(\"active player exists\");\n    p.exert_ink(move_cost);\n    if let Some(c) = p.play_mut().iter_mut().find(|c| c.id() == character) {\n        c.set_at_location(Some(location));\n    }\n    // TODO(move triggers — Slice 8 / trigger taxonomy): effects that happen \"as a\n    // result of moving\" (and \"while here\") go to the bag here (§4.3.7.5).\n    Ok(vec![GameEvent::Moved {\n        player: active,\n        character,\n        location,\n    }])\n}\n\n/// Sing a song (§6.3.3): pay the alternate cost by exerting eligible singers, then\n/// resolve it like any action. A single singer must have a (Singer-adjusted) cost\n/// ≥ the song's cost; several singers use the song's Sing Together value (§10.12).\nfn apply_sing(\n    state: \u0026mut GameState,\n    registry: \u0026CardRegistry,\n    song: CardId,\n    singers: \u0026[CardId],\n) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n    i
