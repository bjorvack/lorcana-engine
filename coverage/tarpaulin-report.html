<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","crates","lorcana-wasm","src","lib.rs"],"content":"//! WebAssembly bindings for the Lorcana engine.\n//!\n//! This crate is a **thin** binding layer: it embeds the real card pool and a\n//! pair of decklists, runs an actual [`Game`] in the browser, and exposes a\n//! small, stable **view model** (with `tsify`-generated TypeScript types) for a\n//! JavaScript UI to render. The engine itself is untouched and remains the\n//! single source of truth.\n//!\n//! The first slice is a **read-only board viewer**: the UI can advance the game\n//! with [`WasmGame::step_random`] and render [`WasmGame::view`]; no player input\n//! is sent back yet.\n\nuse include_dir::{Dir, include_dir};\nuse lorcana_engine::{\n    CardDefinition, CardKind, CardRegistry, Deck, Game, GameState, GameStatus, Input, PlayerState,\n    load_toml_from,\n};\nuse serde::Serialize;\nuse tsify_next::Tsify;\nuse wasm_bindgen::prelude::*;\n\n/// The bundled engine-format card sets (`cards/sets/*.toml`), embedded at build\n/// time so a real game can run entirely in the browser.\nstatic CARD_SETS: Dir\u003c'_\u003e = include_dir!(\"$CARGO_MANIFEST_DIR/../../cards/sets\");\n\n/// Two Set-1 decklists to play against each other in the demo.\nconst DECK_ONE: \u0026str = include_str!(\"../../../decks/set01-amber-amethyst.txt\");\nconst DECK_TWO: \u0026str = include_str!(\"../../../decks/set01-emerald-ruby.txt\");\n\n// ---------------------------------------------------------------------------\n// View model (the UI contract). `tsify` generates matching TypeScript types.\n// ---------------------------------------------------------------------------\n\n/// Static, printed data for one card definition. Keyed by `defId` on the JS\n/// side; the per-instance [`CardView`] only carries the dynamic state.\n#[derive(Debug, Clone, Serialize, Tsify)]\n#[tsify(into_wasm_abi)]\n#[serde(rename_all = \"camelCase\")]\npub struct CardDef {\n    /// Stable id of the printed card.\n    pub def_id: u32,\n    /// Display name (e.g. \"Ariel - On Human Legs\").\n    pub name: String,\n    /// Card art URL (from the TOML `image` field), if any.\n    pub image: Option\u003cString\u003e,\n    /// `\"Character\" | \"Action\" | \"Item\" | \"Location\"`.\n    pub card_type: String,\n    /// Printed ink cost.\n    pub cost: u32,\n    /// Whether the card has the inkwell symbol (can be inked).\n    pub inkwell: bool,\n    /// Printed Strength `{S}` (characters only).\n    pub strength: Option\u003cu32\u003e,\n    /// Printed Willpower `{W}` (characters / locations).\n    pub willpower: Option\u003cu32\u003e,\n    /// Printed Lore `{L}` (characters / locations).\n    pub lore: Option\u003cu32\u003e,\n    /// Move cost (locations only).\n    pub move_cost: Option\u003cu32\u003e,\n    /// Classifications (e.g. Storyborn, Hero, Princess).\n    pub classifications: Vec\u003cString\u003e,\n    /// Printed rules text, if any.\n    pub text: Option\u003cString\u003e,\n}\n\n/// A specific card instance on the board, with its dynamic state. Printed data\n/// is looked up via `defId` in the card DB.\n#[derive(Debug, Clone, Serialize, Tsify)]\n#[serde(rename_all = \"camelCase\")]\npub struct CardView {\n    /// Unique instance id within the game.\n    pub instance_id: u32,\n    /// The printed card this instance represents.\n    pub def_id: u32,\n    /// `true` if ready (upright), `false` if exerted (turned sideways).\n    pub ready: bool,\n    /// `true` while drying (summoning sick) — can't quest/challenge/exert.\n    pub drying: bool,\n    /// `true` if facedown (deck / inkwell card).\n    pub facedown: bool,\n    /// Accumulated damage counters.\n    pub damage: u32,\n    /// Live Strength while an in-play character (with modifiers), else `None`.\n    pub strength: Option\u003cu32\u003e,\n    /// Live Willpower while an in-play character/location, else `None`.\n    pub willpower: Option\u003cu32\u003e,\n    /// Live Lore while an in-play character/location, else `None`.\n    pub lore: Option\u003cu32\u003e,\n    /// The location instance this character has moved to, if any.\n    pub at_location: Option\u003cu32\u003e,\n    /// Cards stacked under this one (Shift/Boost). Inert; for display only.\n    pub under: Vec\u003cSelf\u003e,\n}\n\n/// A summary of an inkwell: only counts are public (cards are facedown).\n#[derive(Debug, Clone, Copy, Serialize, Tsify)]\n#[serde(rename_all = \"camelCase\")]\npub struct InkwellView {\n    /// Total cards in the inkwell (= total ink).\n    pub total: u32,\n    /// Ready (available) ink.\n    pub ready: u32,\n    /// Exerted (already spent this turn) ink.\n    pub exerted: u32,\n}\n\n/// One player's side of the board.\n#[derive(Debug, Clone, Serialize, Tsify)]\n#[serde(rename_all = \"camelCase\")]\npub struct PlayerView {\n    /// Player index (0 or 1).\n    pub id: u8,\n    /// Current lore (first to the win threshold wins).\n    pub lore: u32,\n    /// Cards in hand. (Private — see `handCount` for the opponent.)\n    pub hand: Vec\u003cCardView\u003e,\n    /// Number of cards in hand (always known, even for the opponent).\n    pub hand_count: u32,\n    /// Cards in the play zone (characters, items, locations).\n    pub play: Vec\u003cCardView\u003e,\n    /// Inkwell summary.\n    pub inkwell: InkwellView,\n    /// Number of cards left in the deck.\n    pub deck_count: u32,\n    /// The (public) discard pile, top last.\n    pub discard: Vec\u003cCardView\u003e,\n}\n\n/// The full board view the UI renders each frame.\n#[derive(Debug, Clone, Serialize, Tsify)]\n#[tsify(into_wasm_abi)]\n#[serde(rename_all = \"camelCase\")]\npub struct GameView {\n    /// `\"NotStarted\" | \"AwaitingMulligan\" | \"Playing\" | \"Finished\"`.\n    pub status: String,\n    /// Winning player indices when `status == \"Finished\"`.\n    pub winners: Vec\u003cu8\u003e,\n    /// Index of the active player.\n    pub active_player: u8,\n    /// 1-based turn number.\n    pub turn_number: u32,\n    /// `\"Beginning\" | \"Main\" | \"End\"`.\n    pub phase: String,\n    /// `\"Ready\" | \"Set\" | \"Draw\" | \"Main\" | \"End\"`.\n    pub step: String,\n    /// Both players' sides.\n    pub players: Vec\u003cPlayerView\u003e,\n    /// A short label for any decision currently awaited, for display.\n    pub pending: Option\u003cString\u003e,\n}\n\n// ---------------------------------------------------------------------------\n// Registry / deck building from the embedded data.\n// ---------------------------------------------------------------------------\n\n/// Build a combined [`CardRegistry`] from every embedded set, mirroring the\n/// engine's `registry_from_dir` id-assignment scheme so def ids are stable.\nfn build_registry() -\u003e Result\u003cCardRegistry, String\u003e {\n    let mut registry = CardRegistry::new();\n    let mut next_id = 0u32;\n    let mut files: Vec\u003c_\u003e = CARD_SETS\n        .files()\n        .filter(|f| f.path().extension().and_then(|x| x.to_str()) == Some(\"toml\"))\n        .collect();\n    files.sort_by_key(|f| f.path().to_path_buf());\n    for file in files {\n        let toml = file\n            .contents_utf8()\n            .ok_or_else(|| format!(\"{}: not utf-8\", file.path().display()))?;\n        let defs = load_toml_from(toml, next_id)\n            .map_err(|e| format!(\"{}: {e:?}\", file.path().display()))?;\n        next_id += u32::try_from(defs.len()).unwrap_or(0) + 1;\n        for def in defs {\n            registry.insert(def);\n        }\n    }\n    Ok(registry)\n}\n\n// ---------------------------------------------------------------------------\n// Mapping engine state -\u003e view model.\n// ---------------------------------------------------------------------------\n\nconst fn card_type_str(t: lorcana_engine::CardType) -\u003e \u0026'static str {\n    use lorcana_engine::CardType::{Action, Character, Item, Location};\n    match t {\n        Character =\u003e \"Character\",\n        Action =\u003e \"Action\",\n        Item =\u003e \"Item\",\n        Location =\u003e \"Location\",\n    }\n}\n\nfn card_def_view(def: \u0026CardDefinition) -\u003e CardDef {\n    let (strength, willpower, lore, move_cost) = match def.kind() {\n        CardKind::Character {\n            strength,\n            willpower,\n            lore,\n        } =\u003e (Some(strength), Some(willpower), Some(lore), None),\n        CardKind::Location {\n            move_cost,\n            willpower,\n            lore,\n        } =\u003e (None, Some(willpower), Some(lore), Some(move_cost)),\n        CardKind::Action | CardKind::Item =\u003e (None, None, None, None),\n    };\n    CardDef {\n        def_id: def.id().as_raw(),\n        name: def.names().first().cloned().unwrap_or_default(),\n        image: def.image().map(str::to_owned),\n        card_type: card_type_str(def.card_type()).to_owned(),\n        cost: def.cost(),\n        inkwell: def.has_inkwell_symbol(),\n        strength,\n        willpower,\n        lore,\n        move_cost,\n        classifications: def\n            .classifications()\n            .iter()\n            .map(|c| format!(\"{c:?}\"))\n            .collect(),\n        text: def.text().map(str::to_owned),\n    }\n}\n\nfn card_view(card: \u0026lorcana_engine::CardInstance) -\u003e CardView {\n    let c = card.conditions();\n    let (strength, willpower, lore) = card.stats().map_or_else(\n        || {\n            card.location_stats().map_or((None, None, None), |l| {\n                (None, Some(l.willpower), Some(l.lore))\n            })\n        },\n        |s| (Some(s.strength), Some(s.willpower), Some(s.lore)),\n    );\n    CardView {\n        instance_id: card.id().as_raw(),\n        def_id: card.definition().as_raw(),\n        ready: c.ready,\n        drying: c.drying,\n        facedown: c.facedown,\n        damage: c.damage,\n        strength,\n        willpower,\n        lore,\n        at_location: card.at_location().map(lorcana_engine::CardId::as_raw),\n        under: card.under().iter().map(card_view).collect(),\n    }\n}\n\nfn player_view(p: \u0026PlayerState) -\u003e PlayerView {\n    let ink_total = u32::try_from(p.inkwell().iter().count()).unwrap_or(0);\n    let ink_ready =\n        u32::try_from(p.inkwell().iter().filter(|c| c.conditions().ready).count()).unwrap_or(0);\n    PlayerView {\n        id: p.id().index(),\n        lore: p.lore(),\n        hand: p.hand().iter().map(card_view).collect(),\n        hand_count: u32::try_from(p.hand().iter().count()).unwrap_or(0),\n        play: p.play().iter().map(card_view).collect(),\n        inkwell: InkwellView {\n            total: ink_total,\n            ready: ink_ready,\n            exerted: ink_total - ink_ready,\n        },\n        deck_count: u32::try_from(p.deck().iter().count()).unwrap_or(0),\n        discard: p.discard().iter().map(card_view).collect(),\n    }\n}\n\nfn game_view(state: \u0026GameState) -\u003e GameView {\n    let (status, winners) = match state.status() {\n        GameStatus::NotStarted =\u003e (\"NotStarted\", Vec::new()),\n        GameStatus::AwaitingMulligan(_) =\u003e (\"AwaitingMulligan\", Vec::new()),\n        GameStatus::Playing =\u003e (\"Playing\", Vec::new()),\n        GameStatus::Finished { winners } =\u003e {\n            (\"Finished\", winners.iter().map(|p| p.index()).collect())\n        }\n    };\n    GameView {\n        status: status.to_owned(),\n        winners,\n        active_player: state.active_player().index(),\n        turn_number: state.turn_number(),\n        phase: format!(\"{:?}\", state.phase()),\n        step: format!(\"{:?}\", state.step()),\n        players: state.players().iter().map(player_view).collect(),\n        pending: state.pending().map(|p| format!(\"{p:?}\")),\n    }\n}\n\n// ---------------------------------------------------------------------------\n// The exported game handle.\n// ---------------------------------------------------------------------------\n\n/// A live game running in the browser, plus a small deterministic RNG used by\n/// [`Self::step_random`] to drive the read-only demo.\n#[wasm_bindgen]\n#[derive(Debug)]\npub struct WasmGame {\n    game: Game,\n    rng_state: u64,\n}\n\n#[wasm_bindgen]\nimpl WasmGame {\n    /// Create and start a game between the two bundled decklists, resolving the\n    /// opening mulligans (keep all) so it begins in the `Playing` state.\n    ///\n    /// # Errors\n    /// Returns a JS error string if the card pool or decklists are invalid.\n    #[wasm_bindgen(constructor)]\n    pub fn new(seed: u64) -\u003e Result\u003cSelf, JsError\u003e {\n        console_error_panic_hook::set_once();\n        let registry = build_registry().map_err(|e| JsError::new(\u0026e))?;\n        let deck_one = Deck::from_text(DECK_ONE, \u0026registry)\n            .map_err(|e| JsError::new(\u0026format!(\"deck one: {e:?}\")))?;\n        let deck_two = Deck::from_text(DECK_TWO, \u0026registry)\n            .map_err(|e| JsError::new(\u0026format!(\"deck two: {e:?}\")))?;\n        let mut game = Game::from_decks(\u0026[deck_one, deck_two], seed, registry)\n            .map_err(|e| JsError::new(\u0026format!(\"{e:?}\")))?;\n\n        // Resolve opening mulligans (keep every card) to enter `Playing`.\n        while let GameStatus::AwaitingMulligan(player) = *game.status() {\n            let _ = game\n                .submit(Input::Mulligan {\n                    player,\n                    put_back: Vec::new(),\n                })\n                .map_err(|e| JsError::new(\u0026format!(\"mulligan: {e:?}\")))?;\n        }\n\n        Ok(Self {\n            game,\n            rng_state: seed.wrapping_add(0x9E37_79B9_7F4A_7C15),\n        })\n    }\n\n    /// The static card database for every printed card in the pool, for the UI\n    /// to look up names/art/stats by `defId`.\n    #[must_use]\n    #[wasm_bindgen(js_name = cardDb)]\n    pub fn card_db(\u0026self) -\u003e Vec\u003cCardDef\u003e {\n        self.game\n            .registry()\n            .iter()\n            .map(|(_, def)| card_def_view(def))\n            .collect()\n    }\n\n    /// The current board view.\n    #[must_use]\n    pub fn view(\u0026self) -\u003e GameView {\n        game_view(self.game.state())\n    }\n\n    /// Whether the game has finished.\n    // `wasm_bindgen` can only export non-const functions, so this can't be const.\n    #[allow(clippy::missing_const_for_fn)]\n    #[must_use]\n    #[wasm_bindgen(js_name = isFinished)]\n    pub fn is_finished(\u0026self) -\u003e bool {\n        matches!(self.game.status(), GameStatus::Finished { .. })\n    }\n\n    /// Advance the demo by submitting one pseudo-random legal action. Returns\n    /// `true` if an action was taken, `false` if the game is over or no action\n    /// is enumerable (a decision needing richer input than the demo supplies).\n    #[wasm_bindgen(js_name = stepRandom)]\n    pub fn step_random(\u0026mut self) -\u003e bool {\n        if self.is_finished() {\n            return false;\n        }\n        let actions = self.game.legal_actions();\n        if actions.is_empty() {\n            return false;\n        }\n        let pick = self.next_index(actions.len());\n        // A reported-legal action is always accepted; ignore the events for now.\n        self.game.submit(actions[pick].clone()).is_ok()\n    }\n\n    /// A small LCG step, returning an index in `0..bound`.\n    fn next_index(\u0026mut self, bound: usize) -\u003e usize {\n        self.rng_state = self\n            .rng_state\n            .wrapping_mul(6_364_136_223_846_793_005)\n            .wrapping_add(1);\n        ((self.rng_state \u003e\u003e 33) as usize) % bound.max(1)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn registry_loads_real_cards_with_names() {\n        let registry = build_registry().expect(\"embedded sets load\");\n        let named = registry\n            .iter()\n            .filter(|(_, def)| !def.names().is_empty())\n            .count();\n        assert!(named \u003e 0, \"expected named cards in the embedded pool\");\n    }\n\n    #[test]\n    fn new_game_starts_playing_with_two_seven_card_hands() {\n        let game = WasmGame::new(42).expect(\"game builds\");\n        let view = game.view();\n        assert_eq!(view.status, \"Playing\", \"mulligans resolved into play\");\n        assert_eq!(view.players.len(), 2);\n        for player in \u0026view.players {\n            assert_eq!(player.hand_count, 7, \"opening hand is seven cards\");\n            assert_eq!(player.hand.len(), 7);\n        }\n    }\n\n    #[test]\n    fn card_db_covers_every_card_in_play_and_hand() {\n        let game = WasmGame::new(7).expect(\"game builds\");\n        let known: std::collections::HashSet\u003cu32\u003e =\n            game.card_db().into_iter().map(|c| c.def_id).collect();\n        let view = game.view();\n        for player in \u0026view.players {\n            for card in player.hand.iter().chain(\u0026player.play) {\n                assert!(\n                    known.contains(\u0026card.def_id),\n                    \"every visible card resolves in the card DB\"\n                );\n            }\n        }\n    }\n\n    #[test]\n    fn step_random_advances_the_game_deterministically() {\n        // Same seed ⇒ same first action ⇒ identical view (replayable).\n        let mut a = WasmGame::new(123).expect(\"game a\");\n        let mut b = WasmGame::new(123).expect(\"game b\");\n        assert!(a.step_random(), \"a fresh game has a legal action\");\n        assert!(b.step_random(), \"a fresh game has a legal action\");\n        let (va, vb) = (a.view(), b.view());\n        assert_eq!(va.turn_number, vb.turn_number);\n        assert_eq!(va.active_player, vb.active_player);\n        assert_eq!(va.players[0].inkwell.total, vb.players[0].inkwell.total);\n    }\n\n    #[test]\n    fn a_full_random_game_eventually_finishes() {\n        let mut game = WasmGame::new(2024).expect(\"game builds\");\n        let mut steps = 0u32;\n        while !game.is_finished() \u0026\u0026 steps \u003c 100_000 {\n            if !game.step_random() {\n                break;\n            }\n            steps += 1;\n        }\n        // Either it finished, or it stopped on a decision the demo can't answer;\n        // either way the loop must terminate well under the cap.\n        assert!(steps \u003c 100_000, \"random self-play terminates\");\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","application","api.rs"],"content":"//! A small facade over the engine: create a game, submit actions, inspect state,\n//! and enumerate the **legal actions** available right now.\n//!\n//! `legal_actions` reuses the reducer's own validation by *trying* each candidate\n//! on a clone (so it can never drift from `apply`), then keeping the ones that are\n//! accepted. Pending-decision options are read directly from the decision.\n\nuse crate::domain::cards::CardRegistry;\nuse crate::domain::deck::{Deck, DeckError};\nuse crate::domain::engine::{Decision, Input, Rejected, apply, start};\nuse crate::domain::game::{\n    CardInstance, ChoiceRef, GameEvent, GameState, GameStatus, PendingDecision,\n};\nuse crate::domain::types::ids::{CardDefId, CardId};\n\n/// Why building a game from decks failed.\n#[derive(Debug, Clone, PartialEq, Eq, thiserror::Error)]\npub enum SetupError {\n    /// A deck (by index) violated the deck-building rules (§2.1.1).\n    #[error(\"deck {index} is illegal: {errors:?}\")]\n    IllegalDeck {\n        /// Index of the offending deck in the input slice.\n        index: usize,\n        /// The violations found.\n        errors: Vec\u003cDeckError\u003e,\n    },\n    /// The game couldn't be started.\n    #[error(\"could not start the game: {0:?}\")]\n    Start(Rejected),\n}\n\n/// A playable game: the [`GameState`] plus the [`CardRegistry`] it's played with.\n#[derive(Debug, Clone)]\npub struct Game {\n    state: GameState,\n    registry: CardRegistry,\n}\n\nimpl Game {\n    /// Create and **start** a game (deals hands; leaves it awaiting mulligans).\n    ///\n    /// # Errors\n    /// Propagates a [`Rejected`] from `start` (e.g. an already-started state).\n    pub fn new(\n        decks: Vec\u003cVec\u003cCardDefId\u003e\u003e,\n        seed: u64,\n        registry: CardRegistry,\n    ) -\u003e Result\u003cSelf, Rejected\u003e {\n        let mut state = GameState::new(decks, seed);\n        let _ = start(\u0026mut state)?;\n        Ok(Self { state, registry })\n    }\n\n    /// Validate each [`Deck`] against `registry` (§2.1.1), then build and start a\n    /// game from them — the ergonomic entry point for real decklists.\n    ///\n    /// # Errors\n    /// [`SetupError::IllegalDeck`] if any deck is illegal; [`SetupError::Start`]\n    /// if starting fails.\n    pub fn from_decks(\n        decks: \u0026[Deck],\n        seed: u64,\n        registry: CardRegistry,\n    ) -\u003e Result\u003cSelf, SetupError\u003e {\n        for (index, deck) in decks.iter().enumerate() {\n            deck.validate(\u0026registry)\n                .map_err(|errors| SetupError::IllegalDeck { index, errors })?;\n        }\n        let lists = decks.iter().map(Deck::expand).collect();\n        Self::new(lists, seed, registry).map_err(SetupError::Start)\n    }\n\n    /// Apply an action, returning the events it produced.\n    ///\n    /// # Errors\n    /// Returns [`Rejected`] if the action is illegal in the current state.\n    pub fn submit(\u0026mut self, input: Input) -\u003e Result\u003cVec\u003cGameEvent\u003e, Rejected\u003e {\n        apply(\u0026mut self.state, \u0026self.registry, input)\n    }\n\n    /// The current game state.\n    #[must_use]\n    pub const fn state(\u0026self) -\u003e \u0026GameState {\n        \u0026self.state\n    }\n\n    /// The card registry this game uses.\n    #[must_use]\n    pub const fn registry(\u0026self) -\u003e \u0026CardRegistry {\n        \u0026self.registry\n    }\n\n    /// The current status (setup / playing / finished).\n    #[must_use]\n    pub const fn status(\u0026self) -\u003e \u0026GameStatus {\n        self.state.status()\n    }\n\n    /// The decision currently awaited, if any.\n    #[must_use]\n    pub const fn pending(\u0026self) -\u003e Option\u003c\u0026PendingDecision\u003e {\n        self.state.pending()\n    }\n\n    /// Enumerate the actions that are legal right now.\n    ///\n    /// - While a decision is pending: the answers to that decision (open-ended\n    ///   \"name a card\" decisions yield none — the host supplies the name).\n    /// - While awaiting a mulligan: the keep-all mulligan (the host chooses which\n    ///   cards, if any, to put back).\n    /// - Otherwise: every accepted turn action (validated by trying it on a clone).\n    ///\n    /// Multi-pick decisions and Shift/Sing options are best-effort for now.\n    #[must_use]\n    pub fn legal_actions(\u0026self) -\u003e Vec\u003cInput\u003e {\n        if let Some(pending) = self.state.pending() {\n            return decision_actions(pending);\n        }\n        if let GameStatus::AwaitingMulligan(player) = *self.state.status() {\n            return vec![Input::Mulligan {\n                player,\n                put_back: Vec::new(),\n            }];\n        }\n        self.candidate_moves()\n            .into_iter()\n            .filter(|input| self.is_legal(input))\n            .collect()\n    }\n\n    /// Whether `input` would be accepted (tried on a clone — no mutation here).\n    fn is_legal(\u0026self, input: \u0026Input) -\u003e bool {\n        let mut probe = self.state.clone();\n        apply(\u0026mut probe, \u0026self.registry, input.clone()).is_ok()\n    }\n\n    /// All turn actions worth trying for the active player (filtered by `is_legal`).\n    fn candidate_moves(\u0026self) -\u003e Vec\u003cInput\u003e {\n        let active = self.state.active_player();\n        let Some(me) = self.state.player(active) else {\n            return Vec::new();\n        };\n        let hand: Vec\u003cCardId\u003e = me.hand().iter().map(CardInstance::id).collect();\n        let own: Vec\u003cCardId\u003e = me.play().iter().map(CardInstance::id).collect();\n        let locations: Vec\u003cCardId\u003e = me\n            .play()\n            .iter()\n            .filter(|c| c.is_location())\n            .map(CardInstance::id)\n            .collect();\n        let foes: Vec\u003cCardId\u003e = self\n            .state\n            .players()\n            .iter()\n            .filter(|p| p.id() != active)\n            .flat_map(|p| p.play().iter().map(CardInstance::id))\n            .collect();\n\n        let mut out = vec![Input::EndTurn];\n        for card in hand {\n            out.push(Input::PutCardInInkwell { card });\n            out.push(Input::PlayCard {\n                card,\n                shift_onto: None,\n            });\n        }\n        for \u0026card in \u0026own {\n            out.push(Input::Quest { character: card });\n            out.push(Input::Boost { card });\n            for \u0026location in \u0026locations {\n                out.push(Input::MoveCharacter {\n                    character: card,\n                    location,\n                });\n            }\n            for \u0026target in \u0026foes {\n                out.push(Input::Challenge {\n                    challenger: card,\n                    target,\n                });\n            }\n            if let Some(def) = me\n                .play()\n                .iter()\n                .find(|c| c.id() == card)\n                .map(CardInstance::definition)\n                .and_then(|d| self.registry.get(d))\n            {\n                for ability in 0..def.activated_abilities().len() {\n                    out.push(Input::UseAbility { card, ability });\n                }\n            }\n        }\n        out\n    }\n}\n\n/// The decisions that answer a pending decision.\nfn decision_actions(pending: \u0026PendingDecision) -\u003e Vec\u003cInput\u003e {\n    let decide = |d: Decision| Input::Decide(d);\n    match pending {\n        PendingDecision::OrderTriggers { options, .. } =\u003e options\n            .iter()\n            .map(|t| decide(Decision::ResolveNext(*t)))\n            .collect(),\n        PendingDecision::MayResolve { .. } | PendingDecision::MayResolveEffect { .. } =\u003e {\n            vec![decide(Decision::May(true)), decide(Decision::May(false))]\n        }\n        PendingDecision::EnterPlayExerted { .. } =\u003e vec![\n            decide(Decision::EnterExerted(true)),\n            decide(Decision::EnterExerted(false)),\n        ],\n        PendingDecision::Choose {\n            options, min, max, ..\n        } =\u003e choose_actions(options, *min, *max),\n        // Open-ended: the host supplies the named card.\n        PendingDecision::NameCard { .. } | PendingDecision::NameThenRecur { .. } =\u003e Vec::new(),\n        PendingDecision::ChooseOne { options, .. } =\u003e {\n            let decide = |d: Decision| Input::Decide(d);\n            options\n                .iter()\n                .enumerate()\n                .filter_map(|(i, _)| u32::try_from(i).ok())\n                .map(|i| decide(Decision::ChooseOption(i)))\n                .collect()\n        }\n    }\n}\n\n/// Answers to a general `Choose` decision. Single-pick is fully enumerated;\n/// multi-pick offers one valid pick (subset enumeration is a follow-up).\nfn choose_actions(options: \u0026[ChoiceRef], min: u32, max: u32) -\u003e Vec\u003cInput\u003e {\n    let decide = |d: Decision| Input::Decide(d);\n    let mut out = Vec::new();\n    if max \u003c= 1 {\n        for opt in options {\n            out.push(match opt {\n                ChoiceRef::Card(c) =\u003e decide(Decision::ChooseTarget(*c)),\n                ChoiceRef::Player(p) =\u003e decide(Decision::ChoosePlayer(*p)),\n            });\n        }\n        if min == 0 {\n            out.push(decide(Decision::ChooseTargets(Vec::new())));\n        }\n    } else {\n        let cards: Vec\u003cCardId\u003e = options\n            .iter()\n            .filter_map(|o| match o {\n                ChoiceRef::Card(c) =\u003e Some(*c),\n                ChoiceRef::Player(_) =\u003e None,\n            })\n            .collect();\n        if min == 0 {\n            out.push(decide(Decision::ChooseTargets(Vec::new())));\n        }\n        if cards.len() \u003e= min as usize {\n            let pick: Vec\u003cCardId\u003e = cards.into_iter().take(max as usize).collect();\n            out.push(decide(Decision::ChooseTargets(pick)));\n        }\n    }\n    out\n}\n","traces":[{"line":44,"address":[],"length":0,"stats":{"Line":192}},{"line":49,"address":[],"length":0,"stats":{"Line":768}},{"line":50,"address":[],"length":0,"stats":{"Line":384}},{"line":51,"address":[],"length":0,"stats":{"Line":192}},{"line":60,"address":[],"length":0,"stats":{"Line":99}},{"line":65,"address":[],"length":0,"stats":{"Line":693}},{"line":66,"address":[],"length":0,"stats":{"Line":594}},{"line":67,"address":[],"length":0,"stats":{"Line":210}},{"line":69,"address":[],"length":0,"stats":{"Line":480}},{"line":70,"address":[],"length":0,"stats":{"Line":480}},{"line":77,"address":[],"length":0,"stats":{"Line":23244}},{"line":78,"address":[],"length":0,"stats":{"Line":92976}},{"line":83,"address":[],"length":0,"stats":{"Line":83379}},{"line":84,"address":[],"length":0,"stats":{"Line":83379}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":90,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":44421}},{"line":96,"address":[],"length":0,"stats":{"Line":44421}},{"line":101,"address":[],"length":0,"stats":{"Line":0}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":23220}},{"line":116,"address":[],"length":0,"stats":{"Line":23709}},{"line":117,"address":[],"length":0,"stats":{"Line":978}},{"line": seen at any point).\nfn collect_names(game: \u0026Game, names: \u0026mut Names) {\n    let registry = game.registry();\n    for player in game.state().players() {\n        let zones = [\n            player.deck(),\n            player.hand(),\n            player.play(),\n            player.inkwell(),\n            player.discard(),\n        ];\n        for zone in zones {\n            for inst in zone.iter() {\n                let token = format!(\"{:?}\", inst.id());\n                if let Some(def) = registry.get(inst.definition()) {\n                    let name = def\n                        .names()\n                        .first()\n                        .cloned()\n                        .unwrap_or_else(|| token.clone());\n                    let _ = names\n                        .entry(token)\n                        .or_insert_with(|| (name, def.text().map(str::to_owned)));\n                }\n            }\n        }\n    }\n}\n\n/// Replace each `CardId(n)` token in a debug string with the card's name.\nfn with_names(debug: \u0026str, names: \u0026Names) -\u003e String {\n    let mut out = String::new();\n    let mut rest = debug;\n    while let Some(pos) = rest.find(\"CardId(\") {\n        out.push_str(\u0026rest[..pos]);\n        let after = \u0026rest[pos + \"CardId(\".len()..];\n        if let Some(end) = after.find(')') {\n            let token = format!(\"CardId({})\", \u0026after[..end]);\n            match names.get(\u0026token) {\n                Some((name, _)) =\u003e out.push_str(name),\n                None =\u003e out.push_str(\u0026token),\n            }\n            rest = \u0026after[end + 1..];\n        } else {\n            out.push_str(rest);\n            return out;\n        }\n    }\n    out.push_str(rest);\n    out\n}\n\n/// The printed text of the first card referenced by an action's debug string\n/// (the actor — the card played/quested/challenged/etc.).\nfn actor_text(action_debug: \u0026str, names: \u0026Names) -\u003e Option\u003cString\u003e {\n    let pos = action_debug.find(\"CardId(\")?;\n    let after = \u0026action_debug[pos + \"CardId(\".len()..];\n    let end = after.find(')')?;\n    let token = format!(\"CardId({})\", \u0026after[..end]);\n    names.get(\u0026token).and_then(|(_, text)| text.clone())\n}\n\nconst fn finished(game: \u0026Game) -\u003e bool {\n    matches!(game.status(), GameStatus::Finished { .. })\n}\n\n/// Play a game from `decks` and return the behaviour audit transcript.\n///\n/// # Errors\n/// Propagates a [`SetupError`] if the decks are illegal or the game can't start.\npub fn play_and_log(\n    decks: \u0026[Deck],\n    seed: u64,\n    registry: CardRegistry,\n    max_steps: usize,\n) -\u003e Result\u003cString, SetupError\u003e {\n    let mut game = Game::from_decks(decks, seed, registry)?;\n    let mut names = Names::new();\n    let mut rng = seed.wrapping_add(1);\n    let mut next = |bound: usize| -\u003e usize {\n        rng = rng.wrapping_mul(6_364_136_223_846_793_005).wrapping_add(1);\n        ((rng \u003e\u003e 33) as usize) % bound.max(1)\n    };\n\n    let mut log = String::new();\n    let _ = writeln!(log, \"# Behaviour audit (seed {seed})\\n\");\n    for step in 0..max_steps {\n        collect_names(\u0026game, \u0026mut names);\n        if finished(\u0026game) {\n            break;\n        }\n        let actions = game.legal_actions();\n        if actions.is_empty() {\n            log.push_str(\"(no enumerable action — stopping)\\n\");\n            break;\n        }\n        let pick = actions[next(actions.len())].clone();\n        let raw = format!(\"{pick:?}\");\n        let text = actor_text(\u0026raw, \u0026names);\n        let Ok(events) = game.submit(pick) else {\n            let _ = writeln!(\n                log,\n                \"{step}. {} -\u003e REJECTED (legal/apply bug!)\",\n                with_names(\u0026raw, \u0026names)\n            );\n            continue;\n        };\n        collect_names(\u0026game, \u0026mut names);\n\n        let _ = writeln!(log, \"{step}. {}\", with_names(\u0026raw, \u0026names));\n        if let Some(text) = text {\n            let _ = writeln!(log, \"      text: {text}\");\n        }\n        for event in \u0026events {\n            let _ = writeln!(\n                log,\n                \"      -\u003e {}\",\n                with_names(\u0026format!(\"{event:?}\"), \u0026names)\n            );\n        }\n    }\n    let _ = writeln!(log, \"\\nGame over: {:?}\", game.status());\n    Ok(log)\n}\n\n/// Build the card pool from `sets_dir`, load two decklists, and return the audit\n/// transcript of a game between them.\n///\n/// # Errors\n/// Returns a message if the pool/decklists can't be loaded or a deck is illegal.\npub fn audit_from_files(\n    sets_dir: \u0026Path,\n    p1: \u0026Path,\n    p2: \u0026Path,\n    seed: u64,\n    max_steps: usize,\n) -\u003e Result\u003cString, String\u003e {\n    let registry = registry_from_dir(sets_dir)?;\n    let read = |p: \u0026Path| -\u003e Result\u003cDeck, String\u003e {\n        let text = std::fs::read_to_string(p).map_err(|e| format!(\"{}: {e}\", p.display()))?;\n        Deck::from_text(\u0026text, \u0026registry).map_err(|e| format!(\"{}: {e}\", p.display()))\n    };\n    let decks = [read(p1)?, read(p2)?];\n    play_and_log(\u0026decks, seed, registry, max_steps).map_err(|e| format!(\"{e}\"))\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","application","host.rs"],"content":"//! A thin text host over [`Game`](crate::application::Game).\n//!\n//! Renders the state + legal actions, offers an interactive loop, and a\n//! deterministic auto-play `demo` (the demo is what the test/CI exercises; the\n//! interactive loop is for humans).\n\nuse super::Game;\nuse crate::domain::cards::{CardDefinition, CardRegistry, load_toml_from};\nuse crate::domain::deck::Deck;\nuse crate::domain::game::GameStatus;\nuse crate::domain::types::ids::CardDefId;\nuse std::fmt::Write as _;\nuse std::io::Write as _;\nuse std::path::Path;\n\n/// Build a combined card registry from every `*.toml` under `sets_dir`, assigning\n/// unique ids across files (cards span sets).\n///\n/// # Errors\n/// I/O or load errors are surfaced as a message string.\npub fn registry_from_dir(sets_dir: \u0026Path) -\u003e Result\u003cCardRegistry, String\u003e {\n    let mut registry = CardRegistry::new();\n    let mut next_id = 0u32;\n    let mut files: Vec\u003c_\u003e = std::fs::read_dir(sets_dir)\n        .map_err(|e| format!(\"read {}: {e}\", sets_dir.display()))?\n        .filter_map(|e| e.ok().map(|e| e.path()))\n        .filter(|p| p.extension().and_then(|x| x.to_str()) == Some(\"toml\"))\n        .collect();\n    files.sort();\n    for path in files {\n        let toml =\n            std::fs::read_to_string(\u0026path).map_err(|e| format!(\"{}: {e}\", path.display()))?;\n        let defs =\n            load_toml_from(\u0026toml, next_id).map_err(|e| format!(\"{}: {e}\", path.display()))?;\n        next_id += u32::try_from(defs.len()).unwrap_or(0) + 1;\n        for def in defs {\n            registry.insert(def);\n        }\n    }\n    Ok(registry)\n}\n\n/// Load the card pool from `sets_dir`, the two decklists from `p1`/`p2` (the\n/// community `count name` text format), build a game, and auto-play it to a\n/// transcript.\n///\n/// # Errors\n/// Returns a message if the pool/decklists can't be loaded or a deck is illegal.\npub fn play_from_files(\n    sets_dir: \u0026Path,\n    p1: \u0026Path,\n    p2: \u0026Path,\n    seed: u64,\n    max_steps: usize,\n) -\u003e Result\u003cString, String\u003e {\n    let registry = registry_from_dir(sets_dir)?;\n    let read = |p: \u0026Path| -\u003e Result\u003cDeck, String\u003e {\n        let text = std::fs::read_to_string(p).map_err(|e| format!(\"{}: {e}\", p.display()))?;\n        Deck::from_text(\u0026text, \u0026registry).map_err(|e| format!(\"{}: {e}\", p.display()))\n    };\n    let decks = [read(p1)?, read(p2)?];\n    let mut game = Game::from_decks(\u0026decks, seed, registry).map_err(|e| format!(\"{e}\"))?;\n    Ok(auto_play(\u0026mut game, seed, max_steps))\n}\n\n/// A self-contained demo registry: 30 vanilla 2/2 cost-1 characters.\nfn demo_registry() -\u003e CardRegistry {\n    let mut reg = CardRegistry::new();\n    for n in 0..30 {\n        reg.insert(CardDefinition::character(\n            CardDefId::from_raw(n),\n            1,\n            true,\n            2,\n            2,\n            1,\n        ));\n    }\n    reg\n}\n\nfn demo_decks() -\u003e Vec\u003cVec\u003cCardDefId\u003e\u003e {\n    vec![\n        (0..30).map(CardDefId::from_raw).collect(),\n        (0..30).map(CardDefId::from_raw).collect(),\n    ]\n}\n\nconst fn is_finished(game: \u0026Game) -\u003e bool {\n    matches!(game.status(), GameStatus::Finished { .. })\n}\n\n/// A human-readable one-screen summary of the game + its legal actions.\n#[must_use]\npub fn render(game: \u0026Game) -\u003e String {\n    let mut out = String::new();\n    let _ = writeln!(out, \"== status: {:?} ==\", game.status());\n    for p in game.state().players() {\n        let _ = writeln!(\n            out,\n            \"  P{}: lore={} hand={} play={} ink={} deck={} discard={}\",\n            p.id().index(),\n            p.lore(),\n            p.hand().iter().count(),\n            p.play().iter().count(),\n            p.inkwell().iter().count(),\n            p.deck().iter().count(),\n            p.discard().iter().count(),\n        );\n    }\n    out.push_str(\"  legal actions:\\n\");\n    for (i, a) in game.legal_actions().iter().enumerate() {\n        let _ = writeln!(out, \"    [{i}] {a:?}\");\n    }\n    out\n}\n\n/// Auto-play a deterministic random game (using `seed`), returning a transcript.\n/// Picks a random legal action each step until the game finishes or `max_steps`.\n///\n/// # Panics\n/// Panics if the demo game can't be created, or if a reported-legal action is\n/// rejected (which would indicate a `legal_actions`/`apply` disagreement bug).\n#[must_use]\npub fn demo(seed: u64, max_steps: usize) -\u003e String {\n    let mut game = Game::new(demo_decks(), seed, demo_registry()).expect(\"new game\");\n    auto_play(\u0026mut game, seed, max_steps)\n}\n\n/// Drive `game` by submitting a deterministic random legal action each step until\n/// it finishes or `max_steps`, returning the transcript.\n///\n/// # Panics\n/// Panics if a reported-legal action is rejected (a `legal_actions`/`apply` bug).\nfn auto_play(game: \u0026mut Game, seed: u64, max_steps: usize) -\u003e String {\n    let mut state = seed.wrapping_add(1);\n    let mut next = |bound: usize| -\u003e usize {\n        state = state\n            .wrapping_mul(6_364_136_223_846_793_005)\n            .wrapping_add(1);\n        ((state \u003e\u003e 33) as usize) % bound.max(1)\n    };\n\n    let mut out = String::new();\n    for step in 0..max_steps {\n        if is_finished(game) {\n            break;\n        }\n        let actions = game.legal_actions();\n        if actions.is_empty() {\n            out.push_str(\"(no enumerable action — stopping)\\n\");\n            break;\n        }\n        let pick = actions[next(actions.len())].clone();\n        let _ = writeln!(out, \"step {step}: {pick:?}\");\n        let _ = game.submit(pick).expect(\"legal action accepted\");\n    }\n    let _ = writeln!(out, \"Game over: {:?}\", game.status());\n    out\n}\n\n/// An interactive stdin/stdout loop: print the state, read an action index, apply.\n///\n/// # Panics\n/// Panics if the demo game can't be created.\npub fn run_interactive(seed: u64) {\n    let mut game = Game::new(demo_decks(), seed, demo_registry()).expect(\"new game\");\n    let stdin = std::io::stdin();\n    loop {\n        if is_finished(\u0026game) {\n            println!(\"Game over: {:?}\", game.status());\n            return;\n        }\n        print!(\"{}\", render(\u0026game));\n        let actions = game.legal_actions();\n        if actions.is_empty() {\n            println!(\"(no enumerable action available — this decision needs richer input)\");\n            return;\n        }\n        print!(\"\u003e choose [0..{}]: \", actions.len() - 1);\n        let _ = std::io::stdout().flush();\n        let mut line = String::new();\n        if stdin.read_line(\u0026mut line).unwrap_or(0) == 0 {\n            return; // EOF\n        }\n        let idx = line\n            .trim()\n            .parse::\u003cusize\u003e()\n            .unwrap_or(0)\n            .min(actions.len() - 1);\n        match game.submit(actions[idx].clone()) {\n            Ok(events) =\u003e println!(\"ok ({} event(s))\", events.len()),\n            Err(e) =\u003e println!(\"rejected: {e:?}\"),\n        }\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":2}},{"line":22,"address":[],"length":0,"stats":{"Line":4}},{"line":23,"address":[],"length":0,"stats":{"Line":4}},{"line":24,"address":[],"length":0,"stats":{"Line":8}},{"line":25,"address":[],"length":0,"stats":{"Line":2}},{"line":26,"address":[],"length":0,"stats":{"Line":287}},{"line":27,"address":[],"length":0,"stats":{"Line":287}},{"line":29,"address":[],"length":0,"stats":{"Line":2}},{"line":30,"address":[],"length":0,"stats":{"Line":40}},{"line":31,"address":[],"length":0,"stats":{"Line":38}},{"line":32,"address":[],"length":0,"stats":{"Line":114}},{"line":33,"address":[],"length":0,"stats":{"Line":38}},{"line":34,"address":[],"length":0,"stats":{"Line":152}},{"line":35,"address":[],"length":0,"stats":{"Line":114}},{"line":36,"address":[],"length":0,"stats":{"Line":10438}},{"line":37,"address":[],"length":0,"stats":{"Line":10400}},{"line":40,"address":[],"length":0,"stats":{"Line":2}},{"line":49,"address":[],"length":0,"stats":{"Line":2}},{"line":56,"address":[],"length":0,"stats":{"Line":6}},{"line":57,"address":[],"length":0,"stats":{"Line":8}},{"line":58,"address":[],"length":0,"stats":{"Line":24}},{"line":59,"address":[],"length":0,"stats ();\n    if std::io::stdin().read_to_string(\u0026mut input).is_err() {\n        eprintln!(\"ERROR: could not read stdin\");\n        std::process::exit(1);\n    }\n\n    match lorcana_engine::load_toml(\u0026input) {\n        Ok(defs) =\u003e {\n            if debug {\n                for d in \u0026defs {\n                    println!(\n                        \"abilities={:?} activated={:?} statics={:?} rule_statics={:?}\",\n                        d.abilities(),\n                        d.activated_abilities(),\n                        d.static_abilities(),\n                        d.rule_statics(),\n                    );\n                }\n            } else {\n                println!(\"OK: {} card(s)\", defs.len());\n            }\n        }\n        Err(e) =\u003e {\n            println!(\"ERROR: {e}\");\n            std::process::exit(1);\n        }\n    }\n}\n","traces":[{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":20},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","cards","ability.rs"],"content":"//! Card abilities.\n\nuse crate::domain::effects::Amount;\nuse crate::domain::effects::{Effect, TriggerCondition};\nuse crate::domain::game::{Condition, Stat};\nuse crate::domain::types::card::Classification;\nuse serde::{Deserialize, Serialize};\n\n/// A triggered ability (§7.4): when its `condition` is met its `effect` is added\n/// to the bag to resolve.\n///\n/// `optional` captures abilities worded with \"you may\" (§7.1.3): the controller\n/// chooses whether to resolve the effect.\n///\n/// TODO: activated, static, and replacement abilities (§7.5–§7.7) are separate\n/// ability kinds added in later slices; only triggered abilities exist so far.\n// Not `Copy` on purpose: `Effect` will gain non-`Copy` variants (targets,\n// names) when the effect DSL lands (Slice 8), so deriving `Copy` now would be\n// churn to undo later.\n#[allow(missing_copy_implementations)]\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct TriggeredAbility {\n    /// What makes the ability fire.\n    pub condition: TriggerCondition,\n    /// `true` if the effect is a \"you may\" (optional) effect.\n    pub optional: bool,\n    /// What the ability does when it resolves.\n    pub effect: Effect,\n}\n\nimpl TriggeredAbility {\n    /// Create a (mandatory) triggered ability.\n    #[must_use]\n    pub const fn new(condition: TriggerCondition, effect: Effect) -\u003e Self {\n        Self {\n            condition,\n            optional: false,\n            effect,\n        }\n    }\n\n    /// Create an optional (\"you may\") triggered ability.\n    #[must_use]\n    pub const fn optional(condition: TriggerCondition, effect: Effect) -\u003e Self {\n        Self {\n            condition,\n            optional: true,\n            effect,\n        }\n    }\n}\n\n/// The cost to use an activated ability (§7.5, written `[Cost] — [Effect]`).\n///\n/// Models the dominant shapes from the card pool: `{E}` (exert the source) and\n/// `N {I}` (pay ink), alone or combined.\n///\n/// TODO(cost atoms — Slice 5a): add the remaining activation-cost atoms found in\n/// the survey — banish-this (items, ~34 abilities) and discard-a-card — as\n/// fields/variants when a card needs them. See `docs/planning/IMPLEMENTATION_PLAN.md`\n/// (\"Slice 5a\").\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct AbilityCost {\n    /// Exert the source card (`{E}`). The source must be ready and not drying\n    /// (§4.2.2.1).\n    pub exert_self: bool,\n    /// Ink to pay (`N {I}`), exerted from the inkwell like a card's cost.\n    pub ink: u32,\n}\n\nimpl AbilityCost {\n    /// A cost of exerting the source and paying `ink`.\n    #[must_use]\n    pub const fn new(exert_self: bool, ink: u32) -\u003e Self {\n        Self { exert_self, ink }\n    }\n\n    /// The `{E}` cost (exert the source only).\n    #[must_use]\n    pub const fn exert() -\u003e Self {\n        Self::new(true, 0)\n    }\n}\n\n/// An activated ability: a cost the active player may pay to resolve an effect\n/// immediately (§7.5).\n// Not `Copy` on purpose: `Effect` will gain non-`Copy` variants (effect DSL,\n// Slice 8), so deriving `Copy` now would be churn to undo later.\n#[allow(missing_copy_implementations)]\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct ActivatedAbility {\n    /// The cost to use the ability.\n    pub cost: AbilityCost,\n    /// The effect produced when the ability is used.\n    pub effect: Effect,\n}\n\nimpl ActivatedAbility {\n    /// Create an activated ability.\n    #[must_use]\n    pub const fn new(cost: AbilityCost, effect: Effect) -\u003e Self {\n        Self { cost, effect }\n    }\n}\n\n/// Which cards a static ability's modifier applies to.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum StaticTarget {\n    /// The source card itself (\"this character gets +N {S}\").\n    SelfCard,\n    /// The controller's characters with any of the given classifications (empty\n    /// ⇒ all of the controller's characters), optionally including the source\n    /// (\"your [other] [classification] characters get +N {S}\").\n    OwnedCharacters {\n        /// Required classifications (any-of); empty matches every character.\n        classifications: Vec\u003cClassification\u003e,\n        /// Whether the source itself is included.\n        include_self: bool,\n    },\n}\n\n/// A static ability that continuously modifies a characteristic while the card\n/// is in play (§7.6).\n///\n/// TODO(duration — Slice 5f): add timed statics (\"until end of turn\"); a resolved\n/// timed effect must snapshot its targets and not affect later-entering cards\n/// (§7.6.3), unlike the continuous statics here. See\n/// `docs/planning/IMPLEMENTATION_PLAN.md` (\"Slice 5f\").\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct StaticAbility {\n    /// Which cards the modifier applies to.\n    pub target: StaticTarget,\n    /// The characteristic modified.\n    pub stat: Stat,\n    /// The signed amount (e.g. `+2` or `-1`).\n    pub delta: i32,\n    /// A condition gating the modifier (\"while this character is exerted, …\"); it\n    /// applies only while the condition holds. `None` means always.\n    pub condition: Option\u003cCondition\u003e,\n    /// If set, the effective delta is `delta × count` — a dynamic \"+N {stat} for\n    /// each …\" static (e.g. \"+1 {L} for each other Villain you have in play\").\n    pub per: Option\u003cAmount\u003e,\n}\n\n/// A static ability that modifies a **game rule** while the card is in play (the\n/// win/loss modification layer, §1.2.1).\n///\n/// TODO(modification layer — Slice 5g+): only the lore-to-win override exists so\n/// far. The add / remove-suppress space (\"you can't lose\", \"opponents can't\n/// win\", added alternate wins) is enumerated in the `win_loss.rs` test TODO and\n/// lands as more cards need it. See `docs/planning/IMPLEMENTATION_PLAN.md`\n/// (\"Slice 5g\").\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum GameRuleStatic {\n    /// \"Opponents need `threshold` lore to win the game\" (Donald Duck –\n    /// Flustered Sorcerer).\n    OpponentsLoreToWin(u32),\n}\n\nimpl StaticAbility {\n    /// Create a self static modifier (\"this character gets +delta {stat}\").\n    #[must_use]\n    pub const fn self_modifier(stat: Stat, delta: i32) -\u003e Self {\n        Self {\n            target: StaticTarget::SelfCard,\n            stat,\n            delta,\n            condition: None,\n            per: None,\n        }\n    }\n\n    /// Create a selector static modifier over the controller's characters.\n    #[must_use]\n    pub const fn owned_characters(\n        classifications: Vec\u003cClassification\u003e,\n        include_self: bool,\n        stat: Stat,\n        delta: i32,\n    ) -\u003e Self {\n        Self {\n            target: StaticTarget::OwnedCharacters {\n                classifications,\n                include_self,\n            },\n            stat,\n            delta,\n            condition: None,\n            per: None,\n        }\n    }\n\n    /// Gate this static ability on a [`Condition`] (builder).\n    #[must_use]\n    pub const fn with_condition(mut self, condition: Condition) -\u003e Self {\n        self.condition = Some(condition);\n        self\n    }\n\n    /// Make this static's delta scale by a live [`Amount`] (builder), for \"+N\n    /// {stat} for each …\".\n    #[must_use]\n    pub fn with_count(mut self, per: Amount) -\u003e Self {\n        self.per = Some(per);\n        self\n    }\n}\n","traces":[{"line":34,"address":[],"length":0,"stats":{"Line":3949}},{"line":44,"address":[],"length":0,"stats":{"Line":1525}},{"line":74,"address":[],"length":0,"stats":{"Line":1161}},{"line":80,"address":[],"length":0,"stats":{"Line":6}},{"line":81,"address":[],"length":0,"stats":{"Line":6}},{"line":101,"address":[],"length":0,"stats":{"Line":1161}},{"line":163,"address":[],"length":0,"stats":{"Line":180}},{"line":175,"address":[],"length":0,"stats":{"Line":90}},{"line":182,"address":[],"length":0,"stats":{"Line":180}},{"line":195,"address":[],"length":0,"stats":{"Line":90}},{"line":196,"address":[],"length":0,"stats":{"Line":90}},{"line":197,"address":[],"length":0,"stats":{"Line":90}},{"line":203,"address":[],"length":0,"stats":{"Line":0}},{"line":204,"address":[],"length":0,"stats":{"Line":0}},{"line":205,"address":[],"length":0,"stats":{"Line":0}}],"covered":12,"coverable":15},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","cards","card_kind.rs"],"content":"//! Type-specific card data.\n\nuse crate::domain::types::card::CardType;\nuse serde::{Deserialize, Serialize};\n\n/// The per-type characteristics of a card.\n///\n/// Modeling these as variants keeps invalid states unrepresentable (e.g. an\n/// action can't carry willpower). Only the data needed so far is included;\n/// variants gain fields as later slices need them (e.g. location move cost, the\n/// song classification).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum CardKind {\n    /// A character with its printed Strength, Willpower, and Lore (§6.1, §6.2).\n    Character {\n        /// Printed Strength `{S}`.\n        strength: u32,\n        /// Printed Willpower `{W}`.\n        willpower: u32,\n        /// Printed Lore `{L}` gained when questing.\n        lore: u32,\n    },\n    /// An action (resolves then goes to discard; never in play).\n    Action,\n    /// An item (stays in play).\n    Item,\n    /// A location (stays in play, §6.5).\n    Location {\n        /// Move cost — ink to move a character here (§6.5.4).\n        move_cost: u32,\n        /// Printed Willpower `{W}` — banished when damage reaches it (§6.5.5).\n        willpower: u32,\n        /// Printed Lore `{L}` — gained at the Set step (§6.5.6).\n        lore: u32,\n    },\n}\n\nimpl CardKind {\n    /// The [`CardType`] tag for this kind.\n    #[must_use]\n    pub const fn card_type(self) -\u003e CardType {\n        match self {\n            Self::Character { .. } =\u003e CardType::Character,\n            Self::Action =\u003e CardType::Action,\n            Self::Item =\u003e CardType::Item,\n            Self::Location { .. } =\u003e CardType::Location,\n        }\n    }\n}\n","traces":[{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":6},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","cards","definition.rs"],"content":"//! Card definition types.\n//!\n//! A `CardDefinition` is the static, printed data for a card (reference data),\n//! as opposed to a [`CardInstance`] which is a specific copy in a game. Only the\n//! fields needed so far are modeled; this grows as later slices need name,\n//! classifications, more ability kinds, etc.\n//!\n//! [`CardInstance`]: crate::domain::game::CardInstance\n\nuse super::ability::{ActivatedAbility, GameRuleStatic, StaticAbility, TriggeredAbility};\nuse super::card_kind::CardKind;\nuse super::keyword::{Keyword, ShiftAbility};\nuse crate::domain::effects::Effect;\nuse crate::domain::types::card::{CardType, Classification, InkType};\nuse crate::domain::types::ids::CardDefId;\nuse serde::{Deserialize, Serialize};\n\n/// The printed data for a card.\n///\n/// Not `Copy`: it owns a `Vec` of abilities. Look it up by reference via\n/// [`CardRegistry::get`](super::registry::CardRegistry::get).\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct CardDefinition {\n    id: CardDefId,\n    /// Ink cost to play the card (§6.2.7).\n    cost: u32,\n    /// Whether the card has the inkwell symbol and so may be put into the\n    /// inkwell (§4.3.3.1, §6.2.8).\n    inkwell: bool,\n    /// Type-specific characteristics.\n    kind: CardKind,\n    /// The card's triggered abilities (§7.4).\n    abilities: Vec\u003cTriggeredAbility\u003e,\n    /// The card's activated abilities (§7.5).\n    activated: Vec\u003cActivatedAbility\u003e,\n    /// The card's classifications (§6.2.6), e.g. Hero, Villain, Princess.\n    classifications: Vec\u003cClassification\u003e,\n    /// The card's static abilities (§7.6).\n    static_abilities: Vec\u003cStaticAbility\u003e,\n    /// The card's game-rule static abilities (e.g. win-condition overrides).\n    rule_statics: Vec\u003cGameRuleStatic\u003e,\n    /// The card's keyword abilities (§10).\n    keywords: Vec\u003cKeyword\u003e,\n    /// The names this card counts as (§6.2.1). Usually one; some count as several\n    /// (e.g. Flotsam \u0026 Jetsam counts as `Flotsam` and `Jetsam`; Chip 'n' Dale as\n    /// `Chip` and `Dale`). Used by Shift's same-name rule and \"named X\" effects.\n    names: Vec\u003cString\u003e,\n    /// An action's on-play effects (§6.3.2): actions have effects rather than\n    /// abilities. Resolved directly when the action is played (not via the bag,\n    /// §6.3.1.2), then the card goes to discard. Empty for non-actions.\n    action_effects: Vec\u003cEffect\u003e,\n    /// The card's ink type(s) (§6.2.3) — one, or two for dual-ink cards. Both of a\n    /// dual-ink card's colours count toward a deck's ≤2-ink identity (§2.1.1.2).\n    ink_types: Vec\u003cInkType\u003e,\n    /// Deck-building copy limit override (§2.1.1.3). `None` = the default 4; some\n    /// cards print their own (e.g. 99 for Dalmatian Puppy, 2 for The Glass Slipper).\n    max_deck_copies: Option\u003cu32\u003e,\n    /// URL (or path) to the card's image, for display (engine-opaque). `None` if unset.\n    image: Option\u003cString\u003e,\n    /// The card's printed rules text, for display / behaviour auditing. `None` if\n    /// the card has no text (vanilla).\n    text: Option\u003cString\u003e,\n}\n\nimpl CardDefinition {\n    /// Create a card definition with no abilities.\n    #[must_use]\n    pub const fn new(id: CardDefId, cost: u32, inkwell: bool, kind: CardKind) -\u003e Self {\n        Self {\n            id,\n            cost,\n            inkwell,\n            kind,\n            abilities: Vec::new(),\n            activated: Vec::new(),\n            classifications: Vec::new(),\n            static_abilities: Vec::new(),\n            rule_statics: Vec::new(),\n            keywords: Vec::new(),\n            names: Vec::new(),\n            action_effects: Vec::new(),\n            ink_types: Vec::new(),\n            max_deck_copies: None,\n            image: None,\n            text: None,\n        }\n    }\n\n    /// Convenience constructor for a character card with no abilities.\n    #[must_use]\n    pub const fn character(\n        id: CardDefId,\n        cost: u32,\n        inkwell: bool,\n        strength: u32,\n        willpower: u32,\n        lore: u32,\n    ) -\u003e Self {\n        Self::new(\n            id,\n            cost,\n            inkwell,\n            CardKind::Character {\n                strength,\n                willpower,\n                lore,\n            },\n        )\n    }\n\n    /// Replace this definition's triggered abilities (builder style).\n    #[must_use]\n    pub fn with_abilities(mut self, abilities: Vec\u003cTriggeredAbility\u003e) -\u003e Self {\n        self.abilities = abilities;\n        self\n    }\n\n    /// Replace this definition's activated abilities (builder style).\n    #[must_use]\n    pub fn with_activated(mut self, activated: Vec\u003cActivatedAbility\u003e) -\u003e Self {\n        self.activated = activated;\n        self\n    }\n\n    /// Replace this definition's classifications (builder style).\n    #[must_use]\n    pub fn with_classifications(mut self, classifications: Vec\u003cClassification\u003e) -\u003e Self {\n        self.classifications = classifications;\n        self\n    }\n\n    /// Replace this definition's static abilities (builder style).\n    #[must_use]\n    pub fn with_static(mut self, static_abilities: Vec\u003cStaticAbility\u003e) -\u003e Self {\n        self.static_abilities = static_abilities;\n        self\n    }\n\n    /// Replace this definition's game-rule static abilities (builder style).\n    #[must_use]\n    pub fn with_rule_statics(mut self, rule_statics: Vec\u003cGameRuleStatic\u003e) -\u003e Self {\n        self.rule_statics = rule_statics;\n        self\n    }\n\n    /// Replace this definition's keyword abilities (builder style).\n    #[must_use]\n    pub fn with_keywords(mut self, keywords: Vec\u003cKeyword\u003e) -\u003e Self {\n        self.keywords = keywords;\n        self\n    }\n\n    /// Set the names this card counts as (builder style).\n    #[must_use]\n    pub fn with_names(mut self, names: Vec\u003cString\u003e) -\u003e Self {\n        self.names = names;\n        self\n    }\n\n    /// Set an action's on-play effects (builder style, §6.3.2).\n    #[must_use]\n    pub fn with_action_effects(mut self, action_effects: Vec\u003cEffect\u003e) -\u003e Self {\n        self.action_effects = action_effects;\n        self\n    }\n\n    /// Set the card's ink type(s) (builder).\n    #[must_use]\n    pub fn with_ink_types(mut self, ink_types: Vec\u003cInkType\u003e) -\u003e Self {\n        self.ink_types = ink_types;\n        self\n    }\n\n    /// Set a deck-building copy-limit override (builder).\n    #[must_use]\n    pub const fn with_max_deck_copies(mut self, max: Option\u003cu32\u003e) -\u003e Self {\n        self.max_deck_copies = max;\n        self\n    }\n\n    /// Set the card's display image URL/path (builder).\n    #[must_use]\n    pub fn with_image(mut self, image: Option\u003cString\u003e) -\u003e Self {\n        self.image = image;\n        self\n    }\n\n    /// Set the card's printed rules text (builder).\n    #[must_use]\n    pub fn with_text(mut self, text: Option\u003cString\u003e) -\u003e Self {\n        self.text = text;\n        self\n    }\n\n    /// Convenience constructor for a location card with no abilities (§6.5).\n    #[must_use]\n    pub const fn location(\n        id: CardDefId,\n        cost: u32,\n        inkwell: bool,\n        move_cost: u32,\n        willpower: u32,\n        lore: u32,\n    ) -\u003e Self {\n        Self::new(\n            id,\n            cost,\n            inkwell,\n            CardKind::Location {\n                move_cost,\n                willpower,\n                lore,\n            },\n        )\n    }\n\n    /// The printed-card id.\n    #[must_use]\n    pub const fn id(\u0026self) -\u003e CardDefId {\n        self.id\n    }\n\n    /// The ink cost to play this card.\n    #[must_use]\n    pub const fn cost(\u0026self) -\u003e u32 {\n        self.cost\n    }\n\n    /// Whether this card has the inkwell symbol.\n    #[must_use]\n    pub const fn has_inkwell_symbol(\u0026self) -\u003e bool {\n        self.inkwell\n    }\n\n    /// The type-specific characteristics.\n    #[must_use]\n    pub const fn kind(\u0026self) -\u003e CardKind {\n        self.kind\n    }\n\n    /// Printed Willpower `{W}` for characters and locations (§6.2, §6.5.5);\n    /// `None` for actions/items, which have none.\n    #[must_use]\n    pub const fn printed_willpower(\u0026self) -\u003e Option\u003cu32\u003e {\n        match self.kind {\n            CardKind::Character { willpower, .. } | CardKind::Location { willpower, .. } =\u003e {\n                Some(willpower)\n            }\n            CardKind::Action | CardKind::Item =\u003e None,\n        }\n    }\n\n    /// Printed Lore `{L}` for characters and locations (§6.2, §6.5.6); `None` for\n    /// actions/items, which have none.\n    #[must_use]\n    pub const fn printed_lore(\u0026self) -\u003e Option\u003cu32\u003e {\n        match self.kind {\n            CardKind::Character { lore, .. } | CardKind::Location { lore, .. } =\u003e Some(lore),\n            CardKind::Action | CardKind::Item =\u003e None,\n        }\n    }\n\n    /// The card-type tag.\n    #[must_use]\n    pub const fn card_type(\u0026self) -\u003e CardType {\n        self.kind.card_type()\n    }\n\n    /// This card's triggered abilities.\n    #[must_use]\n    pub fn abilities(\u0026self) -\u003e \u0026[TriggeredAbility] {\n        \u0026self.abilities\n    }\n\n    /// This card's activated abilities.\n    #[must_use]\n    pub fn activated_abilities(\u0026self) -\u003e \u0026[ActivatedAbility] {\n        \u0026self.activated\n    }\n\n    /// This card's classifications (§6.2.6).\n    #[must_use]\n    pub fn classifications(\u0026self) -\u003e \u0026[Classification] {\n        \u0026self.classifications\n    }\n\n    /// Whether this card has the given classification.\n    #[must_use]\n    pub fn has_classification(\u0026self, classification: \u0026Classification) -\u003e bool {\n        self.classifications.contains(classification)\n    }\n\n    /// This card's static abilities (§7.6).\n    #[must_use]\n    pub fn static_abilities(\u0026self) -\u003e \u0026[StaticAbility] {\n        \u0026self.static_abilities\n    }\n\n    /// This card's game-rule static abilities.\n    #[must_use]\n    pub fn rule_statics(\u0026self) -\u003e \u0026[GameRuleStatic] {\n        \u0026self.rule_statics\n    }\n\n    /// This card's keyword abilities (§10).\n    #[must_use]\n    pub fn keywords(\u0026self) -\u003e \u0026[Keyword] {\n        \u0026self.keywords\n    }\n\n    /// Whether this card has the given keyword, e.g. `\u0026Keyword::Evasive`.\n    #[must_use]\n    pub fn has_keyword(\u0026self, keyword: \u0026Keyword) -\u003e bool {\n        self.keywords.contains(keyword)\n    }\n\n    /// Total Resist `+N` (damage reduction) on this card (§10.8, stacks).\n    #[must_use]\n    pub fn resist(\u0026self) -\u003e u32 {\n        self.keywords\n            .iter()\n            .filter_map(|k| match k {\n                Keyword::Resist(n) =\u003e Some(*n),\n                _ =\u003e None,\n            })\n            .sum()\n    }\n\n    /// Total Challenger `+N` (`{S}` while challenging) on this card (§10.5, stacks).\n    #[must_use]\n    pub fn challenger_bonus(\u0026self) -\u003e u32 {\n        self.keywords\n            .iter()\n            .filter_map(|k| match k {\n                Keyword::Challenger(n) =\u003e Some(*n),\n                _ =\u003e None,\n            })\n            .sum()\n    }\n\n    /// The names this card counts as (§6.2.1).\n    #[must_use]\n    pub fn names(\u0026self) -\u003e \u0026[String] {\n        \u0026self.names\n    }\n\n    /// Whether this card counts as the given name.\n    #[must_use]\n    pub fn has_name(\u0026self, name: \u0026str) -\u003e bool {\n        self.names.iter().any(|n| n == name)\n    }\n\n    /// This card's Shift ability (cost + target restriction), if any (§10.10).\n    #[must_use]\n    pub fn shift(\u0026self) -\u003e Option\u003c\u0026ShiftAbility\u003e {\n        self.keywords.iter().find_map(|k| match k {\n            Keyword::Shift(ability) =\u003e Some(ability),\n            _ =\u003e None,\n        })\n    }\n\n    /// This card's Boost cost in ink, if it has Boost (§10.4).\n    #[must_use]\n    pub fn boost(\u0026self) -\u003e Option\u003cu32\u003e {\n        self.keywords.iter().find_map(|k| match k {\n            Keyword::Boost(cost) =\u003e Some(*cost),\n            _ =\u003e None,\n        })\n    }\n\n    /// An action's on-play effects (§6.3.2).\n    #[must_use]\n    pub fn action_effects(\u0026self) -\u003e \u0026[Effect] {\n        \u0026self.action_effects\n    }\n\n    /// The card's ink type(s) — one, or two for dual-ink (§6.2.3).\n    #[must_use]\n    pub fn ink_types(\u0026self) -\u003e \u0026[InkType] {\n        \u0026self.ink_types\n    }\n\n    /// The deck-building copy limit for this card (its override, or the default 4).\n    #[must_use]\n    pub const fn max_deck_copies(\u0026self) -\u003e u32 {\n        match self.max_deck_copies {\n            Some(n) =\u003e n,\n            None =\u003e 4,\n        }\n    }\n\n    /// The card's image URL/path, if set (engine-opaque).\n    #[must_use]\n    pub fn image(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.image.as_deref()\n    }\n\n    /// The card's printed rules text, if any.\n    #[must_use]\n    pub fn text(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.text.as_deref()\n    }\n\n    /// Whether this card is a song (an action with the \"Song\" classification,\n    /// §6.3.3.2).\n    #[must_use]\n    pub fn is_song(\u0026self) -\u003e bool {\n        matches!(self.kind, CardKind::Action)\n            \u0026\u0026 self.has_classification(\u0026Classification::new(\"Song\"))\n    }\n\n    /// This card's Singer value, if it has Singer (§10.11): it may sing songs as\n    /// if its cost were this value.\n    #[must_use]\n    pub fn singer(\u0026self) -\u003e Option\u003cu32\u003e {\n        self.keywords.iter().find_map(|k| match k {\n            Keyword::Singer(n) =\u003e Some(*n),\n            _ =\u003e None,\n        })\n    }\n\n    /// This song's Sing Together value, if it has Sing Together (§10.12):\n    /// characters with combined cost ≥ this value may sing it together.\n    #[must_use]\n    pub fn sing_together(\u0026self) -\u003e Option\u003cu32\u003e {\n        self.keywords.iter().find_map(|k| match k {\n            Keyword::SingTogether(n) =\u003e Some(*n),\n            _ =\u003e None,\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::CardDefinition;\n    use crate::domain::effects::{Amount, Effect, PlayerScope, TriggerCondition};\n    use crate::domain::types::ids::CardDefId;\n\n    #[test]\n    fn new_card_has_no_abilities() {\n        let def = CardDefinition::character(CardDefId::from_raw(1), 3, true, 2, 2, 1);\n        assert!(def.abilities().is_empty());\n        assert!(def.activated_abilities().is_empty());\n        assert!(def.classifications().is_empty());\n        assert_eq!(def.cost(), 3);\n        assert!(def.has_inkwell_symbol());\n    }\n\n    #[test]\n    fn classifications_round_trip_and_query() {\n        use crate::domain::types::card::Classification;\n        let def = CardDefinition::character(CardDefId::from_raw(3), 4, true, 3, 4, 2)\n            .with_classifications(vec![\"Villain\".into(), \"Sorcerer\".into()]);\n        assert_eq!(def.classifications().len(), 2);\n        assert!(def.has_classification(\u0026Classification::new(\"Villain\")));\n        assert!(!def.has_classification(\u0026Classification::new(\"Hero\")));\n    }\n\n    #[test]\n    fn with_abilities_attaches_triggers() {\n        use crate::domain::cards::TriggeredAbility;\n        let def = CardDefinition::character(CardDefId::from_raw(2), 1, true, 1, 1, 1)\n            .with_abilities(vec![\n                TriggeredAbility::new(\n                    TriggerCondition::WhenYouPlayThis,\n                    Effect::Draw {\n                        who: PlayerScope::You,\n                        amount: Amount::fixed(1),\n                    },\n                ),\n                TriggeredAbility::optional(\n                    TriggerCondition::WhenThisQuests,\n                    Effect::Lore {\n                        who: PlayerScope::EachOpponent,\n                        amount: Amount::fixed(-1),\n                    },\n                ),\n            ]);\n\n        assert_eq!(def.abilities().len(), 2);\n        assert_eq!(\n            def.abilities()[0].condition,\n            TriggerCondition::WhenYouPlayThis\n        );\n        assert!(!def.abilities()[0].optional);\n        assert!(def.abilities()[1].optional);\n    }\n}\n","traces":[{"line":68,"address":[],"length":0,"stats":{"Line":57309}},{"line":74,"address":[],"length":0,"stats":{"Line":114618}},{"line":75,"address":[],"length":0,"stats":{"Line":114618}},{"line
