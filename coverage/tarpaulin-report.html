"Line":109287}},{"line":139,"address":[],"length":0,"stats":{"Line":109287}}],"covered":54,"coverable":59},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","rules","mod.rs"],"content":"//! Rules: legality checks and the game-state check (§1.9).\n\npub mod game_state_check;\npub mod required_action;\npub mod win_loss;\n\n// Re-export for convenience\npub use game_state_check::game_state_check;\npub use required_action::RequiredAction;\npub use win_loss::{check_win_loss, lore_to_win};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","rules","required_action.rs"],"content":"//! Required actions produced by the game-state check.\n\nuse crate::domain::types::ids::{CardId, PlayerId};\nuse serde::{Deserialize, Serialize};\n\n/// An action the game *must* perform as a result of a game-state check (§1.9.1).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub enum RequiredAction {\n    /// The given player wins the game (§1.9.1.1, §3.2.1.3).\n    PlayerWins(PlayerId),\n    /// The given player loses the game (§1.9.1.2).\n    PlayerLoses(PlayerId),\n    /// The given card is banished — its damage has reached its Willpower\n    /// (§1.9.1.3). It moves to its owner's discard (§8.6.2).\n    Banish {\n        /// The card's owner.\n        player: PlayerId,\n        /// The card to banish.\n        card: CardId,\n    },\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","rules","win_loss.rs"],"content":"//! Win/loss evaluation — the single seam used by the game-state check (§1.9.2).\n//!\n//! Win/loss conditions are **not** a fixed list. The active set is derived each\n//! check from a base layer plus modifications contributed by effects in play:\n//!\n//! * **base layer** (implemented here): reach the lore threshold to win\n//!   (§1.9.1.1), lose on drawing from an empty deck (§1.9.1.2), and win as the\n//!   last player standing (§3.2.1.3);\n//! * **modification layer** (added with static abilities / the effect DSL):\n//!   effects may **add** new conditions (\"you win if you control 7 distinct\n//!   Seven Dwarfs\"), **remove/suppress** conditions (\"you can't lose the\n//!   game\"), or **override** their parameters (Donald Duck – Flustered Sorcerer:\n//!   \"opponents need 25 lore to win\"). Per the Golden Rules a card supersedes a\n//!   game rule (§1.2.1) and a prevention beats a permission (§1.2.2), so a\n//!   suppression wins over an add for the same outcome.\n//!\n//! Slice 1 implements only the base layer; the modification layer plugs into\n//! [`check_win_loss`] once effects exist, without changing its call sites.\n\nuse super::RequiredAction;\nuse crate::domain::game::GameState;\nuse crate::domain::types::ids::PlayerId;\n\n/// The amount of lore `player` must reach to win the game.\n///\n/// The base requirement is 20 lore (§1.9.1.1); a static ability can override it\n/// (e.g. Donald Duck – Flustered Sorcerer, \"opponents need 25 lore to win\"), so\n/// the effective threshold is read from the game state's rule modifiers.\n#[must_use]\npub fn lore_to_win(state: \u0026GameState, player: PlayerId) -\u003e u32 {\n    state.lore_to_win(player)\n}\n\n/// Evaluate all win/loss conditions for the current state and return the\n/// resulting required actions (§1.9.1, §1.9.2).\n///\n/// Eliminated players are ignored. The win-beats-lose tie-break (§1.9.2.1) is\n/// applied: if a player would simultaneously win and lose, only the win is\n/// returned. Results are ordered by seat.\n#[must_use]\npub fn check_win_loss(state: \u0026GameState) -\u003e Vec\u003cRequiredAction\u003e {\n    let mut actions = Vec::new();\n\n    for player in state.players() {\n        if player.is_eliminated() {\n            continue;\n        }\n        let id = player.id();\n\n        if player.lore() \u003e= lore_to_win(state, id) {\n            actions.push(RequiredAction::PlayerWins(id));\n        } else if player.drew_from_empty_deck() {\n            // `else` enforces the win-beats-lose tie-break (§1.9.2.1).\n            actions.push(RequiredAction::PlayerLoses(id));\n        }\n    }\n\n    // Last player standing wins (§3.2.1.3): only meaningful once at least one\n    // player has already been eliminated.\n    let remaining: Vec\u003c\u0026_\u003e = state\n        .players()\n        .iter()\n        .filter(|p| !p.is_eliminated())\n        .collect();\n    if state.players().len() \u003e 1 \u0026\u0026 remaining.len() == 1 {\n        let winner = RequiredAction::PlayerWins(remaining[0].id());\n        if !actions.contains(\u0026winner) {\n            actions.push(winner);\n        }\n    }\n\n    actions\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{check_win_loss, lore_to_win};\n    use crate::domain::game::GameState;\n    use crate::domain::rules::RequiredAction;\n    use crate::domain::types::ids::{CardDefId, PlayerId};\n\n    // The lore-to-win **override** layer is implemented (Slice 5g): the Donald\n    // Duck case and the threshold reverting when his static leaves play are\n    // covered in `tests/win_loss_modifiers.rs`.\n    //\n    // TODO(modification layer / Slice 5g+): the **add** and **remove/suppress**\n    // parts still need their ability kinds (and the effect DSL). The active\n    // condition set is the base layer plus effect modifications, with prevention\n    // beating permission (§1.2.2) and a card superseding a game rule (§1.2.1).\n    // Tracked by Slice 5 in docs/planning/IMPLEMENTATION_PLAN.md (\"Slice 5g\").\n    // Remaining edge cases to turn into tests as those land:\n    //\n    // Override (done for lore-to-win; remaining variants):\n    //   - Stacking threshold modifiers (e.g. two +5 effects =\u003e 30).\n    //   - A hypothetical lowering override (e.g. \"you win at 15 lore\") works too.\n    //\n    // Add (introduce a brand-new condition):\n    //   - \"You win if you control 7 distinct Seven Dwarfs characters\": 6 distinct\n    //     =\u003e no win, 7 distinct =\u003e win, duplicates do not count.\n    //   - \"Opponents lose if ...\": a new loss condition fires for opponents only.\n    //\n    // Remove / suppress (a prevention):\n    //   - \"You can't lose the game while this card is in play\": a deck-out draw\n    //     does NOT cause a loss while the card is present.\n    //   - \"Opponents can't win while this card is in play\": an opponent at 20+\n    //     does not win.\n    //   - \"You can't lose and your opponents can't win while this card is in\n    //     play\": both suppressions apply at once.\n    //   - \"The 20-lore win doesn't apply to you\": controller at 20 does not win.\n    //\n    // Precedence / interaction:\n    //   - Prevention beats add (§1.2.2): an added alternate win is suppressed by\n    //     an opposing \"you can't win\".\n    //   - Win still beats lose with modifiers present (an added win + a loss\n    //     condition at once =\u003e win).\n    //   - Multiple \"can't lose\" sources: removing one still leaves loss\n    //     suppressed by the other.\n    //\n    // Duration / \"as long as this card is on the field\":\n    //   - When the suppressing card leaves play, suppression ends immediately and\n    //     a pending loss/win is applied at the very next game-state check (e.g. a\n    //     deck-out flag set earlier now causes the loss).\n    //\n    // Multiplayer:\n    //   - Simultaneous wins by multiple players in the same check.\n\n    fn two_player_game() -\u003e GameState {\n        let decks = vec![\n            (0..10).map(CardDefId::from_raw).collect::\u003cVec\u003c_\u003e\u003e(),\n            (10..20).map(CardDefId::from_raw).collect::\u003cVec\u003c_\u003e\u003e(),\n        ];\n        GameState::new(decks, 1)\n    }\n\n    #[test]\n    fn no_actions_at_game_start() {\n        let state = two_player_game();\n        assert!(check_win_loss(\u0026state).is_empty());\n    }\n\n    #[test]\n    fn reaching_the_lore_threshold_wins() {\n        let mut state = two_player_game();\n        let p0 = PlayerId::from_index(0);\n        let threshold = lore_to_win(\u0026state, p0);\n        state.player_mut(p0).unwrap().add_lore(threshold);\n\n        assert_eq!(check_win_loss(\u0026state), vec![RequiredAction::PlayerWins(p0)]);\n    }\n\n    #[test]\n    fn drawing_from_empty_deck_loses() {\n        let mut state = two_player_game();\n        let p1 = PlayerId::from_index(1);\n        state.player_mut(p1).unwrap().note_drew_from_empty_deck();\n\n        assert_eq!(\n            check_win_loss(\u0026state),\n            vec![RequiredAction::PlayerLoses(p1)]\n        );\n    }\n\n    #[test]\n    fn winning_beats_losing_for_the_same_player() {\n        let mut state = two_player_game();\n        let p0 = PlayerId::from_index(0);\n        {\n            let player = state.player_mut(p0).unwrap();\n            player.add_lore(20);\n            player.note_drew_from_empty_deck();\n        }\n\n        // §1.9.2.1: a player who would win and lose at once wins.\n        assert_eq!(check_win_loss(\u0026state), vec![RequiredAction::PlayerWins(p0)]);\n    }\n\n    #[test]\n    fn last_player_standing_wins() {\n        let mut state = two_player_game();\n        let p0 = PlayerId::from_index(0);\n        let p1 = PlayerId::from_index(1);\n        state.player_mut(p0).unwrap().eliminate();\n\n        assert_eq!(check_win_loss(\u0026state), vec![RequiredAction::PlayerWins(p1)]);\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":646939}},{"line":31,"address":[],"length":0,"stats":{"Line":1940817}},{"line":41,"address":[],"length":0,"stats":{"Line":302651}},{"line":42,"address":[],"length":0,"stats":{"Line":605302}},{"line":44,"address":[],"length":0,"stats":{"Line":1210688}},{"line":45,"address":[],"length":0,"stats":{"Line":1210772}},{"line":46,"address":[],"length":0,"stats":{"Line":58}},{ );\n    match args.get(1).map(String::as_str) {\n        Some(\"demo\") =\u003e {\n            let seed = args.get(2).and_then(|s| s.parse().ok()).unwrap_or(7);\n            print!(\"{}\", lorcana_engine::application::host::demo(seed, 5_000));\n        }\n        Some(\"play\") =\u003e {\n            let (Some(d1), Some(d2)) = (args.get(2), args.get(3)) else {\n                eprintln!(\"usage: play \u003cdeck1.txt\u003e \u003cdeck2.txt\u003e [seed]\");\n                std::process::exit(2);\n            };\n            let seed = args.get(4).and_then(|s| s.parse().ok()).unwrap_or(7);\n            match lorcana_engine::application::host::play_from_files(\n                Path::new(\"cards/sets\"),\n                Path::new(d1),\n                Path::new(d2),\n                seed,\n                10_000,\n            ) {\n                Ok(transcript) =\u003e print!(\"{transcript}\"),\n                Err(e) =\u003e {\n                    eprintln!(\"error: {e}\");\n                    std::process::exit(1);\n                }\n            }\n        }\n        #[cfg(feature = \"audit-log\")]\n        Some(\"audit\") =\u003e {\n            let (Some(d1), Some(d2)) = (args.get(2), args.get(3)) else {\n                eprintln!(\"usage: audit \u003cdeck1.txt\u003e \u003cdeck2.txt\u003e [seed]\");\n                std::process::exit(2);\n            };\n            let seed = args.get(4).and_then(|s| s.parse().ok()).unwrap_or(7);\n            match lorcana_engine::application::audit::audit_from_files(\n                Path::new(\"cards/sets\"),\n                Path::new(d1),\n                Path::new(d2),\n                seed,\n                10_000,\n            ) {\n                Ok(log) =\u003e print!(\"{log}\"),\n                Err(e) =\u003e {\n                    eprintln!(\"error: {e}\");\n                    std::process::exit(1);\n                }\n            }\n        }\n        _ =\u003e {\n            let seed = args.get(2).and_then(|s| s.parse().ok()).unwrap_or(7);\n            lorcana_engine::application::host::run_interactive(seed);\n        }\n    }\n}\n","traces":[{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":23}]};

    <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
