ters play so the game-state check (banishment at damage ≥\n/// willpower) and the Set-step lore gain read them from state without a registry\n/// lookup. Locations have no Strength and deal no damage (§6.5.5).\n///\n/// TODO(modifiable location stats — see the `Stat` TODO in\n/// `src/domain/game/modifier.rs`): move cost / willpower / lore should become\n/// `Stat` variants so continuous effects can adjust them; for now they're fixed.\n///\n/// [`CardInstance`]: crate::domain::game::CardInstance\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct LocationStats {\n    /// Willpower `{W}` — banished when damage reaches it (§6.5.5).\n    pub willpower: u32,\n    /// Lore `{L}` gained at the controller's Set step (§6.5.6).\n    pub lore: u32,\n    /// Move cost — ink to move one of your characters here (§6.5.4, §4.3.7).\n    pub move_cost: u32,\n}\n\nimpl LocationStats {\n    /// Create location stats.\n    #[must_use]\n    pub const fn new(willpower: u32, lore: u32, move_cost: u32) -\u003e Self {\n        Self {\n            willpower,\n            lore,\n            move_cost,\n        }\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":1530741}},{"line":61,"address":[],"length":0,"stats":{"Line":738}}],"covered":2,"coverable":2},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","conditions.rs"],"content":"//! Per-instance card conditions.\n//!\n//! Conditions are the mutable states a card carries while in a zone, as\n//! described in the comprehensive rules (§5). Only the conditions needed by the\n//! current slice are modeled; stack membership (under/on-top, introduced by\n//! Shift) is deferred until the keyword that needs it.\n\nuse serde::{Deserialize, Serialize};\n\n/// The conditions currently applied to a card instance.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct Conditions {\n    /// `true` if ready, `false` if exerted (turned sideways).\n    pub ready: bool,\n    /// Accumulated damage counters (§9). Persistent until removed or banished.\n    pub damage: u32,\n    /// `true` while the card is \"drying\" (summoning sick) and so cannot quest,\n    /// be declared as a challenger, or exert to pay a cost (§5.1.11).\n    pub drying: bool,\n    /// `true` if facedown (e.g. in the deck or inkwell), `false` if faceup.\n    pub facedown: bool,\n}\n\nimpl Conditions {\n    /// Conditions for a facedown card sitting in a deck (§5.1.13.5).\n    #[must_use]\n    pub const fn in_deck() -\u003e Self {\n        Self {\n            ready: true,\n            damage: 0,\n            drying: false,\n            facedown: true,\n        }\n    }\n\n    /// Conditions for a card placed in the inkwell: facedown and ready\n    /// (§8.5.2). Identical in shape to a deck card today, but named for intent.\n    #[must_use]\n    pub const fn in_inkwell() -\u003e Self {\n        Self {\n            ready: true,\n            damage: 0,\n            drying: false,\n            facedown: true,\n        }\n    }\n\n    /// Default conditions for a card in a faceup public pile (discard / hand):\n    /// faceup and undamaged. Used when a card (or a dissolved stack) moves there.\n    #[must_use]\n    pub const fn faceup_idle() -\u003e Self {\n        Self {\n            ready: true,\n            damage: 0,\n            drying: false,\n            facedown: false,\n        }\n    }\n\n    /// Conditions for a character as it enters play: ready, undamaged, drying,\n    /// and faceup (§5.1.13.1).\n    #[must_use]\n    pub const fn entering_play() -\u003e Self {\n        Self {\n            ready: true,\n            damage: 0,\n            drying: true,\n            facedown: false,\n        }\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":53380}},{"line":39,"address":[],"length":0,"stats":{"Line":33678}},{"line":51,"address":[],"length":0,"stats":{"Line":38427}},{"line":63,"address":[],"length":0,"stats":{"Line":35187}}],"covered":4,"coverable":4},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","events.rs"],"content":"//! Game events: the engine's output log.\n//!\n//! Events describe what happened as inputs are applied. They are produced by the\n//! engine (see `domain::engine`) and consumed by a host (UI, CLI, tests). Events\n//! are outputs only — they are never used to drive the game.\n\nuse crate::domain::types::ids::{CardId, PlayerId};\nuse crate::domain::types::turn::Step;\nuse serde::{Deserialize, Serialize};\n\n/// Something that happened in the game.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum GameEvent {\n    /// Opening hands were dealt to all players (§3.1.5).\n    HandsDealt,\n    /// A player finished their mulligan, returning `returned` cards (§3.1.6).\n    MulliganResolved {\n        /// The player who altered their hand.\n        player: PlayerId,\n        /// How many cards they put on the bottom of their deck.\n        returned: u32,\n    },\n    /// A player's turn began.\n    TurnStarted {\n        /// The new active player.\n        player: PlayerId,\n        /// The turn number (1-based).\n        turn: u32,\n    },\n    /// A step within the current phase was entered.\n    StepEntered {\n        /// The step now in progress.\n        step: Step,\n    },\n    /// A player drew a card from their deck (§4.2.3).\n    CardDrawn {\n        /// The player who drew.\n        player: PlayerId,\n        /// The card drawn into their hand.\n        card: CardId,\n    },\n    /// A player attempted to draw from an empty deck (§1.9.1.2 loss pending).\n    DeckEmptyOnDraw {\n        /// The player who could not draw.\n        player: PlayerId,\n    },\n    /// A player discarded a card from their hand (§8.4).\n    CardDiscarded {\n        /// The player who discarded.\n        player: PlayerId,\n        /// The card moved to the discard pile.\n        card: CardId,\n    },\n    /// A player's hand was revealed (its cards are now public information, §8.x).\n    HandRevealed {\n        /// The player whose hand was revealed.\n        player: PlayerId,\n        /// The revealed hand cards.\n        cards: Vec\u003cCardId\u003e,\n    },\n    /// A player put a card into their inkwell (§4.3.3).\n    CardPutInInkwell {\n        /// The player who inked.\n        player: PlayerId,\n        /// The card moved to the inkwell.\n        card: CardId,\n    },\n    /// A player played a card into their play area (§4.3.4).\n    CardPlayed {\n        /// The player who played the card.\n        player: PlayerId,\n        /// The card now in play.\n        card: CardId,\n    },\n    /// A character was sent on a quest (§4.3.5).\n    Quested {\n        /// The questing player.\n        player: PlayerId,\n        /// The questing character.\n        character: CardId,\n    },\n    /// A player gained lore.\n    LoreGained {\n        /// The player who gained lore.\n        player: PlayerId,\n        /// How much lore was gained.\n        amount: u32,\n    },\n    /// A player lost lore (clamped at 0).\n    LoreLost {\n        /// The player who lost lore.\n        player: PlayerId,\n        /// How much lore was lost.\n        amount: u32,\n    },\n    /// A character challenged an opposing character (§4.3.6).\n    Challenged {\n        /// The challenging player.\n        player: PlayerId,\n        /// The challenging character.\n        challenger: CardId,\n        /// The character being challenged.\n        target: CardId,\n    },\n    /// A card was banished from play to its owner's discard (§1.9.1.3, §8.6.2).\n    Banished {\n        /// The owner of the banished card.\n        player: PlayerId,\n        /// The banished card.\n        card: CardId,\n    },\n    /// A player used an activated ability (§7.5).\n    AbilityActivated {\n        /// The player who used the ability.\n        player: PlayerId,\n        /// The source card whose ability was used.\n        card: CardId,\n    },\n    /// A character used Boost, putting the top deck card facedown under it\n    /// (§10.4).\n    Boosted {\n        /// The player who used Boost.\n        player: PlayerId,\n        /// The character that was boosted.\n        card: CardId,\n    },\n    /// A character moved to a location (§4.3.7).\n    Moved {\n        /// The player who moved a character.\n        player: PlayerId,\n        /// The character that moved.\n        character: CardId,\n        /// The destination location.\n        location: CardId,\n    },\n    /// A player ended their turn (§4.4).\n    TurnEnded {\n        /// The player whose turn ended.\n        player: PlayerId,\n    },\n    /// A player lost the game (§1.9.1.2, §3.2.1.2).\n    PlayerLost {\n        /// The player who lost.\n        player: PlayerId,\n    },\n    /// The game ended. `winners` is empty for a draw, one entry in the usual\n    /// case, or several for a simultaneous multiplayer win.\n    GameEnded {\n        /// The winning player(s).\n        winners: Vec\u003cPlayerId\u003e,\n    },\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","mod.rs"],"content":"//! Game state, turn structure, zones, and events\n\npub mod bag;\npub mod card_instance;\npub mod character_stats;\npub mod conditions;\npub mod events;\npub mod modifier;\npub mod pending;\npub mod player_state;\npub mod rng;\npub mod state;\npub mod status;\npub mod zone;\npub mod zone_kind;\n\n// Re-export for convenience\npub use bag::{BagEntry, DelayedTrigger, TriggerId};\npub use card_instance::CardInstance;\npub use character_stats::{CharacterStats, LocationStats};\npub use conditions::Conditions;\npub use events::GameEvent;\npub use modifier::{\n    Condition, GrantedActivated, GrantedTrigger, ModifierDuration, ModifierTarget, Permission,\n    Property, PropertyModifier, Restriction, RuleModifier, Stat, StatModifier,\n};\npub use pending::{ChoiceRef, ChoiceThen, PendingDecision};\npub use player_state::PlayerState;\npub use rng::SeededRng;\npub use state::GameState;\npub use status::GameStatus;\npub use zone::Zone;\npub use zone_kind::ZoneKind;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","modifier.rs"],"content":"//! Continuous stat modifiers (§7.6, §7.8).\n//!\n//! A character's current value of a characteristic is its printed base (stored\n//! on the [`CardInstance`](super::CardInstance)) **plus** the sum of all active\n//! modifiers that apply to it, computed on demand. The sum is taken as a signed\n//! value and clamped to 0 only at the point of use (a negative `{S}` deals no\n//! damage, a negative `{L}` grants none), while the true value is retained for\n//! combining further modifiers (§7.8.1.2/§7.8.2/§7.8.3).\n\nuse crate::domain::cards::Keyword;\nuse crate::domain::effects::{Amount, Effect, TriggerCondition};\nuse crate::domain::types::card::Classification;\nuse crate::domain::types::ids::{CardId, PlayerId};\nuse crate::domain::types::turn::Step;\nuse serde::{Deserialize, Serialize};\n\n/// An **activated** ability granted to a card by an effect.\n///\n/// \"Gains '{E} — Draw a card' this turn\" (§7.5): usable like a printed activated\n/// ability for as long as `duration` holds. Stored as primitives (cost + effect)\n/// to stay decoupled from the card-definition types.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct GrantedActivated {\n    /// The card that has the granted ability.\n    pub source: CardId,\n    /// Ink cost to activate.\n    pub ink: u32,\n    /// Whether activating exerts the card.\n    pub exert_self: bool,\n    /// What it does.\n    pub effect: Effect,\n    /// How long the grant lasts.\n    pub duration: ModifierDuration,\n}\n\n/// A triggered ability granted to a card by an effect.\n///\n/// \"Gains 'Whenever this character challenges, …' this turn\" (§7.6): fires\n/// alongside the card's printed triggered abilities for as long as `duration`\n/// holds.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct GrantedTrigger {\n    /// The card that has the granted ability (it fires from this card).\n    pub source: CardId,\n    /// When it fires.\n    pub condition: TriggerCondition,\n    /// What it does.\n    pub effect: Effect,\n    /// Whether it's a \"you may\" (optional) trigger.\n    pub optional: bool,\n    /// How long the grant lasts.\n    pub duration: ModifierDuration,\n}\n\n/// A modifiable characteristic.\n///\n/// TODO(modifiable location stats — Slice 8b+): locations are in play (Slice 7b)\n/// but their characteristics aren't yet modifiable — add `Stat` variants for\n/// **move cost** (§4.3.7), location willpower, and start-of-turn lore when a card\n/// needs to modify them. See `docs/planning/IMPLEMENTATION_PLAN.md`.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub enum Stat {\n    /// Strength `{S}`.\n    Strength,\n    /// Willpower `{W}`.\n    Willpower,\n    /// Lore `{L}`.\n    Lore,\n}\n\n/// A condition that gates a continuous modifier — it applies only while the\n/// condition holds, evaluated on demand (§7.6 \"while …\" static abilities).\n///\n/// Grows as cards need it (stat thresholds, \"while at a location\", \"while you\n/// have a … in play\", …). The first cut is registry-free (state-only).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Condition {\n    /// While the modifier's source card is exerted (\"while this character is\n    /// exerted, …\").\n    SourceExerted,\n}\n\n/// How long a modifier lasts.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum ModifierDuration {\n    /// Active for as long as the source card is in play (§7.6.4).\n    WhileSourceInPlay,\n    /// A permanent grant: never expires on a turn/step boundary. Removed only when\n    /// the affected card leaves play (model it with `source` = the affected card,\n    /// so the leave-play modifier sweep clears it). E.g. \"gains Evasive\".\n    Permanent,\n    /// Active until the end of the current turn; expires at cleanup.\n    UntilEndOfTurn,\n    /// Active until `player` next reaches `step` (consumed when that player\n    /// completes that step). Survives the end of the turn it was created in.\n    /// Generalizes \"until the start of their next turn\" timings — e.g. one-shot\n    /// freeze is `UntilStep { step: Ready, player: \u003cthe frozen card's owner\u003e }`.\n    UntilStep {\n        /// The step at which this expires.\n        step: Step,\n        /// Whose turn's `step` consumes it.\n        player: PlayerId,\n    },\n}\n\n/// Which cards a modifier applies to. Matching against a card is done by\n/// [`GameState`](super::GameState), which knows each in-play card's owner and\n/// classifications (denormalized onto the instance).\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum ModifierTarget {\n    /// Applies to exactly one card (e.g. a self modifier).\n    Card(CardId),\n    /// Applies to all of `owner`'s in-play characters that have any of\n    /// `classifications` (empty ⇒ all of the owner's characters), optionally\n    /// excluding one card (for \"your **other** characters\"). Models selector\n    /// statics like \"your Villain characters get +1 {S}\" (§7.8 Example A).\n    OwnedCharacters {\n        /// The player whose characters are affected.\n        owner: PlayerId,\n        /// Required classifications (any-of); empty matches every character.\n        classifications: Vec\u003cClassification\u003e,\n        /// A card to exclude (the source, for \"your other characters\").\n        except: Option\u003cCardId\u003e,\n    },\n}\n\n/// A continuous modifier to a **game rule** contributed by a static ability in\n/// play (the win/loss modification layer, §1.2.1). Removed when its source\n/// leaves play.\n///\n/// TODO(modification layer — Slice 5g+): only the lore-to-win override exists so\n/// far (Donald Duck). The fuller add / remove-suppress space (\"you can't lose\",\n/// \"opponents can't win\", added alternate win conditions) is enumerated in the\n/// `win_loss.rs` test TODO and lands as more cards need it.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum RuleModifier {\n    /// `player` must reach `threshold` lore to win instead of the base 20\n    /// (§1.9.1.1) — e.g. Donald Duck – Flustered Sorcerer.\n    LoreToWin {\n        /// The card whose ability generates this modifier.\n        source: CardId,\n        /// The affected player.\n        player: PlayerId,\n        /// The lore threshold this player needs.\n        threshold: u32,\n    },\n}\n\nimpl RuleModifier {\n    /// The card whose ability generates this modifier.\n    #[must_use]\n    pub const fn source(self) -\u003e CardId {\n        match self {\n            Self::LoreToWin { source, .. } =\u003e source,\n        }\n    }\n}\n\n/// A continuous **prevention** an effect/keyword places on a card (\"can't …\" /\n/// \"takes no …\"). Preventions beat permissions (§1.2.2).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Restriction {\n    /// The character can't quest (\"can't quest\", granted Reckless).\n    CantQuest,\n    /// The character can't challenge.\n    CantChallenge,\n    /// The character/location can't be challenged (\"can't be challenged while here\").\n    CantBeChallenged,\n    /// The card can't be **chosen** by an opponent's abilities/effects (Ward,\n    /// §10.15; or an effect-granted \"can't be chosen this turn\"). Challenges are\n    /// unaffected.\n    CantBeChosen,\n    /// The card can't **ready** at its controller's ready step (\"can't ready at the\n    /// start of their next turn\" — freeze, one-shot via\n    /// [`ModifierDuration::UntilNextReadyStep`]; or a continuous \"can't ready\").\n    CantReady,\n    /// The character takes no damage from challenges (a §7.7 damage replacement —\n    /// \"takes no damage from challenges this turn\", Noi / Nothing We Won't Do).\n    TakesNoChallengeDamage,\n}\n\n/// A continuous **permission** an effect grants a card (\"may …\").\n///\n/// Kept distinct from [`Restriction`] so the two never get conflated (and §1.2.2:\n/// a prevention still beats a permission). Some overlap the Alert/Rush keywords;\n/// the legality checks OR the two together.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Permission {\n    /// May challenge **ready** (non-exerted) characters (Pick a Fight, §4.3.6.7).\n    ChallengeReady,\n    /// May challenge **Evasive** characters (like Alert, §10.2/§10.6).\n    ChallengeEvasive,\n    /// May **challenge** the turn it entered play, while still drying (like Rush,\n    /// §10.9).\n    ChallengeWhileDrying,\n    /// May **quest** the turn it entered play, while still drying.\n    QuestWhileDrying,\n}\n\n/// A continuous boolean property an effect/ability grants to one or more in-play\n/// cards: a granted keyword (§10), a [`Restriction`], or a [`Permission`].\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum Property {\n    /// A granted keyword (e.g. `Challenger(2)`, `Evasive`).\n    Keyword(Keyword),\n    /// A granted prevention.\n    Restriction(Restriction),\n    /// A granted permission.\n    Permission(Permission),\n}\n\n/// A continuous [`Property`] applied to one or more in-play cards, mirroring\n/// [`StatModifier`]. Removed when its source leaves play / at end of turn.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct PropertyModifier {\n    source: CardId,\n    target: ModifierTarget,\n    property: Property,\n    duration: ModifierDuration,\n    condition: Option\u003cCondition\u003e,\n}\n\nimpl PropertyModifier {\n    /// Create an (unconditional) property modifier.\n    #[must_use]\n    pub const fn new(\n        source: CardId,\n        target: ModifierTarget,\n        property: Property,\n        duration: ModifierDuration,\n    ) -\u003e Self {\n        Self {\n            source,\n            target,\n            property,\n            duration,\n            condition: None,\n        }\n    }\n\n    /// Gate this modifier on a [`Condition`] (builder).\n    #[must_use]\n    pub const fn with_condition(mut self, condition: Condition) -\u003e Self {\n        self.condition = Some(condition);\n        self\n    }\n\n    /// The condition gating this modifier, if any.\n    #[must_use]\n    pub const fn condition(\u0026self) -\u003e Option\u003cCondition\u003e {\n        self.condition\n    }\n\n    /// The card whose ability generates this modifier.\n    #[must_use]\n    pub const fn source(\u0026self) -\u003e CardId {\n        self.source\n    }\n\n    /// The target this modifier applies to.\n    #[must_use]\n    pub const fn target(\u0026self) -\u003e \u0026ModifierTarget {\n        \u0026self.target\n    }\n\n    /// The granted property.\n    #[must_use]\n    pub const fn property(\u0026self) -\u003e \u0026Property {\n        \u0026self.property\n    }\n\n    /// The duration.\n    #[must_use]\n    pub const fn duration(\u0026self) -\u003e ModifierDuration {\n        self.duration\n    }\n}\n\n/// A continuous modifier to a characteristic of one or more in-play cards.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct StatModifier {\n    source: CardId,\n    target: ModifierTarget,\n    stat: Stat,\n    delta: i32,\n    duration: ModifierDuration,\n    condition: Option\u003cCondition\u003e,\n    /// If set, the effective delta is `delta × count` (a dynamic \"+N for each …\"),\n    /// evaluated live; `None` means a flat `delta`.\n    per: Option\u003cAmount\u003e,\n}\n\nimpl StatModifier {\n    /// Create an (unconditional) stat modifier.\n    #[must_use]\n    pub const fn new(\n        source: CardId,\n        target: ModifierTarget,\n        stat: Stat,\n        delta: i32,\n        duration: ModifierDuration,\n    ) -\u003e Self {\n        Self {\n            source,\n            target,\n            stat,\n            delta,\n            duration,\n            condition: None,\n            per: None,\n        }\n    }\n\n    /// Gate this modifier on a [`Condition`] (builder).\n    #[must_use]\n    pub const fn with_condition(mut self, condition: Condition) -\u003e Self {\n        self.condition = Some(condition);\n        self\n    }\n\n    /// Make the effective delta scale by a live [`Amount`] (builder).\n    #[must_use]\n    pub fn with_count(mut self, per: Amount) -\u003e Self {\n        self.per = Some(per);\n        self\n    }\n\n    /// The dynamic count this modifier scales by, if any.\n    #[must_use]\n    pub const fn per(\u0026self) -\u003e Option\u003c\u0026Amount\u003e {\n        self.per.as_ref()\n    }\n\n    /// The condition gating this modifier, if any.\n    #[must_use]\n    pub const fn condition(\u0026self) -\u003e Option\u003cCondition\u003e {\n        self.condition\n    }\n\n    /// The card whose ability generates this modifier.\n    #[must_use]\n    pub const fn source(\u0026self) -\u003e CardId {\n        self.source\n    }\n\n    /// The target this modifier applies to.\n    #[must_use]\n    pub const fn target(\u0026self) -\u003e \u0026ModifierTarget {\n        \u0026self.target\n    }\n\n    /// The characteristic this modifier affects.\n    #[must_use]\n    pub const fn stat(\u0026self) -\u003e Stat {\n        self.stat\n    }\n\n    /// The signed delta.\n    #[must_use]\n    pub const fn delta(\u0026self) -\u003e i32 {\n        self.delta\n    }\n\n    /// The duration.\n    #[must_use]\n    pub const fn duration(\u0026self) -\u003e ModifierDuration {\n        self.duration\n    }\n}\n","traces":[{"line":152,"address":[],"length":0,"stats":{"Line":6}},{"line":153,"address":[],"length":0,"stats":{"Line":6}},{"line":154,"addres gth":0,"stats":{"Line":1410}},{"line":367,"address":[],"length":0,"stats":{"Line":1410}}],"covered":35,"coverable":38},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","pending.rs"],"content":"//! A decision the engine is waiting on before it can continue resolving.\n\nuse super::bag::TriggerId;\nuse crate::domain::effects::{Amount, DeckPosition, Destination, DiscardAmount, DiscardBy, Effect};\nuse crate::domain::types::ids::{CardId, PlayerId};\nuse serde::{Deserialize, Serialize};\n\n/// A reference a [`PendingDecision::Choose`] can pick — a card or a player. The\n/// unified currency for \"choose from a set of options\" decisions.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub enum ChoiceRef {\n    /// An in-play / zoned card.\n    Card(CardId),\n    /// A player.\n    Player(PlayerId),\n}\n\n/// What to do with the pick(s) once a [`PendingDecision::Choose`] resolves. The\n/// continuation of the general choose primitive (grows as more bespoke choices\n/// migrate onto it).\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum ChoiceThen {\n    /// Substitute the (single) pick into `effect`, then resolve it + the rest\n    /// (\"choose a player/character; the effect re-targets onto it\", §7.1).\n    SubstituteAndResolve(Box\u003cEffect\u003e),\n    /// Apply `effect` to each picked card, then resolve the rest (\"chosen\n    /// character … \" / \"up to N chosen characters …\", §7.1 / §7.1.8).\n    ApplyToEach(Box\u003cEffect\u003e),\n    /// Play each picked card for free (§6).\n    PlayFree,\n    /// Take the (up-to-one) picked card from `deck_owner`'s deck into hand; the\n    /// rest of `looked_at` go to `rest_position` (look-at-top, §8.2).\n    TakeRevealed {\n        /// Whose deck the looked-at cards came from.\n        deck_owner: PlayerId,\n        /// All looked-at cards (the non-taken ones return to the deck).\n        looked_at: Vec\u003cCardId\u003e,\n        /// Where the non-taken cards go.\n        rest_position: DeckPosition,\n    },\n    /// Take a picked card from `deck_owner`'s deck into hand; the rest of\n    /// `looked_at` go to per-card destinations (split top/bottom, §8.2).\n    TakeRevealedPerCard {\n        /// Whose deck the looked-at cards came from.\n        deck_owner: PlayerId,\n        /// All looked-at cards (the non-taken ones return to the deck).\n        looked_at: Vec\u003cCardId\u003e,\n        /// Per-card destinations for each looked-at card (in order).\n        destinations: Vec\u003cDeckPosition\u003e,\n    },\n    /// Discard the picked cards, then continue the discard down `remaining_players`\n    /// (each discards per `amount` in turn, §8.4).\n    Discard {\n        /// How much each remaining player discards.\n        amount: DiscardAmount,\n        /// How the remaining players' discards are selected.\n        by: DiscardBy,\n        /// The players who still need to discard, in order.\n        remaining_players: Vec\u003cPlayerId\u003e,\n    },\n    /// Discard each picked card from `owner`'s hand (the chooser is someone else —\n    /// \"chosen opponent … discards a card of your choice\", §8.4).\n    DiscardFrom {\n        /// Whose hand the picked cards are discarded from.\n        owner: PlayerId,\n    },\n    /// Take the picked cards from `deck_owner`'s deck into hand, then shuffle the deck\n    /// (search deck, §8.2).\n    SearchDeckTake {\n        /// Whose deck the cards were taken from.\n        deck_owner: PlayerId,\n    },\n}\n\n/// A point in bag resolution that requires a player's input before the engine\n/// can proceed. While a decision is pending, only a matching `Decide` input is\n/// accepted.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum PendingDecision {\n    /// The general \"choose `min..=max` of `options`, then run `then`\" decision —\n    /// the primitive the bespoke choose variants are migrating onto (§7.1).\n    Choose {\n        /// Who chooses.\n        player: PlayerId,\n        /// The effect's source card (continuation controller).\n        source: CardId,\n        /// The candidates.\n        options: Vec\u003cChoiceRef\u003e,\n        /// Minimum number to pick.\n        min: u32,\n        /// Maximum number to pick.\n        max: u32,\n        /// What to do with the pick(s).\n        then: ChoiceThen,\n        /// The remaining effects, resolved in order after.\n        rest: Vec\u003cEffect\u003e,\n    },\n    /// The player has two or more triggered abilities in the bag and must choose\n    /// which to resolve next (§8.7.4–§8.7.5).\n    OrderTriggers {\n        /// The player who must choose.\n        player: PlayerId,\n        /// The candidate triggers (their own bag entries).\n        options: Vec\u003cTriggerId\u003e,\n    },\n    /// An optional (\"you may\") triggered ability is resolving; the player chooses\n    /// whether to apply it (§7.1.3).\n    MayResolve {\n        /// The player who must choose.\n        player: PlayerId,\n        /// The optional trigger awaiting a yes/no.\n        trigger: TriggerId,\n    },\n    /// A Bodyguard character just entered play; its controller chooses whether it\n    /// enters exerted instead of ready (§10.3.2).\n    EnterPlayExerted {\n        /// The player who must choose.\n        player: PlayerId,\n        /// The Bodyguard character that just entered play.\n        card: CardId,\n    },\n    /// A \"name a card, then reveal the top of your deck\" effect is resolving;\n    /// `player` names a card and the revealed top is matched against it (§8.2).\n    NameCard {\n        /// The player naming the card (and revealing their deck).\n        player: PlayerId,\n        /// The effect's source card.\n        source: CardId,\n        /// Lore gained on a match.\n        lore_on_match: Amount,\n        /// Where the revealed card goes on a match.\n        match_to: Destination,\n        /// Where it goes otherwise.\n        otherwise_to: Destination,\n        /// The remaining effects, resolved in order after.\n        rest: Vec\u003cEffect\u003e,\n    },\n    /// A \"name a card, then return all character cards with that name from your\n    /// discard to your hand\" effect is resolving (Blast from Your Past, §8.2).\n    NameThenRecur {\n        /// The player naming the card (and recurring from their discard).\n        player: PlayerId,\n        /// The effect's source card.\n        source: CardId,\n        /// The remaining effects, resolved in order after.\n        rest: Vec\u003cEffect\u003e,\n    },\n\n    /// A `May` effect is resolving; `player` chooses whether to resolve `effect`\n    /// (\"you may …\", §7.1.3). `rest` resolves afterwards either way.\n    MayResolveEffect {\n        /// The player who must choose.\n        player: PlayerId,\n        /// The effect's source card (continuation controller).\n        source: CardId,\n        /// The effect resolved only if the player agrees.\n        effect: Effect,\n        /// The remaining effects, resolved in order after.\n        rest: Vec\u003cEffect\u003e,\n    },\n    /// A \"Choose one\" modal effect is resolving; `player` picks one of the\n    /// offered effects to resolve (§7.1.9). `rest` resolves afterwards.\n    ChooseOne {\n        /// The player who must choose.\n        player: PlayerId,\n        /// The effect's source card (continuation controller).\n        source: CardId,\n        /// The offered effects (2–4 options in practice).\n        options: Vec\u003cEffect\u003e,\n        /// The remaining effects, resolved in order after.\n        rest: Vec\u003cEffect\u003e,\n    },\n}\n\nimpl PendingDecision {\n    /// The player who must answer this decision.\n    #[must_use]\n    pub const fn player(\u0026self) -\u003e PlayerId {\n        match self {\n            Self::OrderTriggers { player, .. }\n            | Self::MayResolve { player, .. }\n            | Self::EnterPlayExerted { player, .. }\n            | Self::Choose { player, .. }\n            | Self::NameCard { player, .. }\n            | Self::NameThenRecur { player, .. }\n            | Self::MayResolveEffect { player, .. }\n            | Self::ChooseOne { player, .. } =\u003e *player,\n        }\n    }\n}\n","traces":[{"line":178,"address":[],"length":0,"stats":{"Line":3}},{"line":179,"address":[],"length":0,"stats":{"Line":3}},{"line":180,"address":[],"length":0,"stats":{"Line":0}},{"line":181,"address":[],"length":0,"stats":{"Line":0}},{"line":182,"address":[],"length":0,"stats":{"Line":0}},{"line":183,"address":[],"length":0,"stats":{"Line":3}},{"line":184,"address":[],"length":0,"stats":{"Line":0}},{"line":185,"address":[],"length":0,"stats":{"Line":0}},{"line":186,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[],"length":0,"stats":{"Line":3}}],"covered":4,"coverable":10},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","player_state.rs"],"content":"//! Per-player state: lore and the player's zones.\n\nuse super::Zone;\nuse crate::domain::types::ids::PlayerId;\nuse serde::{Deserialize, Serialize};\n\n/// The state owned by a single player: their lore total and their five\n/// card-holding zones (§8). The bag is shared by the whole game and so is not\n/// stored here.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct PlayerState {\n    id: PlayerId,\n    lore: u32,\n    deck: Zone,\n    hand: Zone,\n    inkwell: Zone,\n    play: Zone,\n    discard: Zone,\n    /// `true` once this player has lost or left the game. Eliminated players are\n    /// skipped by the win/loss check and trigger last-player-standing (§3.2.1.3).\n    eliminated: bool,\n    /// Set when this player attempts to draw from an empty deck; read by the\n    /// game-state check (§1.9.1.2, \"since the last game state check\") and cleared\n    /// by the check afterwards.\n    drew_from_empty_deck: bool,\n}\n\nimpl PlayerState {\n    /// Create a player with the given deck and empty remaining zones.\n    #[must_use]\n    pub const fn new(id: PlayerId, deck: Zone) -\u003e Self {\n        Self {\n            id,\n            lore: 0,\n            deck,\n            hand: Zone::new(),\n            inkwell: Zone::new(),\n            play: Zone::new(),\n            discard: Zone::new(),\n            eliminated: false,\n            drew_from_empty_deck: false,\n        }\n    }\n\n    /// This player's id.\n    #[must_use]\n    pub const fn id(\u0026self) -\u003e PlayerId {\n        self.id\n    }\n\n    /// This player's current lore total.\n    #[must_use]\n    pub const fn lore(\u0026self) -\u003e u32 {\n        self.lore\n    }\n\n    /// Add lore to this player's total (e.g. from questing or locations).\n    pub const fn add_lore(\u0026mut self, amount: u32) {\n        self.lore += amount;\n    }\n\n    /// Remove lore from this player's total, clamped at 0.\n    pub const fn lose_lore(\u0026mut self, amount: u32) {\n        self.lore = self.lore.saturating_sub(amount);\n    }\n\n    /// The number of ready ink cards available to pay costs (§8.5, §4.3.4.6).\n    #[must_use]\n    pub fn ready_ink(\u0026self) -\u003e u32 {\n        let count = self.inkwell.iter().filter(|c| c.conditions().ready).count();\n        u32::try_from(count).unwrap_or(u32::MAX)\n    }\n\n    /// Exert `amount` ready ink cards to pay a cost (§4.3.4.6). Ink is fungible\n    /// (§8.5.1), so the specific cards chosen don't matter; the first ready ones\n    /// are used. The caller must have verified enough ready ink via\n    /// [`ready_ink`](Self::ready_ink).\n    pub fn exert_ink(\u0026mut self, amount: u32) {\n        let mut remaining = amount;\n        for card in self.inkwell.iter_mut() {\n            if remaining == 0 {\n                break;\n            }\n            if card.conditions().ready {\n                card.conditions_mut().ready = false;\n                remaining -= 1;\n            }\n        }\n    }\n\n    /// `true` if this player has lost or left the game.\n    #[must_use]\n    pub const fn is_eliminated(\u0026self) -\u003e bool {\n        self.eliminated\n    }\n\n    /// Mark this player as having lost or left the game.\n    pub const fn eliminate(\u0026mut self) {\n        self.eliminated = true;\n    }\n\n    /// `true` if this player attempted to draw from an empty deck since the last\n    /// game-state check.\n    #[must_use]\n    pub const fn drew_from_empty_deck(\u0026self) -\u003e bool {\n        self.drew_from_empty_deck\n    }\n\n    /// Record that this player attempted to draw from an empty deck.\n    pub const fn note_drew_from_empty_deck(\u0026mut self) {\n        self.drew_from_empty_deck = true;\n    }\n\n    /// Clear the empty-deck-draw flag (done by the game-state check).\n    pub const fn clear_drew_from_empty_deck(\u0026mut self) {\n        self.drew_from_empty_deck = false;\n    }\n\n    /// This player's deck.\n    #[must_use]\n    pub const fn deck(\u0026self) -\u003e \u0026Zone {\n        \u0026self.deck\n    }\n\n    /// Mutable access to this player's deck.\n    pub const fn deck_mut(\u0026mut self) -\u003e \u0026mut Zone {\n        \u0026mut self.deck\n    }\n\n    /// This player's hand.\n    #[must_use]\n    pub const fn hand(\u0026self) -\u003e \u0026Zone {\n        \u0026self.hand\n    }\n\n    /// Mutable access to this player's hand.\n    pub const fn hand_mut(\u0026mut self) -\u003e \u0026mut Zone {\n        \u0026mut self.hand\n    }\n\n    /// This player's inkwell.\n    #[must_use]\n    pub const fn inkwell(\u0026self) -\u003e \u0026Zone {\n        \u0026self.inkwell\n    }\n\n    /// Mutable access to this player's inkwell.\n    pub const fn inkwell_mut(\u0026mut self) -\u003e \u0026mut Zone {\n        \u0026mut self.inkwell\n    }\n\n    /// This player's play area.\n    #[must_use]\n    pub const fn play(\u0026self) -\u003e \u0026Zone {\n        \u0026self.play\n    }\n\n    /// Mutable access to this player's play area.\n    pub const fn play_mut(\u0026mut self) -\u003e \u0026mut Zone {\n        \u0026mut self.play\n    }\n\n    /// This player's discard.\n    #[must_use]\n    pub const fn discard(\u0026self) -\u003e \u0026Zone {\n        \u0026self.discard\n    }\n\n    /// Mutable access to this player's discard.\n    pub const fn discard_mut(\u0026mut self) -\u003e \u0026mut Zone {\n        \u0026mut self.discard\n    }\n}\n","traces":[{"line":31,"address":[],"length":0,"stats":{"Line":1600}},{"line":36,"address":[],"length":0,"stats":{"Line":3200}},{"line":37,"address":[],"length":0,"stats":{"Line":3200}},{"line":38,"address":[],"length":0,"stats":{"Line":1600}},{"line":39,"address":[],"length":0,"stats":{"Line":1600}},{"line":47,"address":[],"length":0,"stats":{"Line":1187692}},{"line":48,"address":[],"length":0,"stats":{"Line":1187692}},{"line":53,"address":[],"length":0,"stats":{"Line":647094}},{"line":54,"address":[],"length":0,"stats":{"Line":647094}},{"line":58,"address":[],"length":0,"stats":{"Line":35051}},{"line":59,"address":[],"length":0,"stats":{"Line":35051}},{"line":63,"address":[],"length":0,"stats":{"Line":564}},{"line":64,"address":[],"length":0,"stats":{"Line":1128}},{"line":69,"address":[],"length":0,"stats":{"Line":66291}},{"line":70,"address":[],"length":0,"stats":{"Line":909087}},{"line":71,"address":[],"length":0,"stats":{"Line":198873}},{"line":78,"address":[],"length":0,"stats":{"Line":45090}},{"line":79,"address":[],"length":0,"stats":{"Line":90180}},{"line":80,"address":[],"length":0,"stats":{"Line":226950}},{"line":81,"address":[],"length":0,"stats":{"Line":136770}},{"line":82,"address":[],"length":0,"stats":{"Line":34164}},{"line":84,"address":[],"length":0,"stats":{"Line":180258}},{"line":85,"address":[],"length":0,"stats":{"Line":77652}},{"line":86,"address":[],"length":0,"stats":{"Line":77652}},{"line":93,"address":[],"length":0,"stats":{"Line":1519637}},{"line":94,"address":[],"length":0,"stats":{"Line":1519637}},{"line":98,"address":[],"length":0,"sta  makes replays\n//! exact. We use `ChaCha8Rng` specifically because it is a fixed, named\n//! algorithm whose output is stable across crate versions — `StdRng` makes no\n//! such guarantee and could silently change between releases.\n\nuse rand::seq::SliceRandom;\nuse rand::{Rng, SeedableRng};\nuse rand_chacha::ChaCha8Rng;\nuse serde::{Deserialize, Serialize};\n\n/// A deterministic random number generator carried inside the game state.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct SeededRng {\n    inner: ChaCha8Rng,\n}\n\nimpl SeededRng {\n    /// Create a generator from a 64-bit seed.\n    #[must_use]\n    pub fn from_seed(seed: u64) -\u003e Self {\n        Self {\n            inner: ChaCha8Rng::seed_from_u64(seed),\n        }\n    }\n\n    /// Shuffle a slice in place deterministically, advancing the generator.\n    pub fn shuffle\u003cT\u003e(\u0026mut self, slice: \u0026mut [T]) {\n        slice.shuffle(\u0026mut self.inner);\n    }\n\n    /// Return a value in `0..exclusive_max`, advancing the generator.\n    ///\n    /// # Panics\n    ///\n    /// Panics if `exclusive_max` is 0.\n    pub fn below(\u0026mut self, exclusive_max: usize) -\u003e usize {\n        self.inner.gen_range(0..exclusive_max)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::SeededRng;\n\n    #[test]\n    fn same_seed_shuffles_identically() {\n        let mut a = SeededRng::from_seed(42);\n        let mut b = SeededRng::from_seed(42);\n\n        let mut xs: Vec\u003cu32\u003e = (0..50).collect();\n        let mut ys = xs.clone();\n        a.shuffle(\u0026mut xs);\n        b.shuffle(\u0026mut ys);\n\n        assert_eq!(xs, ys);\n        // Both generators advanced by the same amount.\n        assert_eq!(a, b);\n    }\n\n    #[test]\n    fn different_seeds_diverge() {\n        let mut a = SeededRng::from_seed(1);\n        let mut b = SeededRng::from_seed(2);\n\n        let mut xs: Vec\u003cu32\u003e = (0..50).collect();\n        let mut ys = xs.clone();\n        a.shuffle(\u0026mut xs);\n        b.shuffle(\u0026mut ys);\n\n        assert_ne!(xs, ys);\n    }\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":798}},{"line":25,"address":[],"length":0,"stats":{"Line":798}},{"line":30,"address":[],"length":0,"stats":{"Line":1607}},{"line":31,"address":[],"length":0,"stats":{"Line":4821}},{"line":39,"address":[],"length":0,"stats":{"Line":774}},{"line":40,"address":[],"length":0,"stats":{"Line":2322}}],"covered":6,"coverable":6},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","game","state.rs"],"content":"//! The authoritative game state.\n\nuse super::{\n    BagEntry, CardInstance, CharacterStats, Condition, Conditions, DelayedTrigger, GameStatus,\n    GrantedActivated, GrantedTrigger, ModifierDuration, PendingDecision, Permission, PlayerState,\n    Property, PropertyModifier, Restriction, RuleModifier, SeededRng, Stat, StatModifier,\n    TriggerId, Zone,\n};\nuse crate::domain::cards::Keyword;\nuse crate::domain::effects::{\n    Amount, CardCategory, CharacterFilter, DelayedWhen, Effect, Target, TargetSide,\n};\nuse crate::domain::types::ids::{CardDefId, CardId, PlayerId};\nuse crate::domain::types::turn::{Phase, Step};\nuse serde::{Deserialize, Serialize};\n\n/// The base lore a player must reach to win the game (§1.9.1.1), before any\n/// rule-modifier overrides.\npub const BASE_LORE_TO_WIN: u32 = 20;\n\n/// The single source of truth for a game.\n///\n/// The state is fully self-contained and serializable: it carries the seed and\n/// the live [`SeededRng`] so that a saved game (or a replay built from the same\n/// seed and inputs) reproduces exactly.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct GameState {\n    seed: u64,\n    rng: SeededRng,\n    players: Vec\u003cPlayerState\u003e,\n    status: GameStatus,\n    active_player: PlayerId,\n    turn_number: u32,\n    phase: Phase,\n    step: Step,\n    /// Whether the active player has used their once-per-turn inkwell action\n    /// (§4.3.3). Reset at the start of each turn.\n    inked_this_turn: bool,\n    /// Characters that have used Boost this turn (§10.4.1, once per turn). Reset\n    /// at the start of each turn.\n    boosted_this_turn: Vec\u003cCardId\u003e,\n    next_card_id: u32,\n    /// Triggered abilities waiting to resolve (§8.7).\n    bag: Vec\u003cBagEntry\u003e,\n    /// A decision the engine is waiting on before it can continue resolving.\n    pending: Option\u003cPendingDecision\u003e,\n    next_trigger_id: u32,\n    /// Active continuous stat modifiers (§7.6, §7.8).\n    modifiers: Vec\u003cStatModifier\u003e,\n    /// Active continuous property modifiers (granted keywords / restrictions).\n    property_modifiers: Vec\u003cPropertyModifier\u003e,\n    /// Scheduled one-shot delayed triggers (§7.4.7).\n    delayed_triggers: Vec\u003cDelayedTrigger\u003e,\n    /// Active game-rule modifiers (e.g. lore-to-win overrides, §1.2.1).\n    rule_modifiers: Vec\u003cRuleModifier\u003e,\n    /// Triggered abilities granted to cards by effects (\"gains '…'\", §7.6).\n    granted_triggers: Vec\u003cGrantedTrigger\u003e,\n    /// Activated abilities granted to cards by effects (\"gains '{E} — …'\", §7.5).\n    granted_activated: Vec\u003cGrantedActivated\u003e,\n}\n\nimpl GameState {\n    /// Build a new, **not yet started** game from one deck per player (each deck\n    /// is an ordered list of printed-card ids) and a seed.\n    ///\n    /// Each deck is populated with freshly allocated, facedown card instances and\n    /// shuffled deterministically using the seed. No hands are dealt and no\n    /// starting player is chosen yet; call the engine's `start` to do that. The\n    /// turn fields hold placeholder values until the game is `Playing`.\n    ///\n    /// # Panics\n    ///\n    /// Panics if more than `u8::MAX` decks are supplied (there cannot be that\n    /// many players).\n    #[must_use]\n    pub fn new(decks: Vec\u003cVec\u003cCardDefId\u003e\u003e, seed: u64) -\u003e Self {\n        let mut rng = SeededRng::from_seed(seed);\n        let mut next_card_id: u32 = 0;\n        let mut players = Vec::with_capacity(decks.len());\n\n        for (seat, deck_defs) in decks.into_iter().enumerate() {\n            let seat = u8::try_from(seat).expect(\"a game cannot have more than 255 players\");\n            let mut deck = Zone::new();\n            for definition in deck_defs {\n                let instance = CardInstance::new(\n                    CardId::from_raw(next_card_id),\n                    definition,\n                    Conditions::in_deck(),\n                );\n                next_card_id += 1;\n                deck.push(instance);\n            }\n            deck.shuffle(\u0026mut rng);\n            players.push(PlayerState::new(PlayerId::from_index(seat), deck));\n        }\n\n        Self {\n            seed,\n            rng,\n            players,\n            status: GameStatus::NotStarted,\n            active_player: PlayerId::from_index(0),\n            turn_number: 1,\n            phase: Phase::Beginning,\n            step: Step::Ready,\n            inked_this_turn: false,\n            boosted_this_turn: Vec::new(),\n            next_card_id,\n            bag: Vec::new(),\n            pending: None,\n            next_trigger_id: 0,\n            modifiers: Vec::new(),\n            property_modifiers: Vec::new(),\n            delayed_triggers: Vec::new(),\n            rule_modifiers: Vec::new(),\n            granted_triggers: Vec::new(),\n            granted_activated: Vec::new(),\n        }\n    }\n\n    /// The seed this game was created with.\n    #[must_use]\n    pub const fn seed(\u0026self) -\u003e u64 {\n        self.seed\n    }\n\n    /// The game's lifecycle status.\n    #[must_use]\n    pub const fn status(\u0026self) -\u003e \u0026GameStatus {\n        \u0026self.status\n    }\n\n    /// `true` once the game has finished.\n    #[must_use]\n    pub const fn is_finished(\u0026self) -\u003e bool {\n        matches!(self.status, GameStatus::Finished { .. })\n    }\n\n    /// Set the game's status (used by the engine as it advances the game).\n    pub fn set_status(\u0026mut self, status: GameStatus) {\n        self.status = status;\n    }\n\n    /// All player states, indexed by seat.\n    #[must_use]\n    pub fn players(\u0026self) -\u003e \u0026[PlayerState] {\n        \u0026self.players\n    }\n\n    /// Mutable access to all player states.\n    pub fn players_mut(\u0026mut self) -\u003e \u0026mut [PlayerState] {\n        \u0026mut self.players\n    }\n\n    /// The number of players in the game.\n    #[must_use]\n    pub const fn player_count(\u0026self) -\u003e usize {\n        self.players.len()\n    }\n\n    /// The state of a specific player, if present.\n    #[must_use]\n    pub fn player(\u0026self, id: PlayerId) -\u003e Option\u003c\u0026PlayerState\u003e {\n        self.players.get(usize::from(id.index()))\n    }\n\n    /// Mutable access to a specific player's state, if present.\n    pub fn player_mut(\u0026mut self, id: PlayerId) -\u003e Option\u003c\u0026mut PlayerState\u003e {\n        self.players.get_mut(usize::from(id.index()))\n    }\n\n    /// Mutable access to the deterministic RNG (for shuffles and choices).\n    pub const fn rng_mut(\u0026mut self) -\u003e \u0026mut SeededRng {\n        \u0026mut self.rng\n    }\n\n    /// Deterministically shuffle a player's deck using the game RNG.\n    pub fn shuffle_deck(\u0026mut self, id: PlayerId) {\n        if let Some(player) = self.players.get_mut(usize::from(id.index())) {\n            player.deck_mut().shuffle(\u0026mut self.rng);\n        }\n    }\n\n    /// The player whose turn it currently is.\n    #[must_use]\n    pub const fn active_player(\u0026self) -\u003e PlayerId {\n        self.active_player\n    }\n\n    /// Set the active player.\n    pub const fn set_active_player(\u0026mut self, player: PlayerId) {\n        self.active_player = player;\n    }\n\n    /// The current turn number (1-based).\n    #[must_use]\n    pub const fn turn_number(\u0026self) -\u003e u32 {\n        self.turn_number\n    }\n\n    /// Advance to the next turn number.\n    pub const fn increment_turn_number(\u0026mut self) {\n        self.turn_number += 1;\n    }\n\n    /// The current phase.\n    #[must_use]\n    pub const fn phase(\u0026self) -\u003e Phase {\n        self.phase\n    }\n\n    /// Set the current phase.\n    pub const fn set_phase(\u0026mut self, phase: Phase) {\n        self.phase = phase;\n    }\n\n    /// The current step.\n    #[must_use]\n    pub const fn step(\u0026self) -\u003e Step {\n        self.step\n    }\n\n    /// Set the current step.\n    pub const fn set_step(\u0026mut self, step: Step) {\n        self.step = step;\n    }\n\n    /// Whether the active player has taken their once-per-turn inkwell action.\n    #[must_use]\n    pub const fn inked_this_turn(\u0026self) -\u003e bool {\n        self.inked_this_turn\n    }\n\n    /// Record whether the active player has used their inkwell action this turn.\n    pub const fn set_inked_this_turn(\u0026mut self, value: bool) {\n        self.inked_this_turn = value;\n    }\n\n    /// Whether `card` has already used Boost this turn (§10.4.1).\n    #[must_use]\n    pub fn has_boosted_this_turn(\u0026self, card: CardId) -\u003e bool {\n        self.boosted_this_turn.contains(\u0026card)\n    }\n\n    /// Record that `card` used Boost this turn.\n    pub fn mark_boosted_this_turn(\u0026mut self, card: CardId) {\n        self.boosted_this_turn.push(card);\n    }\n\n    /// Clear the per-turn Boost record (called at the start of each turn).\n    pub fn clear_boosted_this_turn(\u0026mut self) {\n        self.boosted_this_turn.clear();\n    }\n\n    /// Allocate a fresh, never-before-used [`CardId`] from the game's monotonic\n    /// counter. The single source of card ids: use this whenever a new card\n    /// instance is introduced at runtime (and in tests, to inject cards without\n    /// risking a collision with setup-assigned ids).\n    pub const fn allocate_card_id(\u0026mut self) -\u003e CardId {\n        let id = CardId::from_raw(self.next_card_id);\n        self.next_card_id += 1;\n        id\n    }\n\n    /// The triggered abilities currently waiting in the bag (§8.7).\n    #[must_use]\n    pub fn bag(\u0026self) -\u003e \u0026[BagEntry] {\n        \u0026self.bag\n    }\n\n    /// The decision the engine is currently waiting on, if any.\n    #[must_use]\n    pub const fn pending(\u0026self) -\u003e Option\u003c\u0026PendingDecision\u003e {\n        self.pending.as_ref()\n    }\n\n    /// `true` if the engine is waiting on a player decision.\n    #[must_use]\n    pub const fn is_awaiting_decision(\u0026self) -\u003e bool {\n        self.pending.is_some()\n    }\n\n    /// Set the pending decision.\n    pub fn set_pending(\u0026mut self, pending: PendingDecision) {\n        self.pending = Some(pending);\n    }\n\n    /// Take (clear) the pending decision.\n    pub const fn take_pending(\u0026mut self) -\u003e Option\u003cPendingDecision\u003e {\n        self.pending.take()\n    }\n\n    /// Add a triggered ability to the bag, returning its id (§8.7.3).\n    pub fn enqueue_trigger(\n        \u0026mut self,\n        controller: PlayerId,\n        source: CardId,\n        optional: bool,\n        effect: Effect,\n    ) -\u003e TriggerId {\n        let id = TriggerId::from_raw(self.next_trigger_id);\n        self.next_trigger_id += 1;\n        self.bag\n            .push(BagEntry::new(id, controller, source, optional, effect));\n        id\n    }\n\n    /// Remove and return a bag entry by id.\n    pub fn remove_trigger(\u0026mut self, id: TriggerId) -\u003e Option\u003cBagEntry\u003e {\n        let index = self.bag.iter().position(|e| e.id() == id)?;\n        Some(self.bag.remove(index))\n    }\n\n    /// The ids of the bag entries controlled by a player, in bag order.\n    #[must_use]\n    pub fn triggers_for(\u0026self, player: PlayerId) -\u003e Vec\u003cTriggerId\u003e {\n        self.bag\n            .iter()\n            .filter(|e| e.controller() == player)\n            .map(BagEntry::id)\n            .collect()\n    }\n\n    /// The active continuous stat modifiers (§7.6, §7.8).\n    #[must_use]\n    pub fn modifiers(\u0026self) -\u003e \u0026[StatModifier] {\n        \u0026self.modifiers\n    }\n\n    /// Add a continuous stat modifier.\n    pub fn add_modifier(\u0026mut self, modifier: StatModifier) {\n        self.modifiers.push(modifier);\n    }\n\n    /// Remove all modifiers (stat and rule) generated by `source` (e.g. when it\n    /// leaves play, §7.6.4).\n    ///\n    /// CAVEAT / TODO(leave-play paths — Slice 8): correctness of the static and\n    /// win/loss modification layers relies on **every** leave-play path calling\n    /// this and then running a game-state check (so a now-eligible win/loss or\n    /// banishment resolves on the next pass — see the Donald-Duck-leaves case in\n    /// `tests/win_loss_modifiers.rs`). Today the only leave-play path is\n    /// banishment (`rules::game_state_check::banish`), which does both. When\n    /// effect-driven removals arrive (return-to-hand, banish-by-effect, etc.,\n    /// Slice 8) they MUST do the same. The centralized removal here plus the\n    /// game-state check loop make that straightforward. Tracked by Slice 8 in\n    /// `docs/planning/IMPLEMENTATION_PLAN.md`.\n    pub fn remove_modifiers_from_source(\u0026mut self, source: CardId) {\n        self.modifiers.retain(|m| m.source() != source);\n        self.property_modifiers.retain(|m| m.source() != source);\n        self.rule_modifiers.retain(|m| m.source() != source);\n    }\n\n    /// Add a continuous property modifier (granted keyword / restriction).\n    pub fn add_property_modifier(\u0026mut self, modifier: PropertyModifier) {\n        self.property_modifiers.push(modifier);\n    }\n\n    /// The keywords granted to `card` by active property modifiers (in addition\n    /// to its printed keywords, which live on the definition).\n    #[must_use]\n    pub fn granted_keywords(\u0026self, card: CardId) -\u003e Vec\u003cKeyword\u003e {\n        self.active_property_modifiers(card)\n            .filter_map(|m| match m.property() {\n                Property::Keyword(k) =\u003e Some(k.clone()),\n                Property::Restriction(_) | Property::Permission(_) =\u003e None,\n            })\n            .collect()\n    }\n\n    /// Whether `card` currently has the given [`Restriction`] (prevention).\n    #[must_use]\n    pub fn has_restriction(\u0026self, card: CardId, restriction: Restriction) -\u003e bool {\n        self.active_property_modifiers(card)\n            .any(|m| matches!(m.property(), Property::Restriction(r) if *r == restriction))\n    }\n\n    /// Whether `card` currently has the given [`Permission`].\n    #[must_use]\n    pub fn has_permission(\u0026self, card: CardId, permission: Permission) -\u003e bool {\n        self.active_property_modifiers(card)\n            .any(|m| matches!(m.property(), Property::Permission(p) if *p == permission))\n    }\n\n    /// The property modifiers that apply to `card` right now (target matches and\n    /// the gating condition holds).\n    fn active_property_modifiers(\u0026self, card: CardId) -\u003e impl Iterator\u003cItem = \u0026PropertyModifier\u003e {\n        self.property_modifiers.iter().filter(move |m| {\n            self.condition_holds(m.condition(), m.source()) \u0026\u0026 self.target_matches(m.target(), card)\n        })\n    }\n\n    /// Schedule a one-shot delayed trigger (§7.4.7).\n    pub fn schedule_delayed(\u0026mut self, delayed: DelayedTrigger) {\n        self.delayed_triggers.push(delayed);\n    }\n\n    /// Remove and return the delayed triggers due at `when` (in scheduling order).\n    pub fn take_delayed_due(\u0026mut self, when: DelayedWhen) -\u003e Vec\u003cDelayedTrigger\u003e {\n        let mut due = Vec::new();\n        self.delayed_triggers.retain(|d| {\n            if d.when() == when {\n                due.push(d.clone());\n                false\n            } else {\n                true\n            }\n        });\n        due\n    }\n\n    /// Add a game-rule modifier (e.g. a lore-to-win override).\n    pub fn add_rule_modifier(\u0026mut self, modifier: RuleModifier) {\n        self.rule_modifiers.push(modifier);\n    }\n\n    /// The lore `player` must reach to win, applying any rule-modifier overrides\n    /// (the maximum override if several apply), else the base 20 (§1.9.1.1).\n    #[must_use]\n    pub fn lore_to_win(\u0026self, player: PlayerId) -\u003e u32 {\n        self.rule_modifiers\n            .iter()\n            .filter_map(|m| match m {\n                RuleModifier::LoreToWin {\n                    player: p,\n                    threshold,\n                    ..\n                } if *p == player =\u003e Some(*threshold),\n                RuleModifier::LoreToWin { .. } =\u003e None,\n            })\n            .max()\n            .unwrap_or(BASE_LORE_TO_WIN)\n    }\n\n    /// Remove all \"until end of turn\" modifiers (called at end of turn, §7.6.1).\n    ///\n    /// TODO(§7.6.3 — when effects create timed selector modifiers, Slice 8): a\n    /// resolved timed effect like \"your characters get +1 {S} this turn\" must\n    /// **snapshot** the matching cards at resolution (store per-card\n    /// `ModifierTarget::Card` modifiers), since it must not affect characters\n    /// that enter play later — unlike the continuous selector statics in 5e.\n    pub fn expire_end_of_turn_modifiers(\u0026mut self) {\n        self.modifiers\n            .retain(|m| m.duration() != ModifierDuration::UntilEndOfTurn);\n        self.property_modifiers\n            .retain(|m| m.duration() != ModifierDuration::UntilEndOfTurn);\n        self.granted_triggers\n            .retain(|g| g.duration != ModifierDuration::UntilEndOfTurn);\n        self.granted_activated\n            .retain(|g| g.duration != ModifierDuration::UntilEndOfTurn);\n    }\n\n    /// Grant a triggered ability to a card (§7.6, \"gains '…'\").\n    pub fn add_granted_trigger(\u0026mut self, granted: GrantedTrigger) {\n        self.granted_triggers.push(granted);\n    }\n\n    /// The triggered abilities currently granted to cards by effects.\n    #[must_use]\n    pub fn granted_triggers(\u0026self) -\u003e \u0026[GrantedTrigger] {\n        \u0026self.granted_triggers\n    }\n\n    /// Grant an activated ability to a card (§7.5, \"gains '{E} — …'\").\n    pub fn add_granted_activated(\u0026mut self, granted: GrantedActivated) {\n        self.granted_activated.push(granted);\n    }\n\n    /// The activated abilities currently granted to cards by effects.\n    #[must_use]\n    pub fn granted_activated(\u0026self) -\u003e \u0026[GrantedActivated] {\n        \u0026self.granted_activated\n    }\n\n    /// Expire the modifiers whose duration is `UntilStep { step, player }` —\n    /// called when `player` completes `step` (e.g. one-shot freeze is consumed at\n    /// that player's ready step, after frozen cards have been kept exerted).\n    pub fn expire_step_modifiers(\u0026mut self, step: Step, player: PlayerId) {\n        let target = ModifierDuration::UntilStep { step, player };\n        self.modifiers.retain(|m| m.duration() != target);\n        self.property_modifiers.retain(|m| m.duration() != target);\n    }\n\n    /// Find an in-play card instance by id, searching every player's play area.\n    #[must_use]\n    pub fn instance_in_play(\u0026self, card: CardId) -\u003e Option\u003c\u0026CardInstance\u003e {\n        self.players\n            .iter()\n            .find_map(|p| p.play().iter().find(|c| c.id() == card))\n    }\n\n    /// The current stats of an in-play character: printed base plus the sum of\n    /// applicable modifiers, each characteristic clamped to 0 at this point of\n    /// use while the combined value is computed from the true (signed) total\n    /// (§7.8.1.2/§7.8.2/§7.8.3). `None` if the card isn't an in-play character.\n    #[must_use]\n    pub fn current_character_stats(\u0026self, card: CardId) -\u003e Option\u003cCharacterStats\u003e {\n        let base = self.instance_in_play(card)?.stats()?;\n        Some(CharacterStats::new(\n            apply_delta(base.strength, self.stat_delta(card, Stat::Strength)),\n            apply_delta(base.willpower, self.stat_delta(card, Stat::Willpower)),\n            apply_delta(base.lore, self.stat_delta(card, Stat::Lore)),\n        ))\n    }\n\n    /// Evaluate the [`CharacterFilter`] algebra against an in-play `card` owned by\n    /// `owner`, from the effect `controller`/`source`'s perspective (§7.1).\n    /// Registry-free — cost/names are denormalized onto the instance.\n    #[must_use]\n    pub fn matches_filter(\n        \u0026self,\n        controller: PlayerId,\n        source: CardId,\n        owner: PlayerId,\n        card: \u0026CardInstance,\n        filter: \u0026CharacterFilter,\n    ) -\u003e bool {\n        let recurse = |f: \u0026CharacterFilter| self.matches_filter(controller, source, owner, card, f);\n        match filter {\n            CharacterFilter::Any | CharacterFilter::Side(TargetSide::Any) =\u003e true,\n            CharacterFilter::Side(TargetSide::Yours) =\u003e owner == controller,\n            CharacterFilter::Side(TargetSide::Opposing) =\u003e owner != controller,\n            CharacterFilter::Classification(c) =\u003e card.has_classification(c),\n            // In-play category is derived from the instance (no registry): character\n            // cards have `{S}`/`{W}`, locations have location stats, else item.\n            // Actions/songs are never in play, so they never match here.\n            CharacterFilter::Category(cat) =\u003e match cat {\n                CardCategory::Character(cls) =\u003e {\n                    card.is_character() \u0026\u0026 cls.as_ref().is_none_or(|c| card.has_classification(c))\n                }\n                CardCategory::Location =\u003e card.location_stats().is_some(),\n                CardCategory::Item =\u003e !card.is_character() \u0026\u0026 card.location_stats().is_none(),\n                CardCategory::Action | CardCategory::Song =\u003e false,\n            },\n            CharacterFilter::Named(n) =\u003e card.has_name(n),\n            CharacterFilter::Cost(nf) =\u003e nf.matches(card.printed_cost()),\n            CharacterFilter::Strength(nf) =\u003e nf.matches(\n                self.current_character_stats(card.id())\n                    .map_or(0, |s| s.strength),\n            ),\n            CharacterFilter::Willpower(nf) =\u003e nf.matches(\n                self.current_character_stats(card.id())\n                    .map_or(0, |s| s.willpower),\n            ),\n            CharacterFilter::Lore(nf) =\u003e nf.matches(\n                self.current_character_stats(card.id())\n                    .map_or(0, |s| s.lore),\n            ),\n            CharacterFilter::Damaged(b) =\u003e (card.conditions().damage \u003e 0) == *b,\n            CharacterFilter::Exerted(b) =\u003e card.conditions().ready != *b,\n            CharacterFilter::IsSource =\u003e card.id() == source,\n            CharacterFilter::IsCard(id) =\u003e card.id() == *id,\n            CharacterFilter::And(fs) =\u003e fs.iter().all(recurse),\n            CharacterFilter::Or(fs) =\u003e fs.iter().any(recurse),\n            CharacterFilter::Not(f) =\u003e !recurse(f),\n        }\n    }\n\n    /// Evaluate an [`Amount`] to a concrete signed value at resolution (§7.8):\n    /// constant, count of matching in-play characters, a characteristic of the\n    /// source/target, hand size, or damage on the source. Registry-free.\n    #[must_use]\n    pub fn eval_amount(\n        \u0026self,\n        controller: PlayerId,\n        source: CardId,\n        target_card: CardId,\n        amount: \u0026Amount,\n    ) -\u003e i32 {\n        match amount {\n            Amount::Fixed(n) =\u003e *n,\n            Amount::PerMatchingCharacter(filter) =\u003e {\n                let mut count: i32 = 0;\n                for player in \u0026self.players {\n                    let owner = player.id();\n                    for card in player.play().iter() {\n                        if card.is_character()\n                            \u0026\u0026 self.matches_filter(controller, source, owner, card, filter)\n                        {\n                            count += 1;\n                        }\n                    }\n                }\n                count\n            }\n            // `SelfCard` reads the source; any other target reads the resolved target.\n            Amount::StatOf { stat, target } =\u003e {\n                let card = if matches!(target, Target::SelfCard) {\n                    source\n                } else {\n                    target_card\n                };\n                let value = self\n                    .current_character_stats(card)\n                    .map_or(0, |s| match stat {\n                        Stat::Strength =\u003e s.strength,\n                        Stat::Willpower =\u003e s.willpower,\n                        Stat::Lore =\u003e s.lore,\n                    });\n                i32::try_from(value).unwrap_or(i32::MAX)\n            }\n            Amount::CardsInHand =\u003e self.player(controller).map_or(0, |p| {\n                i32::try_from(p.hand().iter().count()).unwrap_or(i32::MAX)\n            }),\n            Amount::DamageOnSource =\u003e self.instance_in_play(source).map_or(0, |c| {\n                i32::try_from(c.conditions().damage).unwrap_or(i32::MAX)\n            }),\n        }\n    }\n\n    /// The combined (signed) modifier delta applying to a card's characteristic.\n    #[must_use]\n    pub fn stat_delta(\u0026self, card: CardId, stat: Stat) -\u003e i32 {\n        self.modifiers\n            .iter()\n            .filter(|m| {\n                m.stat() == stat\n                    \u0026\u0026 self.condition_holds(m.condition(), m   self.cards.push(card);\n    }\n\n    /// Remove and return the top card, if any.\n    pub fn pop_top(\u0026mut self) -\u003e Option\u003cCardInstance\u003e {\n        self.cards.pop()\n    }\n\n    /// Add a card to the bottom of the zone (e.g. mulligan put-back, §3.1.6.1).\n    pub fn insert_bottom(\u0026mut self, card: CardInstance) {\n        self.cards.insert(0, card);\n    }\n\n    /// Remove and return the card with the given id, if present.\n    pub fn take(\u0026mut self, id: CardId) -\u003e Option\u003cCardInstance\u003e {\n        let index = self.cards.iter().position(|c| c.id() == id)?;\n        Some(self.cards.remove(index))\n    }\n\n    /// Shuffle the zone in place using the game's deterministic RNG.\n    pub fn shuffle(\u0026mut self, rng: \u0026mut SeededRng) {\n        rng.shuffle(\u0026mut self.cards);\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{CardInstance, Zone};\n    use crate::domain::game::Conditions;\n    use crate::domain::types::ids::{CardDefId, CardId};\n\n    fn instance(raw: u32) -\u003e CardInstance {\n        CardInstance::new(\n            CardId::from_raw(raw),\n            CardDefId::from_raw(raw),\n            Conditions::in_deck(),\n        )\n    }\n\n    #[test]\n    fn new_zone_is_empty() {\n        let zone = Zone::new();\n        assert!(zone.is_empty());\n        assert_eq!(zone.len(), 0);\n    }\n\n    #[test]\n    fn push_preserves_insertion_order() {\n        let mut zone = Zone::new();\n        zone.push(instance(0));\n        zone.push(instance(1));\n        zone.push(instance(2));\n\n        let ids: Vec\u003cu32\u003e = zone.iter().map(|c| c.id().as_raw()).collect();\n        assert_eq!(ids, vec![0, 1, 2]);\n        assert_eq!(zone.len(), 3);\n        assert!(!zone.is_empty());\n    }\n}\n","traces":[{"line":17,"address":[],"length":0,"stats":{"Line":8002}},{"line":18,"address":[],"length":0,"stats":{"Line":8002}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length": te, facedown; each card is 1 ink).\n    Inkwell,\n    /// A player's play area (public).\n    Play,\n    /// A player's discard (public).\n    Discard,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","mod.rs"],"content":"//! Domain layer - Core business logic without external dependencies\n\npub mod cards;\npub mod deck;\npub mod effects;\npub mod engine;\npub mod game;\npub mod rules;\npub mod types;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","bjorn.vanacker","Development","Private","lorcana-engine","src","domain","rules","game_state_check.rs"],"content":"//! The game-state check (§1.9): apply required actions until the state is stable.\n\nuse super::{RequiredAction, check_win_loss};\nuse crate::domain::game::{Conditions, GameEvent, GameState, GameStatus, PlayerState};\nuse crate::domain::types::ids::{CardId, PlayerId};\n\n/// Run the game-state check to completion (§1.9.2): repeatedly evaluate the\n/// conditions and apply the resulting required actions until none remain.\n///\n/// Win/loss is resolved **before** any other required action each pass (§1.9.2):\n/// losers are eliminated (emitting [`GameEvent::PlayerLost`]) and a win finishes\n/// the game (emitting [`GameEvent::GameEnded`]). Only when no win/loss applies are\n/// other required actions taken — currently banishment of characters whose damage\n/// has reached their willpower (§1.9.1.3), moving them to discard and clearing\n/// their counters (§9.4, §8.6.2). The empty-deck-draw flag is \"since the last game\n/// state check\" (§1.9.1.2), so it is cleared once the check completes.\n///\n/// Banishment \"when this is banished\" / \"...in a challenge\" / \"banishes another\n/// in a challenge\" triggers are enqueued by the reducer (`enqueue_banish_triggers`\n/// for the events this returns, and `apply_challenge` for the challenge variants).\n///\n/// TODO(Slice 8b+): banishment can still be replaced/prevented (§7.7), and\n/// §1.9.1.3's \"banished by that character\" attribution isn't tracked yet.\npub fn game_state_check(state: \u0026mut GameState) -\u003e Vec\u003cGameEvent\u003e {\n    let mut events = Vec::new();\n\n    loop {\n        if state.is_finished() {\n            break;\n        }\n\n        // Win/loss first (§1.9.2).\n        let win_loss = check_win_loss(state);\n        if !win_loss.is_empty() {\n            apply_win_loss(state, \u0026win_loss, \u0026mut events);\n            continue;\n        }\n\n        // Then other required actions: banishment.\n        let banishable = banishable_cards(state);\n        if banishable.is_empty() {\n            break;\n        }\n        for (player, card) in banishable {\n            banish(state, player, card, \u0026mut events);\n        }\n    }\n\n    // A game with no players left standing and no winner is a draw.\n    if !state.is_finished()\n        \u0026\u0026 !state.players().is_empty()\n        \u0026\u0026 state.players().iter().all(PlayerState::is_eliminated)\n    {\n        state.set_status(GameStatus::Finished {\n            winners: Vec::new(),\n        });\n        events.push(GameEvent::GameEnded {\n            winners: Vec::new(),\n        });\n    }\n\n    for player in state.players_mut() {\n        player.clear_drew_from_empty_deck();\n    }\n\n    events\n}\n\n/// Apply the win/loss required actions from a single check pass.\nfn apply_win_loss(state: \u0026mut GameState, actions: \u0026[RequiredAction], events: \u0026mut Vec\u003cGameEvent\u003e) {\n    let mut winners: Vec\u003cPlayerId\u003e = Vec::new();\n    for action in actions {\n        match action {\n            RequiredAction::PlayerWins(player) =\u003e {\n                if !winners.contains(player) {\n                    winners.push(*player);\n                }\n            }\n            RequiredAction::PlayerLoses(player) =\u003e {\n                if let Some(p) = state.player_mut(*player)\n                    \u0026\u0026 !p.is_eliminated()\n                {\n                    p.eliminate();\n                    events.push(GameEvent::PlayerLost { player: *player });\n                }\n            }\n            // check_win_loss only produces win/loss actions.\n            RequiredAction::Banish { .. } =\u003e {}\n        }\n    }\n\n    if !winners.is_empty() {\n        state.set_status(GameStatus::Finished {\n            winners: winners.clone(),\n        });\n        events.push(GameEvent::GameEnded { winners });\n    }\n}\n\n/// Collect the in-play characters whose damage has reached their (current,\n/// modifier-adjusted) willpower.\nfn banishable_cards(state: \u0026GameState) -\u003e Vec\u003c(PlayerId, CardId)\u003e {\n    let mut out = Vec::new();\n    for player in state.players() {\n        for card in player.play().iter() {\n            // A character (current willpower incl. modifiers) or a location (§6.5.5)\n            // is banished once its damage reaches its willpower (§1.9.1.1, §9.4).\n            let willpower = state\n                .current_character_stats(card.id())\n                .map(|s| s.willpower)\n                .or_else(|| card.location_stats().map(|l| l.willpower));\n            if let Some(willpower) = willpower\n                \u0026\u0026 card.conditions().damage \u003e= willpower\n            {\n                out.push((player.id(), card.id()));\n            }\n        }\n    }\n    out\n}\n\n/// Banish a card: move it from play to its owner's discard, clearing its damage\n/// counters (§9.4) and in-play stats.\nfn banish(state: \u0026mut GameState, player: PlayerId, card: CardId, events: \u0026mut Vec\u003cGameEvent\u003e) {\n    if let Some(p) = state.player_mut(player)\n        \u0026\u0026 let Some(instance) = p.play_mut().take(card)\n    {\n        // A stack (Shift / Boost) dissolves into separate cards in the discard,\n        // each reset to the discard's default conditions (§5.1.7, §10.10.8).\n        for c in instance.dissolve(Conditions::faceup_idle()) {\n            p.discard_mut().push(c);\n        }\n        events.push(GameEvent::Banished { player, card });\n        // The card left play: any continuous modifiers it generated end (§7.6.4).\n        // This is the model every leave-play path must follow (remove modifiers,\n        // then let the check loop re-resolve) — see the caveat on\n        // `GameState::remove_modifiers_from_source`. Future effect-driven removals\n        // (Slice 8) must do the same.\n        state.remove_modifiers_from_source(card);\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":281199}},{"line":25,"address":[],"length":0,"stats":{"Line":562398}},{"line":28,"address":[],"length":0,"stats":{"Line":607224}},{"line":29,"address":[],"length":0,"stats":{"Line":978}},{"line":33,"address":[],"length":0,"stats":{"Line":907902}},{"line":34,"address":[],"length":0,"stats":{"Line":302634}},{"line":35,"address":[],"length":0,"stats":{"Line":4140}},{"line":36,"address":[],"length":0,"stats":{"Line":1035}},{"line":40,"address":[],"length":0,"stats":{"Line":904797}},{"line":41,"address":[],"length":0,"stats":{"Line":603198}},{"line":42,"address":[],"length":0,"stats":{"Line":280221}},{"line":44,"address":[],"length":0,"stats":{"Line":130665}},{"line":45,"address":[],"length":0,"stats":{"Line":145716}},{"line":50,"address":[],"length":0,"stats":{"Line":281199}},{"line":51,"address":[],"length":0,"stats":{"Line":280221}},{"line":52,"address":[],"length":0,"stats":{"Line":560442}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":1687362}},{"line":63,"address":[],"length":0,"stats":{"Line":562482}},{"line":66,"address":[],"length":0,"stats":{"Line":281199}},{"line":70,"address":[],"length":0,"stats":{"Line":1035}},{"lin
